      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5A6472" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      ${hasRange?`<span>${state.vehDateStart}〜${state.vehDateEnd}</span>`:`<span class="ph">発生期間（全期間）</span>`}
      ${hasRange?`<span class="vcal-x" onclick="event.stopPropagation();clearVehCal()" title="クリア">×</span>`:""}
    </button>
    ${renderVehCal()}
  </div>`;
  const head=`<div class="pagehead pagehead-veh">
    <div><p>連携済みの書類から、車両（車番）ごとにコストを自動集計します。1車番＝1レコードで、常に最新の積み上げを表示します。${state.vehCategoryFilter!=="all"?`<b style="color:var(--greenDark)">　絞り込み：${esc(state.vehCategoryFilter)}</b>`:""}${hasRange?`<b style="color:var(--greenDark)">　期間：${state.vehDateStart}〜${state.vehDateEnd}</b>`:""}</p></div>
    <div class="ph-spacer"></div>
    <button class="trash-toggle ${inTrash?"on":""}" onclick="toggleVehTrash()" title="ゴミ箱に移動した車両は、モニターの集計（登録車両数・コスト合計・各ピックアップ）から除外されます。いつでも元に戻せます。">${I.trash(inTrash?"#B23A2E":"#5A6472",13)} ゴミ箱<span style="font-family:var(--mono);font-size:10px;background:rgba(0,0,0,.06);padding:0 6px;border-radius:999px">${trashCount}</span></button>
    <button class="btn-hist" onclick="openChangelog()" title="コスト内訳の変更履歴">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l3 2"/></svg>
      変更履歴${clogUnseen>0?`<span class="bh-ct">${clogUnseen}</span>`:""}</button>
  </div>`;
  const filterBar=`<div class="veh-filters"><span class="vf-l">絞り込み</span>${catSel}${periodCtrl}</div>`;

  if(veh.length===0){
    if(inTrash) return head+filterBar+`<div class="veh-card"><div class="empty">${I.trash("#9AA3AD",30)}
      <div class="et">ゴミ箱は空です</div>
      <div class="es">ゴミ箱へ移動した車両はここに表示されます。いつでも元に戻せます。</div></div></div>`;
    if(hasRange) return head+filterBar+`<div class="veh-card"><div class="empty">${I.truckN("#9AA3AD",40)}
      <div class="et">この期間に発生したコストはありません</div>
      <div class="es">期間（${state.vehDateStart}〜${state.vehDateEnd}）を変更するか、「全期間に戻す」で絞り込みを解除してください。</div></div></div>`;
    return head+filterBar+`<div class="veh-card"><div class="empty">${I.truckN("#9AA3AD",40)}
      <div class="et">${state.vehCategoryFilter==="all"?"まだ連携された車両がありません":"この営業所の連携済みコストはありません"}</div>
      <div class="es">${state.vehCategoryFilter==="all"?'書類一覧で内容を確認し「データ連携する」と、ここに車両ごとのコストが積み上がります。':"別の営業所を選ぶか、該当営業所の書類をデータ連携してください。"}</div></div></div>`;
  }

  /* ページング */
  const per=state.vehPerPage;
  const pages=Math.max(1,Math.ceil(veh.length/per));
  if(state.vehPage>pages)state.vehPage=pages; if(state.vehPage<1)state.vehPage=1;
  const start=(state.vehPage-1)*per;
  const info={total:veh.length,per,pages,page:state.vehPage,start};
  const pageVeh=veh.slice(start,start+per);

  const rows=pageVeh.map(v=>{
    const actCell=inTrash
      ? `<button class="icon-btn restore" title="コストモニターに戻す" onclick="event.stopPropagation();vehAskRestore('${v.key}')">${I.undo("#0E7A4B",13)}</button>`
      : `<button class="veh-edit-btn" onclick="event.stopPropagation();openVehEdit('${v.key}','${v.kind}','${esc(v.target)}')">${I.pencil("#0E7A4B",13)} 編集</button>
         <button class="icon-btn" title="ゴミ箱へ移動" style="margin-left:5px" onclick="event.stopPropagation();vehAskTrash('${v.key}')">${I.trash("#B23A2E",13)}</button>`;
    const metricCells=vehicleMetrics(v).map(g=>{const cs=bunruiStyle(g.bunrui);
      return g.metrics.map((m,i)=>`<td class="vm-col ${i===0?"grp-start":""} ${m.isSum?"sum":""} ${m.na?"na":""}" ${m.isSum?`style="color:${cs.fg}"`:""}>${m.na?"—":yen(m.value)}</td>`).join("");
    }).join("");
    return `<tr class="vrow${inTrash?" is-trash":""}" ${inTrash?"":`onclick="openVehPanel('${v.key}','${v.kind}','${esc(v.target)}')"`}>
      <td class="sticky-c sticky-c1"><span class="plate">${esc(v.target)}</span>
        ${v.fuso?`<div style="font-size:10.5px;color:var(--inkSoft);margin-top:5px">${esc(v.fuso.body)}${v.fuso.reefer&&v.fuso.reefer!=="なし"?" / "+esc(v.fuso.reefer):""}</div>`:""}</td>
      <td class="sticky-c sticky-c2 r total">${yen(v.total)}</td>
      <td class="sticky-c sticky-c3" style="white-space:nowrap">${actCell}</td>
      ${metricCells}
      <td style="font-family:var(--mono);font-size:11px;color:var(--inkSoft);white-space:nowrap">${v.last}<div style="margin-top:3px">${v.count}明細</div></td>
    </tr>`;
  }).join("");

  const metricSchema=vehicleMetrics(pageVeh[0]);
  const bunruiHdr=costBunruiHdr(metricSchema);
  const groupHdr=metricSchema.map(g=>{const cs=bunruiStyle(g.bunrui);
    return `<th class="vm-cat grp-start" colspan="${g.metrics.length}" style="color:${cs.fg}">${esc(g.komoku)}</th>`;}).join("");
  let _mi=0;
  const labelHdr=metricSchema.map(g=>g.metrics.map((m,i)=>{
    const idx=_mi++;
    const base=`vm-label ${i===0?"grp-start":""} ${m.isSum?"sum":""}`;
    if(m.na) return `<th class="${base}">${esc(m.label)}</th>`; // "—"固定の項目は並び替え不可
    const key="metric:"+idx;
    const sorted=state.vehSort.key===key;
    return `<th class="${base} sortable ${sorted?"sorted":""}" onclick="setVehSort('${key}')" title="この項目で並び替え"><span class="vm-lab-tx">${esc(m.label)}</span>${vehSortArrow(key)}</th>`;
  }).join("")).join("");

  const table=`<div class="veh-card"><div class="tscroll"><table class="vt vt-metrics">
    <thead>
      <tr>${thVehSticky('target','車番','sticky-c1')}${thVehSticky('total','累計コスト','sticky-c2 r')}<th rowspan="3" class="sticky-c sticky-c3">操作</th>${bunruiHdr}${thVeh('last','最終発生 / 明細数','',3)}</tr>
      <tr>${groupHdr}</tr>
      <tr>${labelHdr}</tr>
    </thead>
    <tbody>${rows}</tbody></table></div>${pager("veh",info)}</div>`;
  return head+filterBar+costCsvBar('vehicle')+table;
}
function setVehSort(key){const s=state.vehSort;
  if(s.key===key) s.dir=s.dir==="asc"?"desc":"asc";
  else {s.key=key; s.dir=(key==="total"||key==="count"||(typeof key==="string"&&key.indexOf("metric:")===0))?"desc":"asc";}
  state.vehPage=1; render();}
/* 個別モニターの並び替え矢印（昇順▲／降順▼／未選択⇅）。各ヘッダー共通。 */
function vehSortArrow(key){
  const a=state.vehSort.key===key;
  return a?(state.vehSort.dir==="asc"?`<span class="ar">▲</span>`:`<span class="ar">▼</span>`):`<span class="ar-dim">⇅</span>`;
}
function thVeh(key,label,cls,rowspan){
  const a=state.vehSort.key===key;
  return `<th ${rowspan?`rowspan="${rowspan}"`:""} class="sortable ${cls||""} ${a?"sorted":""}" onclick="setVehSort('${key}')"><span class="th-in">${label}${vehSortArrow(key)}</span></th>`;
}
/* 車両コストの固定列ヘッダー（車番・累計コスト）。横スクロール時も左に固定する3段ヘッダー用。 */
function thVehSticky(key,label,cls){
  const a=state.vehSort.key===key;
  return `<th rowspan="3" class="sortable sticky-c ${cls||""} ${a?"sorted":""}" onclick="setVehSort('${key}')"><span class="th-in">${label}${vehSortArrow(key)}</span></th>`;
}
/* 原価分類バンド：連続する同一原価分類の原価項目をまとめた最上段ヘッダー */
function costBunruiHdr(schema){
  let html="", i=0;
  while(i<schema.length){ const b=schema[i].bunrui; let span=0,j=i;
    while(j<schema.length&&schema[j].bunrui===b){ span+=schema[j].metrics.length; j++; }
    const cs=bunruiStyle(b);
    html+=`<th class="vm-bunrui grp-start" colspan="${span}" style="color:${cs.fg};background:${cs.bg}">${esc(b)}</th>`; i=j;
  }
  return html;
}
/* ───── 拠点コストタブ：拠点(営業所)ごとに拠点原価項目を横一列で表示 ───── */
function renderVehSites(){
  const head=`<div class="pagehead pagehead-veh">
    <div><p>連携済みの書類から、拠点（営業所）ごとに拠点コスト（荷役・施設・庸車・一般管理費など）を原価分類・原価項目別に集計します。1営業所＝1レコードで表示します。</p></div>
  </div>`;
  const note="";
  const all=buildSites();
  const schema=siteMetrics("",all);
  const bunruiHdr=costBunruiHdr(schema);
  const groupHdr=schema.map(g=>{const cs=bunruiStyle(g.bunrui);
    return `<th class="vm-cat grp-start" colspan="${g.metrics.length}" style="color:${cs.fg}">${esc(g.komoku)}</th>`;}).join("");
  const labelHdr=schema.map(g=>g.metrics.map((m,i)=>
    `<th class="vm-label ${i===0?"grp-start":""} ${m.isSum?"sum":""}">${esc(m.label)}</th>`).join("")).join("");
  const rows=CATEGORIES.map(o=>{
    const m=siteMetrics(o,all);
    const total=m.reduce((a,g)=>a+g.metrics[0].value,0);
    const cells=m.map(g=>{const cs=bunruiStyle(g.bunrui);
      return g.metrics.map((mm,i)=>`<td class="vm-col ${i===0?"grp-start":""} ${mm.isSum?"sum":""} ${mm.na?"na":""}" ${mm.isSum?`style="color:${cs.fg}"`:""}>${mm.na?"—":yen(mm.value)}</td>`).join("");}).join("");
    return `<tr class="vrow" style="cursor:default">
      <td class="sticky-c sticky-c1"><span class="plate">${esc(o)}</span></td>
      <td class="sticky-c sticky-c2 sticky-c-end r total">${yen(total)}</td>
      ${cells}</tr>`;
  }).join("");
  const table=`<div class="veh-card"><div class="tscroll"><table class="vt vt-metrics">
    <thead>
      <tr><th rowspan="3" class="sticky-c sticky-c1">営業所（拠点）</th><th rowspan="3" class="sticky-c sticky-c2 sticky-c-end r">累計コスト</th>${bunruiHdr}</tr>
      <tr>${groupHdr}</tr>
      <tr>${labelHdr}</tr>
    </thead>
    <tbody>${rows}</tbody></table></div></div>`;
  return head+note+costCsvBar('site')+table;
}

function invFlowNote(){

function invStatusCell(it,s){
  const de=_daysUntil(it.expiry), di=_daysUntil(it.inspect);
  if(s.qty<it.reorder) return `<span class="inv-badge pill-low">発注点割れ</span>`;
  if(de!=null&&de<=120) return `<span class="inv-badge pill-exp">期限 残${de}日</span>`;
  if(di!=null&&di<=120) return `<span class="inv-badge pill-exp">点検 残${di}日</span>`;
  return `<span class="inv-badge pill-ok">正常</span>`;
}
function invStockTable(c){
  const items=_invFilteredItems().filter(it=>it.cat===c.k);
  if(!items.length) return "";
  const rows=items.map(it=>{ const s=invStock(it.id);
    const ref=it.cap?it.cap:Math.max(it.reorder*3,s.qty);
    const pct=Math.max(4,Math.min(100,Math.round(s.qty/ref*100)));
    const col=s.qty<it.reorder?"#B23A2E":(s.qty<it.reorder*1.5?"#B87514":c.color);
    let memo="";
    if(it.cat==="equip") memo=`貸出中 <b style="font-family:var(--mono)">${s.onLoan}</b>${it.unit}`;
    else if(it.cat==="tire") memo=`${esc(it.size)}・${esc(it.fit)}`;
    else if(it.cat==="fuel") memo=`タンク容量 ${it.cap.toLocaleString("ja-JP")}L・残量 ${Math.min(100,Math.round(s.qty/it.cap*100))}%`;
    else if(it.expiry) memo=`使用期限 ${esc(it.expiry)}`;
    else if(it.inspect) memo=`点検期限 ${esc(it.inspect)}`;
    return `<tr class="${s.qty<it.reorder?"lowrow":""}">
      <td><b>${esc(it.name)}</b><br><span style="color:var(--inkSoft);font-size:11px">${esc(it.spec)}</span></td>
      <td>${esc(it.office)}</td>
      <td class="r">${s.qty.toLocaleString("ja-JP")}<span style="color:var(--inkFaint);font-size:10px"> ${esc(it.unit)}</span><div class="barm"><span style="width:${pct}%;background:${col}"></span></div></td>
      <td class="r">${it.reorder.toLocaleString("ja-JP")}</td>
      <td class="r">¥${Math.round(it.price).toLocaleString("ja-JP")}</td>
      <td class="r">${yen(s.value)}</td>
      <td>${invStatusCell(it,s)}</td>
      <td style="font-size:11.5px;color:var(--inkSoft)">${memo}</td></tr>`;
  }).join("");
  return `<div class="inv-card"><h3>${invCatPill(c.k)} ${esc(c.l)} <span class="sub" style="margin:0 0 0 4px">／ ${esc(c.mode)}</span></h3><p class="sub">${esc(c.note)}　原価項目：<b>${esc(c.komoku)}</b></p>
    <div class="tscroll"><table class="invt"><thead><tr><th>品目・規格</th><th>保管拠点</th><th class="r">現在庫</th><th class="r">発注点</th><th class="r">標準単価</th><th class="r">在庫評価額</th><th>状態</th><th>摘要</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function invLoanDetail(){
  const byParty={};
  buildInventory().moves.filter(m=>m.cat==="equip"&&(state.invOffice==="all"||m.office===state.invOffice)).forEach(m=>{
    const it=INV_ITEM[m.itemId]; const key=m.party+"｜"+it.name;
    const o=byParty[key]||(byParty[key]={party:m.party,item:it.name,unit:it.unit,on:0,lost:0});
    if(m.type==="out") o.on+=m.qty; else if(m.type==="in"&&m.note==="返却") o.on-=m.qty; else if(m.type==="loss") o.lost+=m.qty;

  const list=Object.values(byParty).filter(o=>o.on>0||o.lost>0).sort((a,b)=>b.on-a.on);

  const rows=list.map(o=>`<tr class="${o.lost>0?"lowrow":""}"><td>${esc(o.party)}</td><td>${esc(o.item)}</td><td class="r">${Math.max(0,o.on)} ${esc(o.unit)}</td><td class="r">${o.lost>0?`<span style="color:var(--alert);font-weight:800">${o.lost} ${esc(o.unit)}</span>`:"—"}</td></tr>`).join("");
  return `<div class="inv-card"><h3>${I.boxes("#2563EB",16)} 荷役機材 貸出先別 所在</h3><p class="sub">「どこに何個あるか」を可視化。返却管理で回収漏れ・紛失を検知します。</p>
    <div class="tscroll"><table class="invt"><thead><tr><th>貸出先</th><th>品目</th><th class="r">貸出中</th><th class="r">紛失</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function setDataLinkTab(t){ state.dataLinkTab=t; render(); }
/* 設定は編集中ドラフトに溜め、保存（確認ステップ）で初めて実データへ反映する */
function ensureSettingsDraft(){
  if(!state.settingsDraft){
    state.settingsDraft={
      settings:JSON.parse(JSON.stringify(state.settings)),
      categories:[...CATEGORIES],
    };
  }
  return state.settingsDraft;
}
function settingsDirty(){
  const d=state.settingsDraft; if(!d) return false;
  return JSON.stringify(d.settings)!==JSON.stringify(state.settings)
    || JSON.stringify(d.categories)!==JSON.stringify(CATEGORIES);
}
/* 変更点を人が読める差分として列挙（保存確認モーダルで使用） */
function settingsDiff(){
  const d=state.settingsDraft; if(!d) return [];
  const out=[];
  const L={companyName:"自社名",defaultOcr:"既定でAI-OCRを使う",matchThreshold:"突合しきい値",defaultPageSize:"既定の表示件数",
    logipokeEnabled:"ロジポケ連携",logipokeUrl:"ロジポケ連携先エンドポイント",logipokeKey:"ロジポケAPIキー",autoReflect:"ロジポケへ自動でデータ連携",
    mobipokeEnabled:"モビポケ連携",mobipokeUrl:"モビポケ連携先エンドポイント",mobipokeKey:"モビポケAPIキー",mobipokeAuto:"モビポケへ自動でデータ連携",
    externalEnabled:"外部サービス連携",externalName:"外部サービス名",externalUrl:"外部連携先エンドポイント",externalKey:"外部サービスAPIキー",externalFormat:"送信フォーマット"};
  Object.keys(L).forEach(k=>{
    if(JSON.stringify(d.settings[k])===JSON.stringify(state.settings[k])) return;
    let was=state.settings[k], now=d.settings[k];
    if(k==="matchThreshold"){ was=Math.round(was*100)+"%"; now=Math.round(now*100)+"%"; }
    else if(typeof was==="boolean"){ was=was?"ON":"OFF"; now=now?"ON":"OFF"; }
    out.push(`${L[k]}：${was} → ${now}`);
  });
  const diffArr=(live,draft,label)=>{
    draft.filter(x=>!live.includes(x)).forEach(x=>out.push(`${label}を追加：${x}`));
    live.filter(x=>!draft.includes(x)).forEach(x=>out.push(`${label}を削除：${x}`));
  };
  diffArr(CATEGORIES,d.categories,"営業所");
  return out;
}
function setSetting(k,v){ ensureSettingsDraft().settings[k]=v; render(); }
function toggleSetting(k){ const d=ensureSettingsDraft(); d.settings[k]=!d.settings[k]; render(); }
function setMatchThreshold(pct){ ensureSettingsDraft().settings.matchThreshold=Math.max(.5,Math.min(.99,(+pct)/100)); render(); }
function setDefaultPageSize(n){ ensureSettingsDraft().settings.defaultPageSize=+n; render(); }
function addCategory(){ const d=ensureSettingsDraft(); const el=document.getElementById("new-office"); const v=(el?el.value:"").trim();
  if(!v){ toast("営業所名を入力してください"); return; } if(d.categories.includes(v)){ toast("すでに存在します"); return; }

/* ───── コスト管理 CSV（車両コスト／拠点コスト）ダウンロード・インポート ───── */
function openCostCsv(mode,scope){ state.costCsv={mode,scope,charset:"utf8bom",sjis:false,fileName:null,headers:[],rows:[]}; renderOverlay(); }
function closeCostCsv(){ state.costCsv=null; renderOverlay(); }
function setCostCsvCharset(v){ if(state.costCsv) state.costCsv.charset=v; }
function toggleCostCsvSjis(c){ if(state.costCsv) state.costCsv.sjis=!!c; }
function _costCsvScopeSpec(scope){ return scope==="site"
  ? {origin:"営業所",model:SITE_COST_MODEL,fname:"拠点コスト"}
  : {origin:"車両番号",model:VEHICLE_COST_MODEL,fname:"車両コスト"}; }
function _costCsvDefaultDate(){ const ds=buildVehicles("all",null).map(v=>v.last).filter(Boolean).sort(); return ds[ds.length-1]||"2026-05-31"; }
/* CSV列：起点項目（必須）・発生日（必須）＋全明細。 */
function costCsvHeaders(scope){ const sp=_costCsvScopeSpec(scope);
  const cols=[sp.origin+"（必須）","発生日（必須）"]; if(scope==="vehicle") cols.push("営業所");
  sp.model.forEach(g=>g.items.forEach(it=>cols.push(it.label))); return cols; }
function costCsvRows(scope){ const sp=_costCsvScopeSpec(scope); const dflt=_costCsvDefaultDate();
  if(scope==="site"){ const all=buildSites(); return CATEGORIES.map(o=>{ const row=[o,dflt];
    siteMetrics(o,all).forEach(g=>g.metrics.forEach(mm=>{ if(mm.isSum)return; row.push(mm.na?"":mm.value); })); return row; }); }
  const vehicles=buildVehicles("all",null).filter(v=>!state.vehTrash.has(v.key));
  return vehicles.map(v=>{ const office=(v.lines.find(l=>l.office)||{}).office||"";
    const row=[v.target, v.last||dflt, office];
    vehicleMetrics(v).forEach(g=>g.metrics.forEach(mm=>{ if(mm.isSum)return; row.push(mm.na?"":mm.value); }));
    return row; }); }
function costCsvText(scope){ const q=s=>`"${String(s==null?"":s).replace(/"/g,'""')}"`;
  const h=costCsvHeaders(scope),r=costCsvRows(scope);
  return h.map(q).join(",")+"\r\n"+r.map(x=>x.map(q).join(",")).join("\r\n"); }
function _downloadCsv(text,fname,bom){ const blob=new Blob([(bom?"﻿":"")+text],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); }
function costCsvDoDownload(){ const c=state.costCsv; if(!c)return; const sp=_costCsvScopeSpec(c.scope);
  _downloadCsv(costCsvText(c.scope), `${sp.fname}_${_costCsvDefaultDate().slice(0,7)}.csv`, c.charset!=="utf8");
  toast("CSVをダウンロードしました"); closeCostCsv(); }
function costCsvDownloadSample(){ const c=state.costCsv; if(!c)return; const sp=_costCsvScopeSpec(c.scope);
  _downloadCsv(costCsvText(c.scope), `${sp.fname}_sample.csv`, true); toast("サンプルCSVをダウンロードしました"); }
function _parseCsv(text){ text=String(text||"").replace(/^﻿/,''); const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else { if(ch==='"')q=true; else if(ch===','){row.push(cur);cur="";} else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur="";} else if(ch!=='\r')cur+=ch; } }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>!(r.length===1&&r[0].trim()==="")); }
function costCsvPickFile(){ const el=document.getElementById("costcsv-file"); if(el)el.click(); }
function costCsvFiles(files){ const c=state.costCsv; if(!c||!files||!files[0])return; const f=files[0];
  const reader=new FileReader();
  reader.onload=e=>{ const rows=_parseCsv(e.target.result); c.fileName=f.name; c.headers=rows[0]||[]; c.rows=rows.slice(1); renderOverlay(); };
  reader.readAsText(f, c.sjis?"Shift_JIS":"UTF-8"); }
function costCsvDrop(e){ e.preventDefault(); const dz=e.currentTarget; if(dz)dz.classList.remove("drag"); costCsvFiles(e.dataTransfer.files); }
function costCsvUpload(){ const c=state.costCsv; if(!c||!c.rows.length)return; toast(`${c.rows.length}件のコストを取り込みました（デモ）`); closeCostCsv(); }
/* テーブルヘッダーのすぐ上・右端に置くCSV操作バー */
function costCsvBar(scope){ return `<div class="csv-bar">
  <button class="veh-edit-btn" onclick="openCostCsv('download','${scope}')" title="CSVでダウンロード">${I.download("#0E7A4B",13)} CSVダウンロード</button>
  <button class="veh-edit-btn" onclick="openCostCsv('import','${scope}')" title="CSVから取り込み">${I.cloud("#0E7A4B",16)} CSVインポート</button>
</div>`; }
function renderCostCsvModal(){
  const c=state.costCsv; if(!c) return ""; const sp=_costCsvScopeSpec(c.scope);
  if(c.mode==="download"){
    return `<div class="ovl anim" onclick="if(event.target===this)closeCostCsv()"><div class="modal" style="width:min(680px,100%)">
      <div class="m-head"><span class="t">CSVダウンロード（${esc(sp.fname)}）</span><button class="x" onclick="closeCostCsv()">${I.x("#5A6472",18)}</button></div>
      <div class="m-body">
        <p style="font-size:12.5px;color:var(--inkSoft);margin:0 0 16px">※ 検索フィルターはダウンロードデータには反映されません。</p>
        <div class="fld"><label>文字コード</label>
          <select class="in" onchange="setCostCsvCharset(this.value)">
            <option value="utf8bom">エクセル対応（UTF-8 BOM）</option>
            <option value="utf8">UTF-8（BOMなし）</option>
          </select></div>
      </div>
      <div class="m-foot"><button class="btn-ghost" onclick="closeCostCsv()">キャンセル</button>
        <button class="btn-green" onclick="costCsvDoDownload()">${I.download("#fff",14)} CSVダウンロード</button></div>
    </div></div>`;
  }
  const hasFile=!!c.fileName, origin=c.scope==="site"?"営業所":"車両番号";
  const preview=c.rows.slice(0,50);
  const table=(hasFile&&c.headers.length)?`<div class="costcsv-preview"><table class="vd-tbl"><thead><tr>${c.headers.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead>
    <tbody>${preview.length?preview.map(r=>`<tr>${c.headers.map((_,i)=>`<td>${esc(r[i]==null?"":r[i])}</td>`).join("")}</tr>`).join(""):`<tr><td colspan="${c.headers.length}" style="text-align:center;color:var(--inkSoft);padding:14px">データ行がありません</td></tr>`}</tbody></table>
    ${c.rows.length>preview.length?`<div class="costcsv-more">ほか ${c.rows.length-preview.length} 行</div>`:""}</div>`:"";
  const dzInner=hasFile
    ? `<div class="costcsv-fname">${esc(c.fileName)}</div>${I.cloud("#C0C7CF",44)}`
    : `<div style="color:var(--inkSoft);font-size:13px;margin-bottom:8px">ファイルを選択するか、ドラッグアンドドロップしてください。</div>${I.cloud("#C0C7CF",44)}`;
  return `<div class="ovl anim" onclick="if(event.target===this)closeCostCsv()"><div class="modal" style="width:min(980px,100%)">
    <div class="m-head"><span class="t">CSVインポート（${esc(sp.fname)}）</span><button class="x" onclick="closeCostCsv()">${I.x("#5A6472",18)}</button></div>
    <div class="m-body" style="max-height:74vh;overflow:auto">
      <p style="font-size:13px;margin:0 0 12px;line-height:1.7">サンプルをダウンロードして編集、もしくはCSVダウンロードで取得したファイルを編集してアップロードしてください。<b>${origin}</b>と<b>発生日</b>は必須項目です。${origin}・発生日ごとに各原価項目の金額を登録・更新します。</p>
      <div class="csv-warn">
        <div>1. CSVの内容で、${origin}・発生日ごとに各原価項目の金額を登録・更新します。</div>
        <div>2. CSV形式が古いと取り込めない場合があります。最新のサンプルCSVをダウンロードしてお試しください。</div>
      </div>
      <div style="text-align:right;margin:12px 0"><button class="btn-green" onclick="costCsvDownloadSample()">サンプルダウンロード</button></div>
      <input type="file" id="costcsv-file" accept=".csv" style="display:none" onchange="costCsvFiles(this.files)">
      <div class="dropzone" onclick="costCsvPickFile()" ondragover="uplDragOver(event)" ondragleave="uplDragLeave(event)" ondrop="costCsvDrop(event)">
        ${dzInner}<div class="dz-pick">ファイルを選択</div></div>
      ${table}
      <label class="csv-sjis"><input type="checkbox" ${c.sjis?"checked":""} onchange="toggleCostCsvSjis(this.checked)"> 文字コード：Shift-JIS</label>
    </div>
    <div class="m-foot"><button class="btn-ghost" onclick="closeCostCsv()">キャンセル</button>
      <button class="btn-green" ${hasFile&&c.rows.length?"":"disabled"} onclick="costCsvUpload()">アップロード</button></div>
  </div></div>`;
}

/* ───── オーバーレイ・トースト ───── */
let _ovKind="";
function renderOverlay(){
  const ov=document.getElementById("overlay");
  const kind = state.upload.open?"upload": state.panelId?"panel": state.vehPanel?"vehpanel": state.changelogOpen?"changelog": state.vehEditKey?"vehedit": state.masterEdit?"masteredit": state.costCsv?"costcsv": "";
  state._ovFresh = (kind!=="" && kind!==_ovKind); // 同じオーバーレイの再描画ではアニメさせない
  _ovKind=kind;
  let h="";
  if(state.upload.open){ h=renderUploadModal();
    if(state.splitUpload.settingsOpen) h+=renderSplitSettingsModal();
    if(state.splitUpload.zoom!=null) h+=renderSplitZoom();
    if(state.splitUpload.guide) h+=renderCoach();
    if(state.upload.dupAlert) h+=renderDupAlert();
  }
  else if(state.panelId){ h=renderPanel(); state.panelJustOpened=false; }
  else if(state.vehPanel) h=renderVehPanel();
  else if(state.changelogOpen) h=renderChangelog();
  else if(state.vehEditKey) h=renderVehEditModal();
  else if(state.masterEdit) h=renderMasterEditModal();
  else if(state.costCsv) h=renderCostCsvModal();
  if(state.reflectConfirm) h+=renderReflectConfirm(); // 既存オーバーレイの上に確認モーダルを重ねる
  if(state.enterConfirm) h+=renderEnterConfirm();
  if(state.officeConfirm) h+=renderOfficeConfirm();
  if(state.pnDeleteLid!=null) h+=renderPnDeleteConfirm();
  if(state.vehTrashAction) h+=renderVehTrashConfirm();
  if(state.docTrashAction) h+=renderDocTrashConfirm();
  if(state.settingsSaveConfirm) h+=renderSettingsSaveConfirm();
  if(state.settingsLeave) h+=renderSettingsLeaveConfirm();
  const os=_captureScroll(ov);
  ov.innerHTML=h;
  _restoreScroll(ov,os);
}
let _toastT=null,_toastAction=null;
function toast(msg, action){
  const t=document.getElementById("toast");
  _toastAction = (action&&action.fn)||null;
  const btn = action?`<button class="toast-btn" onclick="toastAction()">${esc(action.label)}</button>`:"";
  t.innerHTML=`<div class="toast">${I.checkc("#6FCF97",17)}<span>${esc(msg)}</span>${btn}</div>`;
  if(_toastT)clearTimeout(_toastT);
  _toastT=setTimeout(()=>{t.innerHTML="";_toastAction=null;},action?6000:2600);
}
function toastAction(){ const f=_toastAction; _toastAction=null; const t=document.getElementById("toast"); if(t)t.innerHTML=""; if(_toastT)clearTimeout(_toastT); if(f)f(); }
function gotoVehicles(){ state.view="vehicles"; state.vehCategoryFilter="all"; render(); }

/* ───── プレースホルダー画面（書類一覧・コスト管理 以外のロジポケメニュー） ───── */
function renderPlaceholder(){
  const map={
    ph_fuel:{t:"給油履歴",d:"車両ごとの給油記録を一覧・管理する画面です。"},
    ph_econ:{t:"燃費実績",d:"給油データから算出した車両ごとの燃費実績を確認する画面です。"},
    ph_vset:{t:"各種設定",d:"車両データ管理に関する各種設定を行う画面です。"},
    ph_labor:{t:"労務管理",d:""}, ph_inspect:{t:"車両点検・事故管理",d:""},
    ph_report:{t:"日報管理",d:""}, ph_case:{t:"案件管理",d:""},
    ph_dispatch:{t:"配車表",d:""}, ph_billing:{t:"請求管理",d:""},
    ph_payment:{t:"支払明細管理",d:""}, ph_dash:{t:"経営管理ダッシュボード",d:""},
    ph_master:{t:"マスタ管理",d:""}, ph_files:{t:"ファイル共有",d:""}, ph_help:{t:"ヘルプ",d:""},
  };
  const m=map[state.view]||{t:"画面",d:""};
  const desc=m.d||`「${m.t}」はこのプロトタイプには含まれていません。`;
  return `<div class="lp-ph">
    <div class="ph-ic">${I.truckN("#0E5A40",30)}</div>
    <span class="ph-tag">車両データ管理</span>
    <h2>${m.t}</h2>
    <p>${desc}</p>
    <p style="font-size:12px;color:var(--inkFaint)">このデモでは <b>書類一覧</b> と <b>コスト管理（コストモニター）</b> が動作します。左メニューからお試しください。</p>
  </div>`;
}

/* ───── ルート ───── */
/* 再描画（innerHTML 差し替え）でスクロール位置が先頭へ戻らないよう、
   既知のスクロール領域の scrollTop を保持・復元する */
const _SCROLL_SELECTORS=[".tscroll",".ccat-card",".settings-wrap",".vp-body",".pn-left",".pn-right",".ve-left",".ve-rprev",".tl-scroll",".clog-body",".pv-page-wrap",".chips",".log",".spm-strip"];
function _captureScroll(root){ const m={}; if(!root) return m; _SCROLL_SELECTORS.forEach(sel=>{ const e=root.querySelector(sel); if(e&&(e.scrollTop||e.scrollLeft)) m[sel]={t:e.scrollTop,l:e.scrollLeft}; }); return m; }
function _restoreScroll(root,m){ if(!root||!m) return; for(const sel in m){ const e=root.querySelector(sel); if(e){ e.scrollTop=m[sel].t; e.scrollLeft=m[sel].l; } } }
function render(){
  renderNav(); renderCrumb();
  const c=document.getElementById("content");
  const cs=_captureScroll(c);
  c.innerHTML = state.view==="documents" ? renderDocuments()
              : state.view==="vehicles" ? renderVehicles()
              : state.view==="master" ? renderMaster()
              : state.view==="settings" ? renderSettings()
              : renderPlaceholder();
  if(state.view==="documents") setSelectAllState();
  _restoreScroll(c,cs);
  renderOverlay();
  renderBell();
  // アラートから遷移してきたら、対象ピックアップカードへスクロール＆一時ハイライト
  if(state.pickupHighlight && state.view==="vehicles"){
    const id="pk-"+state.pickupHighlight; state.pickupHighlight=null;
    setTimeout(()=>{ const el=document.getElementById(id); if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); el.classList.add("pk-flash"); setTimeout(()=>el.classList.remove("pk-flash"),1600); } },60);
  }
}
freezeReflectedLines();
seedChangelog();
// 連携アラートを localStorage から復元（無ければ初回連携でベースライン確立）
(function(){ const a=loadAlertState(); if(a){ state.alerts=a.alerts; state.seenAlertIds=a.seenAlertIds; state.prevCostMap=a.prevCostMap; state.prevPickup=a.prevPickup; } })();
// ベル外クリックで閉じる
document.addEventListener("mousedown",e=>{ if(state.bellOpen){ const host=document.getElementById("bell-host"); if(host && !host.contains(e.target)){ state.bellOpen=false; renderBell(); } } });
render();
</script>

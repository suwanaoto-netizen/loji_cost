        const up=Math.round(it.price*(0.97+_invRnd(seed+mi*3)*0.06));
        moves.push({id:mid++,...base,type:"in",ym,date:dd(ym,5),qty:it.inBase,unitPrice:up,amount:it.inBase*up,party:it.supplier,note:"仕入"});
      }
      // 出庫（消費／装着／貸出）
      if(it.outBase>0){
        const total=Math.max(1,Math.round(it.outBase*(0.82+_invRnd(seed+mi*7)*0.42)));
        if(it.cat==="equip"){
          // 荷役機材：貸出（拠点保有→取引先）。原価は購入時に拠点計上、ここでは在庫の移動のみ
          const party=_invParty(it,seed,mi);
          moves.push({id:mid++,...base,type:"out",ym,date:dd(ym,18),qty:total,unitPrice:it.price,amount:total*it.price,party,allocTo:"拠点",note:"貸出"});
          const nx=nextYm(ym); if(nx){ const r=Math.round(total*0.7); if(r>0) moves.push({id:mid++,...base,type:"in",ym:nx,date:dd(nx,3),qty:r,unitPrice:it.price,amount:r*it.price,party,note:"返却"}); }
        } else if(it.cat==="consum"){
          // 車両消耗品・法定備品：取付車両へ紐付け。原価は拠点コストに計上（車両側に対応原価項目が無いため）
          const party=_invParty(it,seed,mi);
          moves.push({id:mid++,...base,type:"out",ym,date:dd(ym,18),qty:total,unitPrice:it.price,amount:total*it.price,party,allocTo:"拠点",note:"取付"});
        } else {
          // 燃料・タイヤ：在庫を車両へ配賦＝車両コストへ計上。複数車両へ分配し、配賦しきれない分は拠点共通として拠点コストに残す
          const vs=_invVehicles(it.office);
          const commonQ=Math.max(0,Math.round(total*0.25));
          let rem=total-commonQ;
          const n=vs.length?Math.min(it.cat==="tire"?2:3,vs.length):0;
          for(let j=0;j<n&&rem>0;j++){
            const plate=vs[(seed+mi+j*3)%vs.length];
            const q=(j===n-1)?rem:Math.max(1,Math.round(rem/(n-j)*(0.8+_invRnd(seed+mi*5+j)*0.5)));
            const qq=Math.min(rem,q); rem-=qq; if(qq<=0)continue;
            moves.push({id:mid++,...base,type:"out",ym,date:dd(ym,15+j),qty:qq,unitPrice:it.price,amount:qq*it.price,party:plate,allocTo:"車両",note:it.cat==="tire"?"装着":"配賦"});
          }
          const commonTotal=commonQ+rem; // 配分端数も拠点共通へ寄せる
          if(commonTotal>0) moves.push({id:mid++,...base,type:"out",ym,date:dd(ym,20),qty:commonTotal,unitPrice:it.price,amount:commonTotal*it.price,party:"（拠点共通）",allocTo:"拠点",note:"拠点共通"});
        }
      }
    });
    // 紛失（荷役機材）：カゴ車で1件
    if(it.id==="E-CAGE-OKZ") moves.push({id:mid++,...base,type:"loss",ym:"2026-05",date:"2026-05-22",qty:2,unitPrice:it.price,amount:2*it.price,party:"丸和ロジ 春日井DC",note:"紛失"});
  });
  _INV={items:INV_ITEMS,moves};
  return _INV;
}
/* 1品目の在庫サマリー：現在庫・移動平均評価額・貸出中・直近入出庫 */
function invStock(id){
  const ms=buildInventory().moves.filter(m=>m.itemId===id);
  let qty=0,inQ=0,inA=0,onLoan=0;
  ms.forEach(m=>{
    if(m.type==="open"||m.type==="in"){ qty+=m.qty; if(m.type==="open"||m.note==="仕入"){inQ+=m.qty;inA+=m.amount;} }
    else if(m.type==="out"){ qty-=m.qty; }
    else if(m.type==="loss"){ qty-=m.qty; }
    if(m.cat==="equip"){ if(m.type==="out") onLoan+=m.qty; else if(m.type==="in"&&m.note==="返却") onLoan-=m.qty; }
  });
  const avg=inQ>0?inA/inQ:0;
  return {qty,onLoan:Math.max(0,onLoan),avg,value:Math.round(qty*avg)};
}

function linesOf(docId){ return LINES.filter(l=>l.docId===docId); }
/* 永続書類は LINES を参照。編集中ドラフトは自前の lines を保持するためそちらを優先 */
function docLines(d){ return d.lines || linesOf(d.id); }

function writeLines(docId, lines){
  for(let i=LINES.length-1;i>=0;i--){ if(LINES[i].docId===docId) LINES.splice(i,1); }
  (lines||[]).forEach(l=>{ const c=JSON.parse(JSON.stringify(l)); c.docId=docId; LINES.push(c); });
}

const DOC_NUMKEYS=new Set(["no","lines","amount"]);
function applyDocSort(list){
  const s=state.docSort;
  if(!s.key) return list.sort((a,b)=>b.no-a.no);
  const dir=s.dir==="asc"?1:-1;
  const val=d=>{switch(s.key){
    case "no":return d.no;
    case "status":return ({"未入力":0,"入力済み":1,"連携済み":2})[d.status];
    case "name":return d.name;
    case "cat":return d.category||"";
    case "vendor":return d.vendor;
    case "date":return docDate(d);
    case "lines":return docLines(d).length;
    case "amount":return docTotal(d);
    default:return d.no;
  }};
  return list.sort((a,b)=>{const va=val(a),vb=val(b);
    if(va<vb)return -dir; if(va>vb)return dir; return a.no-b.no;});
}
function setDocSort(key){const s=state.docSort;
  if(s.key===key) s.dir=s.dir==="asc"?"desc":"asc";
  else {s.key=key; s.dir=DOC_NUMKEYS.has(key)?"desc":"asc";}
  state.docPage=1; refreshDocBody();}
function thDoc(key,label,cls){
  const a=state.docSort.key===key;
  const ar=a?(state.docSort.dir==="asc"?`<span class="ar">▲</span>`:`<span class="ar">▼</span>`):`<span class="ar-dim">⇅</span>`;
  return `<th class="sortable ${cls||""} ${a?"sorted":""}" onclick="setDocSort('${key}')"><span class="th-in">${label}${ar}</span></th>`;
}
function visibleDocs(){
  let list=docs.filter(d=>d.deleted===state.trash);
  if(!state.trash && state.statusSel.length) list=list.filter(d=>state.statusSel.includes(d.status));
  if(state.categoryFilter!=="all") list=list.filter(d=>(d.category||"")===state.categoryFilter);
  if(state.q.trim()){const q=state.q.trim().toLowerCase();
    list=list.filter(d=>(d.vendor+d.name+(d.category||"")).toLowerCase().includes(q));}
  return applyDocSort(list);
}
function setCategoryFilter(v){ state.categoryFilter=v; state.selected.clear(); state.bulkMenu=false; state.docPage=1; render(); }
function renderDocuments(){
  const counts={"未入力":0,"入力済み":0,"連携済み":0};

      return `<button type="button" class="stchip ${STATUS_META[s].cls} ${on?"on":""}" aria-pressed="${on}" aria-label="${s}${showCount?` ${counts[s]}件`:""}${on?"（絞り込み中）":""}" onclick="toggleStatus('${s}')"><span class="dot"></span>${s}${showCount?`<span class="n">${counts[s]}</span>`:""}${on?'<span class="ck" aria-hidden="true">✓</span>':""}</button>`;
    }).join("")}
  </div>`;
  const catSel=`<div class="filter-sel"><span class="fs-l">${I.boxes("#5A6472",14)} 営業所</span>
    <select onchange="setCategoryFilter(this.value)"><option value="all" ${state.categoryFilter==="all"?"selected":""}>すべて</option>
      ${CATEGORIES.map(c=>`<option value="${esc(c)}" ${state.categoryFilter===c?"selected":""}>${esc(c)}</option>`).join("")}</select></div>`;
  const toolbar=`<div class="toolbar">

    <div class="tb-spacer"></div>
    <button class="trash-toggle ${state.trash?"on":""}" onclick="toggleTrash()">${I.trash(state.trash?"#B23A2E":"#5A6472",13)} ゴミ箱<span style="font-family:var(--mono);font-size:10px;background:rgba(0,0,0,.06);padding:0 6px;border-radius:999px">${trashCount}</span></button>
  </div>`;

  return head+toolbar+`<div id="doc-body" class="doc-body">${renderDocBody()}</div>`;
}

function docPageInfo(){
  const list=visibleDocs(); const per=state.docPerPage;
  const pages=Math.max(1,Math.ceil(list.length/per));
  if(state.docPage>pages) state.docPage=pages;
  if(state.docPage<1) state.docPage=1;
  const start=(state.docPage-1)*per;
  return {list,total:list.length,per,pages,page:state.docPage,start,slice:list.slice(start,start+per)};
}
function pager(kind,info){
  if(info.total===0) return "";
  const start=info.start+1, end=Math.min(info.start+info.per,info.total);
  const perFn={doc:"setDocPerPage",veh:"setVehPerPage",master:"setMasterPerPage"}[kind];
  const pageFn={doc:"setDocPage",veh:"setVehPage",master:"setMasterPage"}[kind];
  const opts=[20,50,100].map(n=>`<option value="${n}" ${n===info.per?"selected":""}>${n}</option>`).join("");
  return `<div class="pager">
    <span class="pg-range">全 <b>${info.total}</b> 件中 <b>${start}</b>–<b>${end}</b> 件を表示</span>
    <div class="pg-spacer"></div>
    <span class="pg-per">1ページあたり <select onclick="event.stopPropagation()" onchange="${perFn}(this.value)">${opts}</select> 件</span>
    <div class="pg-nav">
      <button class="pg-btn" ${info.page<=1?"disabled":""} onclick="${pageFn}(${info.page-1})">‹ 前へ</button>
      <span class="pg-cur">${info.page} / ${info.pages}</span>
      <button class="pg-btn" ${info.page>=info.pages?"disabled":""} onclick="${pageFn}(${info.page+1})">次へ ›</button>
    </div></div>`;
}
function setDocPage(p){ state.docPage=+p; refreshDocBody(); }
function setDocPerPage(n){ state.docPerPage=+n; state.docPage=1; refreshDocBody(); }
function setVehPage(p){ state.vehPage=+p; render(); }
function setVehPerPage(n){ state.vehPerPage=+n; state.vehPage=1; render(); }
function setMasterPage(p){ state.masterPage=+p; render(); }
function setMasterPerPage(n){ state.masterPerPage=+n; state.masterPage=1; render(); }

function renderDocBody(){
  const info=docPageInfo();
  const list=info.list;
  const sv=list.filter(d=>state.selected.has(d.id));

  /* 上部：2件以上選択で一括処理バー、それ以外は件数 */
  let topbar;
  if(!state.trash && sv.length>=2){
    const enterable=sv.filter(d=>d.status==="未入力").length;
    const reflectable=sv.filter(d=>d.status==="入力済み").length;
    const officeable=sv.filter(d=>d.status!=="連携済み").length;
    topbar=`<div class="bulkbar">
      <span class="bb-count">${sv.length}件を選択中</span>
      <button class="bb-clear" onclick="clearSelection()">選択を解除</button>
      <div class="bulk-dd">
        <button class="bulk-btn" onclick="toggleBulkMenu()">一括処理 ${I.chev('#fff',14)}</button>
        ${state.bulkMenu?`<div class="bulk-scrim" onclick="toggleBulkMenu()"></div>
          <div class="bulk-menu">
            <button ${enterable?"":"disabled"} onclick="bulkMarkEntered()"><span class="lab">${I.check(enterable?'#0E5A40':'#9AA3AD',14,2.6)} 入力済みにする</span><span class="mc">未入力 ${enterable}件</span></button>
            <button ${reflectable?"":"disabled"} onclick="bulkReflect()"><span class="lab">${I.send(reflectable?'#0E5A40':'#9AA3AD',14)} データ連携する</span><span class="mc">入力済み ${reflectable}件</span></button>
            <button ${officeable?"":"disabled"} onclick="bulkChangeOffice()"><span class="lab">${I.boxes(officeable?'#0E5A40':'#9AA3AD',14)} 営業所を変更</span><span class="mc">選択 ${officeable}件</span></button>
            <button class="danger" onclick="bulkTrash()"><span class="lab">${I.trash('#B23A2E',14)} ゴミ箱へ移動</span><span class="mc">選択 ${sv.length}件</span></button>
          </div>`:""}
      </div></div>`;
  }else{
    const hint=(!state.trash&&sv.length===1)?`<span class="sel-hint">1件選択中（2件以上で一括処理が使えます）</span>`:"";
    const fsum=(!state.trash&&state.statusSel.length)?`<span class="filter-summary">絞り込み：${state.statusSel.join("・")}<button class="fs-clear" onclick="clearStatus()">クリア</button></span>`:"";
    topbar=`<p class="count-line">${state.trash?"ゴミ箱":"表示中"} <b>${list.length}</b> 件${fsum}${hint}</p>`;
  }

  if(list.length===0){
    return topbar+`<div class="twrap"><div class="empty">${state.trash?I.trash("#9AA3AD",30):I.cloud("#C0C7CF",44)}
      <div class="et">${state.trash?"ゴミ箱は空です":"該当する書類がありません"}</div>
      <div class="es">${state.trash?"削除した書類はここに移動します。":'右上の「新規アップロード」から請求書を取り込んでください。'}</div></div></div>`;
  }

  const cbCol=!state.trash;
  const rows=info.slice.map(d=>{
    const total=yen(docTotal(d));
    const act=state.trash
      ? `<button class="icon-btn restore" title="元に戻す" onclick="event.stopPropagation();restoreDoc('${d.id}')">${I.undo("#0E5A40",15)}</button>`
      : `<button class="icon-btn" title="ゴミ箱へ移動" onclick="event.stopPropagation();trashDoc('${d.id}')">${I.trash("#B23A2E",15)}</button>`;
    const isSel=state.selected.has(d.id);
    const isNew=state.justUploaded.has(d.id);
    const cb=cbCol?`<td class="c" onclick="event.stopPropagation()"><input type="checkbox" ${isSel?"checked":""} onclick="event.stopPropagation();toggleSelect('${d.id}')"></td>`:"";
    return `<tr class="${cbCol&&isSel?"sel":""}${isNew?" row-new":""}" onclick="openPanel('${d.id}')">${cb}
      <td class="no">${d.no}</td>
      <td>${state.trash?`<span class="st st-deleted"><span class="dot"></span>削除済み</span>`:statusChip(d.status)}</td>
      <td><div class="docname">${I.file("#177D58",16)}<span class="nm" title="${esc(d.name)}">${esc(d.name)}</span></div></td>
      <td>${officeChip(d.category)}</td>
      <td class="vendor">${esc(d.vendor)}</td>
      <td class="date">${docDate(d)}</td>
      <td class="lc">${docLines(d).length} 件</td>
      <td class="r">${total}</td>

    <tbody>${rows}</tbody></table></div>${pager("doc",info)}</div>`;
  return topbar+table;
}
function toggleStatus(s){const i=state.statusSel.indexOf(s);if(i>=0)state.statusSel.splice(i,1);else state.statusSel.push(s);state.selected.clear();state.bulkMenu=false;state.docPage=1;render();}
function clearStatus(){state.statusSel=[];state.selected.clear();state.bulkMenu=false;state.docPage=1;render();}
function setQuery(v){state.q=v;state.docPage=1; if(state.view==="documents") refreshDocBody();}
function refreshDocBody(){const b=document.getElementById("doc-body"); if(!b){render();return;} b.innerHTML=renderDocBody(); setSelectAllState();}
function setSelectAllState(){const cb=document.getElementById("cb-all"); if(!cb)return;
  const pg=docPageInfo().slice; const sel=pg.filter(d=>state.selected.has(d.id)).length;
  cb.checked=pg.length>0&&sel===pg.length; cb.indeterminate=sel>0&&sel<pg.length;}

/* ───── 選択・一括処理（全選択は現ページ単位） ───── */
function toggleSelect(id){ state.selected.has(id)?state.selected.delete(id):state.selected.add(id); refreshDocBody(); }
function toggleSelectAll(){ const pg=docPageInfo().slice; const all=pg.length>0&&pg.every(d=>state.selected.has(d.id));
  if(all) pg.forEach(d=>state.selected.delete(d.id)); else pg.forEach(d=>state.selected.add(d.id));
  refreshDocBody(); }
function clearSelection(){ state.selected.clear(); state.bulkMenu=false; refreshDocBody(); }
function toggleBulkMenu(){ state.bulkMenu=!state.bulkMenu; refreshDocBody(); }
function bulkMarkEntered(){ state.bulkMenu=false;
  const t=visibleDocs().filter(d=>state.selected.has(d.id)&&d.status==="未入力");
  if(t.length===0){ render(); toast("「未入力」の書類が選択されていません"); return; }
  state.enterConfirm={count:t.length}; renderOverlay(); }

/* ファイル選択（実ファイル）／ドラッグ＆ドロップ */
function pickFiles(){ if(state.upload.processing.active)return; const el=document.getElementById("upl-file"); if(el) el.click(); }
function makeUploadEntry(name){

  const k=ri(1,4), plates=sample(FLEET,k);

function handleUploadFiles(fileList){
  if(state.upload.processing.active)return;
  const arr=Array.from(fileList||[]);

  arr.forEach(f=>{ if(state.upload.files.length<100) state.upload.files.push(makeUploadEntry(f.name)); });

function uplDragOver(e){ e.preventDefault(); const dz=e.currentTarget; if(dz)dz.classList.add("drag"); }
function uplDragLeave(e){ const dz=e.currentTarget; if(dz)dz.classList.remove("drag"); }
function uplDrop(e){ e.preventDefault(); const dz=e.currentTarget; if(dz)dz.classList.remove("drag");
  if(state.upload.processing.active)return;
  const fl=e.dataTransfer&&e.dataTransfer.files; if(fl&&fl.length) handleUploadFiles(fl); }
function useSampleFiles(){ if(state.upload.processing.active)return; uploadBatch().forEach(f=>state.upload.files.push(f)); renderOverlay(); }
function doUpload(){
  const u=state.upload; if(u.files.length===0)return;
  // 同一書類名の重複を自動検知。重複があれば確認モーダルを表示し、含める書類を選んでもらう。
  const items=[]; u.files.forEach((f,i)=>{ const doc=findDupDoc(f.name); if(doc) items.push({i, name:f.name, doc}); });
  if(items.length){ u.dupAlert={items, checked:{}}; renderOverlay(); return; }
  startUploadProgress();
}
/* 既存書類（ゴミ箱を除く）と書類名が完全一致するものを重複とみなす。 */
function findDupDoc(name){ return docs.find(d=>!d.deleted && d.name===name); }
function dupToggle(i){ const da=state.upload.dupAlert; if(!da)return; da.checked[i]=!da.checked[i]; renderOverlay(); }
function dupCancel(){ state.upload.dupAlert=null; renderOverlay(); }
function dupConfirm(){
  const u=state.upload, da=u.dupAlert; if(!da)return;
  const dupIdx=new Set(da.items.map(x=>x.i));
  // 重複でない書類は常に含め、重複書類はチェックされたものだけ含める。
  u.files=u.files.filter((f,i)=> !dupIdx.has(i) || da.checked[i]);
  u.dupAlert=null;
  if(u.files.length===0){ closeUpload(); toast("アップロードする書類がありません"); return; }
  startUploadProgress();
}
function startUploadProgress(){
  const u=state.upload; if(u.files.length===0)return;
  u.processing={active:true,pct:0,label:u.ocr?"データ化中（AI-OCR / 明細OCR）":"ファイルを保存中…"};
  renderOverlay();
  u._timer=setInterval(()=>{
    u.processing.pct=Math.min(100,u.processing.pct+5+Math.random()*6);
    const fill=document.getElementById("up-fill"); if(fill)fill.style.width=u.processing.pct+"%";
    const pct=document.getElementById("up-pct"); if(pct)pct.textContent=Math.round(u.processing.pct)+"%";
    if(u.processing.pct>=100){clearInterval(u._timer);setTimeout(finishUpload,360);}
  },170);
}
/* ───── 重複アラート（同一書類名を自動検知。含める書類をチェックで選択） ───── */
function renderDupAlert(){
  const u=state.upload, da=u.dupAlert; if(!da) return "";
  const total=u.files.length, dupCount=da.items.length;
  const rows=da.items.map(it=>{
    const d=it.doc;
    const meta=[d.vendor, d.category||"営業所未選択", d.status].filter(Boolean).map(esc).join("・");

      <input type="checkbox" ${da.checked[it.i]?"checked":""} onchange="dupToggle(${it.i})">
      <div class="dup-main">

        <div class="dup-sub">・ <span class="dup-no">No.${d.no}</span> ${meta}</div>
      </div>

  }).join("");
  return `<div class="ovl ${state._ovFresh?'anim':''}" style="z-index:80" onclick="if(event.target===this)dupCancel()"><div class="modal" style="width:min(560px,100%)">

      <p class="dup-lead">今回選択した書類全${total}件のうち${dupCount}件が、すでに同じ書類名で保存されています。<br>アップロードに含める書類をチェックしてください。</p>
      <div class="dup-list">${rows}</div>
    </div>
    <div class="m-foot">
      <button class="btn-cancel" onclick="dupCancel()">キャンセル</button>
      <button class="btn-upload" onclick="dupConfirm()">アップロード</button>
    </div>
  </div></div>`;
}
function finishUpload(){
  const u=state.upload;
  const newIds=[];
  u.files.forEach(f=>{
    const id="d"+(docs.length+1)+"-"+Date.now()+"-"+newIds.length;
    docs.push({id, no:NEXT_NO++, deleted:false, reflectedAt:null,
      name:f.name, vendor:u.ocr?f.vendor:"", cat:f.cat, category:u.category||"", status:"未入力", pages:f.pages||1});
    const fl=u.ocr?f.lines:f.lines.map(l=>({...l,plate:"",vendor:""}));
    fl.forEach(l=>{ l.docId=id; LINES.push(l); });
    newIds.push(id);
  });
  const added=u.files.length;
  state.upload={open:false,tab:"new",files:[],ocr:true,category:"",processing:{active:false,pct:0,label:""},_timer:null};
  state.splitUpload=freshSplitUpload();
  state.trash=false; state.statusSel=[]; state.categoryFilter="all"; state.view="documents"; state.docPage=1;
  state.justUploaded=new Set(newIds);
  render();
  toast(`${added}件の書類をデータ化しました（ステータス：未入力）`);
  setTimeout(()=>{ state.justUploaded=new Set(); if(state.view==="documents") render(); }, 3200);
}

  const s=state.splitUpload, ocr=s.ocr;

  const base=(s.file&&s.file.name||"無題.pdf").replace(/\.pdf$/i,"");
  const newIds=[];
  groups.forEach((g,gi)=>{
    const ent=makeUploadEntry(base+(groups.length>1?`（${gi+1}）.pdf`:".pdf"));
    const id="d"+(docs.length+1)+"-"+Date.now()+"-"+newIds.length;
    docs.push({id, no:NEXT_NO++, deleted:false, reflectedAt:null,
      name:ent.name, vendor:ocr?ent.vendor:"", cat:"請求書", category:s.category||"", status:"未入力"});
    const fl=ocr?ent.lines:ent.lines.map(l=>({...l,plate:"",vendor:""}));
    fl.forEach(l=>{ l.docId=id; LINES.push(l); });

  });
  const added=groups.length;
  state.upload={open:false,tab:"new",files:[],ocr:true,category:"",processing:{active:false,pct:0,label:""},_timer:null};
  state.splitUpload=freshSplitUpload();
  state.trash=false; state.statusSel=[]; state.categoryFilter="all"; state.view="documents"; state.docPage=1;
  state.justUploaded=new Set(newIds);
  render();
  toast(`${added}件の書類をデータ化しました（ステータス：未入力）`);

}

function aiSparkle(){return `<svg width="16" height="16" viewBox="0 0 24 24" fill="#177D58" aria-hidden="true"><path d="M12 2l1.7 5.1a3 3 0 0 0 1.9 1.9L20.7 11l-5.1 1.7a3 3 0 0 0-1.9 1.9L12 19.7l-1.7-5.1a3 3 0 0 0-1.9-1.9L3.3 11l5.1-1.7a3 3 0 0 0 1.9-1.9z"/></svg>`;}
/* 左ペイン（書類詳細パネルの左半分）に表示する確認UI。右の請求書プレビューには触れない */
function renderAiPaneInner(){
  const d=state.draft, ac=state.aiConfirm; if(!d||!ac) return "";
  const lines=d.lines||[];
  const yenU=n=>Number(n||0).toLocaleString('ja-JP')+" 円";
  const grandTotal=lines.filter(l=>ac.sel.has(l.lid)).reduce((s,l)=>s+(+l.amount||0),0);
  const pages=aiPagesOf(lines, d.pages);
  const multi=pages.length>1;
  if(!ac.openPages) ac.openPages=new Set([ac.previewPage||0]);
  const colSel=`<div class="ai-colsel">金額に反映する列
      <select onchange="aiSetCol(this.value)"><option ${ac.col==="金額"?"selected":""}>金額</option><option ${ac.col==="単価"?"selected":""}>単価</option></select>
      <span class="ai-auto">基本は自動</span></div>`;
  const tableFor=(pageLines,pIdx)=>{
    const allOn=pageLines.length>0 && pageLines.every(l=>ac.sel.has(l.lid));
    const rows=pageLines.map((l)=>{
      const gi=lines.indexOf(l)+1; const on=ac.sel.has(l.lid); const amt=(+l.amount).toLocaleString('ja-JP');
      return `<tr class="${on?'on':''}">
        <td class="aic-c"><input type="checkbox" ${on?'checked':''} onchange="aiToggleLine(${l.lid})"></td>
        <td class="r aic-no">${gi}</td>
        <td>${esc(l.item||'—')}</td>
        <td class="mono">${esc(l.plate||'（対象なし）')}</td>
        <td class="r mono aic-amt">${amt}</td></tr>`;
    }).join("");
    return `<div class="ai-tblwrap"><table class="ai-tbl">
      <thead><tr><th class="aic-c"><input type="checkbox" ${allOn?"checked":""} onchange="aiToggleAll(${pIdx})"></th><th class="r">No.</th><th>項目</th><th>対象車両</th><th class="r">金額</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  };
  let body;
  if(!multi){
    body=`<div class="ai-page">ページ 1-1：<b>${yenU(grandTotal)}</b> 選択済み</div>${colSel}${tableFor(pages[0],0)}`;
  } else {
    body=colSel+pages.map((pg,idx)=>{
      const open=ac.openPages.has(idx);
      const pageSel=pg.filter(l=>ac.sel.has(l.lid)).reduce((s,l)=>s+(+l.amount||0),0);
      const active=(ac.previewPage||0)===idx;
      return `<div class="ai-pagebox ${active?'active':''}">
        <div class="ai-pagehd" onclick="aiTogglePage(${idx})">
          <span class="ai-pgcv ${open?'open':''}">${I.chev("#5A6472",13)}</span>
          <span class="ai-pglab">ページ 1-${idx+1}：<b>${yenU(pageSel)}</b> 選択済み</span>
          <button class="ai-showpage" onclick="event.stopPropagation();aiShowPage(${idx})">該当ページを表示</button>
        </div>
        ${open?tableFor(pg,idx):''}
      </div>`;
    }).join("");
  }
  return `<div class="ai-sechead">${aiSparkle()} AIで読み取られた明細を確認</div>
    ${body}
    <div class="ai-sum"><span class="lab">反映する金額の合計</span><span class="v">${yenU(grandTotal)}</span></div>
    <div class="ai-foot">
      <span class="spacer"></span>
      <button class="btn-green" onclick="aiReflect()">${I.send()} 反映</button></div>`;
}
/* 明細選択・ページ開閉は左ペインのみ再描画（請求書プレビューは再描画しない） */
function refreshAiLeft(){ const el=document.getElementById("ai-pane"); if(el){ el.innerHTML=renderAiPaneInner(); } else { renderOverlay(); } }
function aiToggleLine(lid){ const ac=state.aiConfirm; if(!ac)return; ac.sel.has(lid)?ac.sel.delete(lid):ac.sel.add(lid); refreshAiLeft(); }
function aiToggleAll(pageIdx){ const ac=state.aiConfirm,d=state.draft; if(!ac||!d)return; const pages=aiPagesOf(d.lines, d.pages); const scope=(pageIdx!=null&&pages[pageIdx])?pages[pageIdx]:d.lines; const all=scope.length>0&&scope.every(l=>ac.sel.has(l.lid)); if(all)scope.forEach(l=>ac.sel.delete(l.lid)); else scope.forEach(l=>ac.sel.add(l.lid)); refreshAiLeft(); }

function aiShowPage(idx){ const ac=state.aiConfirm; if(!ac)return; ac.previewPage=idx; if(!ac.openPages)ac.openPages=new Set(); ac.openPages.add(idx);
  const w=document.getElementById("pv-page-wrap"); if(w&&state.draft) w.innerHTML=buildPreview(state.pvOriginal||state.draft, idx);

function aiSetCol(v){ if(state.aiConfirm) state.aiConfirm.col=v; }
function aiReflect(){
  const ac=state.aiConfirm, d=state.draft; if(!ac||!d){ state.aiConfirm=null; renderOverlay(); return; }
  const kept=d.lines.filter(l=>ac.sel.has(l.lid));

  d.lines=kept; d._ocr=ocrAmountCandidates(d.lines);
  const real=docs.find(x=>x.id===state.panelId);
  if(real){ writeLines(real.id, d.lines); if(real.status==="未入力"){ real.status="入力済み"; } d.status=real.status; }
  state.aiConfirm=null;
  render();   // 左ペインが明細フォーム（画像2）へ切替、右の請求書プレビューはそのまま
  toast(`${kept.length}件の明細を反映しました`);
}
function panelNav(delta){

function renderPanel(){

/* 明細をページ分割（デモ用の複数ページ表現）。
   書類に pages 指定があればその枚数へ均等割り、なければ AI_PAGE_SIZE 件ずつ分割 */
const AI_PAGE_SIZE=5;
function aiPagesOf(lines, pageCount){
  const out=[];
  if(pageCount && pageCount>1 && lines.length>0){
    const per=Math.ceil(lines.length/pageCount);
    for(let i=0;i<lines.length;i+=per) out.push(lines.slice(i,i+per));
    while(out.length<pageCount) out.push([]);
    return out;
  }
  for(let i=0;i<lines.length;i+=AI_PAGE_SIZE) out.push(lines.slice(i,i+AI_PAGE_SIZE));
  return out.length?out:[[]];
}
function buildPreview(d, pageIdx){
  const allLines=docLines(d);
  const pages=aiPagesOf(allLines, d.pages);
  const multi=pages.length>1;
  const usePage = multi && pageIdx!=null;
  const idx = usePage ? Math.max(0,Math.min(pageIdx,pages.length-1)) : 0;
  const shown = usePage ? pages[idx] : allLines;
  const isLast = !usePage || idx===pages.length-1;
  const sub=docTotal(d), tax=Math.round(sub*0.1), total=sub+tax;
  const lines=shown.map(l=>`<tr><td><span class="mk mk-g">${esc(l.item)}</span>
      <div class="iv-veh"><span class="mk mk-r">車番 ${esc(l.plate||"—")}</span></div></td>
    <td class="r">1</td><td class="r"><span class="mk mk-b">${yen(l.amount)}</span></td></tr>`).join("");
  const z=state.pvZoom/100;
  const pageBadge = usePage ? `<span class="iv-pageno">ページ ${idx+1} / ${pages.length}</span>` : "";
  const sumBlock = isLast
    ? `<div class="iv-sum"><div><span>小計</span><span>${yen(sub)}</span></div>
      <div><span>消費税(10%)</span><span>${yen(tax)}</span></div>
      <div class="iv-total"><span>合計</span><span>${yen(total)}</span></div></div>`
    : `<div class="iv-cont">次ページへ続く ›</div>`;
  return `<div class="pv-page" style="transform:scale(${z})">
    <div class="iv-h"><div><div class="iv-title">請求書</div><div class="iv-no">No. INV-2026-${String(1000+d.no)}</div></div>
      <div class="iv-issuer"><b>${esc(d.vendor||"（取引先 未読取）")}</b><br><span>登録番号 T1234567890123</span><br><span>名古屋市中区錦1-2-3</span></div></div>
    <div class="iv-to">${esc(state.settings.companyName)} 御中</div>
    <div class="iv-meta">発行日：${docDate(d)}　／　お支払期限：翌月末 ${pageBadge}</div>
    <table class="iv-tbl"><thead><tr><th>項目</th><th class="r">数量</th><th class="r">金額</th></tr></thead><tbody>${lines}</tbody></table>
    ${sumBlock}
  </div>`;
}

function downloadOriginal(docId){

<body style="font-family:sans-serif;max-width:680px;margin:30px auto;color:#1B2330">

function pnLine(lid,field,val){
  const l=state.draft.lines.find(x=>x.lid===lid); if(!l)return;

  else if(field==="liters"||field==="unitPrice"){ const s=String(val).replace(/[^0-9.]/g,""); l[field]=s===""?null:parseFloat(s); }
  else if(field==="meisai"){

    l.meisai=val||"";
  }
  else if(field==="komoku"){

    l.komoku=val; const idx=KOMOKU_INDEX[val]; if(idx) l.cat=idx.legacyCat;

/* 原価項目セレクトの選択肢（原価分類でグルーピング。車両／拠点の両モデルから生成） */
function komokuOptions(cur){

  ALL_COST_MODEL.forEach(g=>{ const k=g.scope+"｜"+g.bunrui; if(!groups[k]){groups[k]=[];order.push(k);} groups[k].push(g.komoku); });

  return `<option value="" ${cur?"":"selected"}>（未分類）</option>${opts}`;
}

/* 車番：2文字以上一致する登録車番の候補（一致順）＋「対象なし」 */
function _lcsLen(a,b){ a=a||""; b=b||""; if(!a||!b) return 0; let best=0; const dp=Array(b.length+1).fill(0);
  for(let i=1;i<=a.length;i++){ let prev=0; for(let j=1;j<=b.length;j++){ const tmp=dp[j];
    dp[j]= a[i-1]===b[j-1] ? prev+1 : 0; if(dp[j]>best)best=dp[j]; prev=tmp; } }
  return best; }
function plateSuggestHTML(lid,val){
  const v=(val||"").trim();
  let html=`<div class="sug-opt none" onmousedown="pnPickPlate(${lid},'')">対象なし</div>`;
  const matches=[...MASTER].map(p=>({p,s:_lcsLen(v,p)})).filter(x=>x.s>=2).sort((a,b)=>b.s-a.s);
  html+=matches.map(x=>`<div class="sug-opt" onmousedown="pnPickPlate(${lid},'${esc(x.p)}')">${esc(x.p)}</div>`).join("");
  if(matches.length===0 && v.length>=2) html+=`<div class="sug-empty">一致する登録車番がありません</div>`;
  return html;
}
function pnPlateInput(lid,val){

/* ───── データ連携 ───── */
function buildPlanFromLines(allLines){
  const lines=[]; let vid=10290;
  const ws=allLines.map(l=>({l,st:matchOf(l)}));
  // 新規車両マスタの自動作成は high-confidence の未登録（new）のみ。低信頼度（suspect）は自動作成しない。
  const vNew=ws.filter(x=>x.st==="new"&&(x.l.plate||"").trim());
  [...new Set(vNew.map(x=>x.l.plate))].forEach(p=>{vid++;
    lines.push({phase:1,text:`POST /vehicles  新規車両マスタ ${p}`,ok:`→ vehicle_id: V-${vid} を発行`});
    vNew.filter(x=>x.l.plate===p).forEach(x=>lines.push({phase:2,text:`POST /costs  V-${vid} ← ${x.l.item}${subcatTag(x.l)}`,ok:`→ ${yen(x.l.amount)} を紐付け`}));});
  // 既存マスタへの追記。低信頼度で一致した行（existing-suspect）は追記するが要確認を明示。
  ws.filter(x=>x.st==="existing"||x.st==="existing-suspect").forEach(x=>{
    const warn=x.st==="existing-suspect"?"（要確認）":"";
    lines.push({phase:2,text:`POST /costs  ${x.l.plate} ← ${x.l.item}${subcatTag(x.l)}`,ok:`→ ${yen(x.l.amount)} を既存マスタに追記${warn}`});});
  // 車両を特定できない低信頼度の読み取りはスキップ（自動作成も追記もしない）。
  ws.filter(x=>x.st==="suspect").forEach(x=>
    lines.push({phase:2,text:`SKIP  ${x.l.item}（車番要確認）`,ok:`→ 読み取り信頼度が低いため連携をスキップ`}));
  return lines;
}
/* 連携前の要確認件数（suspect / existing-suspect の明細数） */
function countUnresolved(allLines){ return (allLines||[]).filter(l=>{const s=matchOf(l);return s==="suspect"||s==="existing-suspect";}).length; }

/* ───── 重複書類の検知（車番・金額・発生日が完全一致する明細を1件でも持つ書類） ───── */
function dupSignature(l){ return normPlate(l.plate)+"|"+l.amount+"|"+l.inspectedAt; }
/* 比較対象は連携済み（非ゴミ箱）の明細のみ。車番が空の明細はアンカーにしない。 */
function buildReflectedSignatures(){
  const sig=new Set();
  docs.filter(d=>d.status==="連携済み"&&!d.deleted).forEach(d=>{
    docLines(d).forEach(l=>{ if(normPlate(l.plate)) sig.add(dupSignature(l)); });
  });
  return sig;
}
function linesHaveDuplicate(lines, sig){ return (lines||[]).some(l=>normPlate(l.plate)&&sig.has(dupSignature(l))); }
function findDuplicateDocs(cands, sig){ return cands.filter(c=>linesHaveDuplicate(c.lines, sig)).map(c=>c.id); }
function toggleReflectIncludeDups(v){ if(state.reflectConfirm) state.reflectConfirm.includeDups=v; renderOverlay(); }

/* 単一・一括 共通の連携ログ。units=[{name,lines}] */
function runReflect(units, doneLabel, onFinish){
  const plan=[];
  const multi=units.length>1;
  units.forEach(u=>{
    if(multi) plan.push({header:true,text:u.name});
    buildPlanFromLines(u.lines).forEach(x=>plan.push(x));
  });
  state._reflectFinish=onFinish;
  const ov=document.getElementById("overlay");
  const delay=plan.length>16?170:380;
  /* シェルは一度だけ生成（毎ステップ作り直すとフェードが再生され点滅するため） */
  ov.innerHTML=`<div class="ovl anim"><div class="log-modal">
    <div class="mh">${I.db("#D98A1F",18)}<span style="font-weight:800;font-size:15px">データ連携ログ</span>
      <span class="order">① マスタ登録 → ② コスト書込</span></div>
    <div class="log" id="reflect-log"></div>
    <div class="mf" id="reflect-foot"></div></div></div>`;
  const logEl=document.getElementById("reflect-log");
  const footEl=document.getElementById("reflect-foot");
  let done=0;
  const draw=()=>{
    const finished=done>=plan.length;
    logEl.innerHTML = plan.length ? plan.map((l,i)=>{
      const stt=i<done?"ok":i===done?"run":"wait";
      if(l.header){
        return `<div class="logline ${stt==='wait'?'wait':''}"><span class="mk2"></span><div class="log-doc">${I.file('#FFD79A',13)}${esc(l.text)}</div></div>`;
      }
      const mk=stt==="ok"?I.check("#6FCF97",15,3):stt==="run"?I.loader("#D9E2EC",15):"·";
      const okline=stt==="ok"?`<div class="okline">${esc(l.ok)}</div>`:"";
      const tag=l.phase===1?`<span class="tag1">[STEP1]</span>`:`<span class="tag2">[STEP2]</span>`;
      return `<div class="logline ${stt==='wait'?'wait':''}"><span class="mk2">${mk}</span>
        <div><div>${tag}${esc(l.text)}</div>${okline}</div></div>`;
    }).join("") : '<div style="color:rgba(255,255,255,.6)">書き込む明細がありません</div>';
    footEl.innerHTML = finished
      ? `${I.checkc("#6FCF97",18)}<span>${esc(doneLabel)}</span>
         <button class="btn-green" style="margin-left:auto" onclick="closeReflect()">閉じる</button>`
      : `${I.loader("#D98A1F",16)}<span style="color:rgba(255,255,255,.7);font-weight:400">書き込み中… ${Math.min(done,plan.length)}/${plan.length}</span>`;
    logEl.scrollTop=logEl.scrollHeight;
  };
  draw();
  const tick=()=>{ if(done>=plan.length) return; done++; draw(); setTimeout(tick,delay); };
  if(plan.length>0) setTimeout(tick,delay);
}
function closeReflect(){ const f=state._reflectFinish; state._reflectFinish=null; if(f)f(); recomputeAlerts(); }

function reflectPanel(){
  const d=docs.find(x=>x.id===state.panelId); if(!d||d.status!=="入力済み")return;

      <div class="ce-warn">${I.alert("#B87514",18)}<div>

/* ───── コストモニター（連携済み書類＋手動明細を集計） ───── */
function buildVehicles(catFilter, range){
  const cf=catFilter||"all";
  const inR = (range&&range.start&&range.end) ? (dt=>dt&&dt>=range.start&&dt<=range.end) : (()=>true);
  const map=new Map();
  const ensure=(key,kind,target)=>{ if(!map.has(key)) map.set(key,{key,kind,target,total:0,byCat:{},count:0,last:"",lines:[],fuso:null}); return map.get(key); };
  const add=(e,line)=>{ e.total+=(+line.amount||0); e.byCat[line.cat]=(e.byCat[line.cat]||0)+(+line.amount||0); e.count++;
    if(line.date>e.last)e.last=line.date; e.lines.push(line); if(line.fuso&&!e.fuso)e.fuso=line.fuso; };
  const adjIdx=new Map(); ADJUSTMENTS.forEach(a=>{ if(a.type==="override") adjIdx.set(adjKey(a.docId,a.lid),a); }); // override 調整の索引
  docs.filter(d=>d.status==="連携済み"&&!d.deleted).forEach(d=>{
    if(cf!=="all" && (d.category||"")!==cf) return;
    linesOf(d.id).forEach(l=>{
      const eff=effDocLine(l,d.id,adjIdx); // 凍結された元明細 ＋ override 調整 ＝ 実効値
      if(!inR(eff.inspectedAt)) return;
      { const _k=lineKomoku(eff); if(KOMOKU_INDEX[_k]&&KOMOKU_INDEX[_k].scope==="拠点") return; } // 拠点コストは車両集計から除外
      // 集計キーは不変の車両ID。確定済みなら焼き付けた vehicleId を、未焼き付けなら現在のマスタ突合で解決する。
      const vid=l.vehicleId||resolveVehicleId(l.plate);
      const mv=vehicleById(vid);
      const target=mv?mv.plate:(l.plate||"未設定"); // 表示はマスタの正規plate（OCRゆらぎを吸収）
      const key=vid||(normPlate(l.plate)?"U:"+normPlate(l.plate):"未設定"); // 未登録は正規化plateで暫定集計
      add(ensure(key,"単車",target),{lid:l.lid,src:"doc",docId:d.id,item:eff.item,cat:eff.cat,komoku:eff.komoku,date:eff.inspectedAt,amount:+eff.amount,vendor:d.vendor,doc:d.name,office:d.category,fuso:l.fuso});
    });
  });
  state.manualLines.forEach(m=>{ if(cf!=="all" && (m.office||"")!==cf) return; if(!inR(m.date)) return;
    { const _k=lineKomoku(m); if(KOMOKU_INDEX[_k]&&KOMOKU_INDEX[_k].scope==="拠点") return; }
    add(ensure(m.vkey,m.kind,m.target),{lid:m.id,src:"manual",item:m.item,cat:m.cat,komoku:m.komoku,date:m.date,amount:+m.amount,vendor:m.vendor||"手動追加",doc:"手動追加",office:m.office||""});
  });
  return [...map.values()].sort((a,b)=>b.total-a.total);
}
/* 車両内訳の編集（元データに反映） */
function vehEditDocLine(docId,lid,field,val){
  const l=LINES.find(x=>x.docId===docId && x.lid===lid); if(!l)return;
  if(field==="komoku"){ // 原価項目を変更：原価項目と、既存集計用の legacyCat を同時に override 記録
    setOverride(docId, lid, "komoku", val, l);

  }

  const v  = field==="amount" ? (parseInt(String(val).replace(/[^0-9]/g,""))||0) : val;
  setOverride(docId, lid, lf, v, l); // 元データ（凍結済み）は変更せず override 調整として記録

}

/* 車両の営業所を設定（明細の営業所を一括更新。主にコストモニターの絞り込みに使用） */
/* 初期値：車両マスタの営業所と連動。マスタ未設定なら明細で最も多い営業所を採用する。 */
function vehCurrentOffice(key){
  const v=buildVehicles("all").find(x=>x.key===key);
  const plate=v?v.target:(vehicleById(key)?vehicleById(key).plate:String(key).replace(/^[VUS]:/,""));
  const mv=VEHICLE_MASTER.find(x=>x.plate===plate);
  if(mv&&mv.office) return mv.office;
  if(!v) return "";
  const counts={};
  v.lines.forEach(l=>{ const o=l.office||""; if(o) counts[o]=(counts[o]||0)+1; });
  let best="",bestN=0;
  Object.keys(counts).forEach(o=>{ if(counts[o]>bestN){ bestN=counts[o]; best=o; } });
  return best;
}
function vehEditVehicleOffice(key,office){
  const v=buildVehicles("all").find(x=>x.key===key); if(!v) return;
  const docIds=new Set();
  v.lines.forEach(l=>{
    if(l.src==="manual"){ const m=state.manualLines.find(x=>String(x.id)===String(l.lid)); if(m) m.office=office; }
    else if(l.docId) docIds.add(l.docId);
  });
  docIds.forEach(id=>{ const d=docs.find(x=>x.id===id); if(d) d.category=office; });
  const mv=VEHICLE_MASTER.find(x=>x.plate===v.target); if(mv) mv.office=office; // 車両マスタと連動
  if(state.vehCategoryFilter!=="all") state.vehCategoryFilter=office||"all";
  render();
}

/* ───── 車両分析サイドパネル ───── */
function _hash(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function _mulberry(seed){ let a=seed>>>0; return ()=>{ a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
/* コスト分類ごとの月次目安額・発生特性（デモ用の決定論ジェネレータ） */
const CAT_BASE={
  "燃料費":{amt:52000,freq:1.0,jit:.28},
  "修繕・維持費":{amt:36000,freq:.55,jit:.5,spike:.12,spikeAmt:118000},
  "通行料":{amt:24000,freq:.92,jit:.3},
  "保険料":{amt:13500,freq:.16,jit:.12},
  "調達コスト":{amt:82000,freq:1.0,jit:.05},
  "税金":{amt:39500,freq:0,jit:.1,yearMonth:5},
};
/* 実明細＋約3年分の決定論的な履歴イベントを生成（実データのある月×分類は実データを優先） */
function genVehEvents(v){
  const rnd=_mulberry(_hash("veh:"+v.target));
  const slope=(rnd()*0.03)-0.006; // 車両ごとに修繕費の増減傾向を変える
  const cats=Object.keys(v.byCat).length?Object.keys(v.byCat):["修繕・維持費","燃料費"];
  const real=v.lines.map(l=>({date:l.date,cat:l.cat,komoku:l.komoku,amount:+l.amount||0,item:l.item,vendor:l.vendor||"",src:l.src==="manual"?"manual":"doc"}));
  const realKey=new Set(real.map(r=>(r.date||"").slice(0,7)+"|"+r.cat));
  const ev=real.slice();
  for(let back=35;back>=0;back--){
    const d=new Date(2026,5-back,1);
    const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const mi=35-back;
    cats.forEach(cat=>{
      const b=CAT_BASE[cat]; if(!b) return;
      if(realKey.has(ym+"|"+cat)) return;
      if(b.yearMonth){ if(d.getMonth()+1!==b.yearMonth) return; }
      else if(rnd()>b.freq) return;
      const items=GEN_ITEMS[cat]||["コスト"];
      let amt;
      if(b.spike && rnd()<b.spike){ amt=b.spikeAmt*(0.8+rnd()*0.5); }
      else { const trend=Math.max(.6,1+mi*slope); amt=b.amt*trend*(1-b.jit+rnd()*b.jit*2); }
      const vn=(GEN_VENDORS.find(g=>g.cat.includes(cat))||{}).n||"";
      ev.push({date:`${ym}-${String(1+Math.floor(rnd()*27)).padStart(2,"0")}`,cat,amount:Math.max(500,Math.round(amt/100)*100),item:items[Math.floor(rnd()*items.length)],vendor:vn,src:"doc"});
    });
  }
  return ev.sort((a,b)=>a.date<b.date?1:-1);
}
function _niceCeil(v){ if(v<=0)return 1; const p=Math.pow(10,Math.floor(Math.log10(v))); const n=v/p; const m=n<=1?1:n<=2?2:n<=5?5:10; return m*p; }

function vehChartData(events,cat,gran){
  const today=new Date(2026,5,13);
  const filt=events.filter(e=>cat==="all"||lineKomoku(e)===cat);
  const wkStart=dt=>{ const x=new Date(dt); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); return x; };
  const keyOf=date=>{ const [y,m,dd]=date.split("-").map(Number);
    if(gran==="year") return String(y);
    if(gran==="month") return `${y}-${String(m).padStart(2,"0")}`;
    if(gran==="day") return date;
    const w=wkStart(new Date(y,m-1,dd)); return `${w.getFullYear()}-${String(w.getMonth()+1).padStart(2,"0")}-${String(w.getDate()).padStart(2,"0")}`; };
  const map={}; filt.forEach(e=>{ const k=keyOf(e.date); map[k]=(map[k]||0)+e.amount; });
  const keys=[],labels=[];
  if(gran==="year"){ const cy=today.getFullYear(); for(let y=cy-2;y<=cy;y++){keys.push(String(y));labels.push(y+"年");} }
  else if(gran==="month"){ for(let i=11;i>=0;i--){ const d=new Date(2026,5-i,1); keys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); labels.push((d.getMonth()+1)+"月"); } }
  else if(gran==="week"){ const b=wkStart(today); for(let i=15;i>=0;i--){ const dt=new Date(b); dt.setDate(dt.getDate()-i*7); keys.push(`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`); labels.push(`${dt.getMonth()+1}/${dt.getDate()}`); } }
  else { for(let i=29;i>=0;i--){ const dt=new Date(today); dt.setDate(dt.getDate()-i); keys.push(`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`); labels.push(`${dt.getMonth()+1}/${dt.getDate()}`); } }
  return {labels,vals:keys.map(k=>map[k]||0),gran};
}
function buildVehChart(cd){
  const W=620,H=200,PL=50,PR=14,PT=14,PB=26,iw=W-PL-PR,ih=H-PT-PB;
  const n=cd.vals.length,max=Math.max(1,...cd.vals),nm=_niceCeil(max);
  const ylab=x=> x>=10000?(Math.round(x/1000)/10)+"万":String(x);
  let grid=""; [0,.5,1].forEach(f=>{ const gy=PT+ih*(1-f); grid+=`<line class="gl" x1="${PL}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}"/><text class="axt" x="${PL-6}" y="${(gy+3).toFixed(1)}" text-anchor="end">${ylab(Math.round(nm*f))}</text>`; });
  if(cd.gran==="year"){
    const bw=Math.min(64,iw/n*0.5);
    const bars=cd.vals.map((v,i)=>{ const cx=PL+iw*(i+0.5)/n,bh=ih*v/nm,cur=i===n-1;
      return `<rect class="bar ${cur?'cur':''}" x="${(cx-bw/2).toFixed(1)}" y="${(PT+ih-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3"/>`+
        (v?`<text class="vlab" x="${cx.toFixed(1)}" y="${(PT+ih-bh-5).toFixed(1)}">${yen(v)}</text>`:'')+
        `<text class="axt" x="${cx.toFixed(1)}" y="${H-9}" text-anchor="middle">${cd.labels[i]}</text>`; }).join("");
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${grid}${bars}</svg>`;
  }
  const X=i=> n<=1?PL+iw/2:PL+iw*i/(n-1), Y=v=>PT+ih*(1-v/nm);
  const pts=cd.vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const area=`${X(0).toFixed(1)},${(PT+ih).toFixed(1)} ${pts} ${X(n-1).toFixed(1)},${(PT+ih).toFixed(1)}`;
  const dots=cd.vals.map((v,i)=>`<circle class="dot" cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3"/>`).join("");
  const step=Math.max(1,Math.ceil(n/13));
  const xlabs=cd.labels.map((l,i)=>(i%step===0||i===n-1)?`<text class="axt" x="${X(i).toFixed(1)}" y="${H-9}" text-anchor="middle">${l}</text>`:'').join("");
  const li=n-1,lv=cd.vals[li];
  const lastLab=lv?`<text class="vlab" x="${X(li).toFixed(1)}" y="${(Y(lv)-7).toFixed(1)}" text-anchor="${n>1?'end':'middle'}">${yen(lv)}</text>`:'';
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${grid}<polygon class="ar" points="${area}"/><polyline class="ln" points="${pts}"/>${dots}${lastLab}${xlabs}</svg>`;
}
/* AIインサイト：修繕・維持費の水準と前年比トレンドから判定 */
function vehInsight(events){
  const f=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
  const rStart=f(new Date(2026,5-12,1)), pStart=f(new Date(2026,5-24,1));
  const maint=events.filter(e=>e.cat==="修繕・維持費");
  const recent=maint.filter(e=>e.date>=rStart).reduce((s,e)=>s+e.amount,0);
  const prior=maint.filter(e=>e.date>=pStart&&e.date<rStart).reduce((s,e)=>s+e.amount,0);
  const totalRecent=events.filter(e=>e.date>=rStart).reduce((s,e)=>s+e.amount,0);
  const ratio=prior>0?recent/prior:(recent>0?1.5:1);
  const pct=Math.round((ratio-1)*100);
  let level,judge,txt;
  if(recent>=420000 && ratio>=1.4){ level="alert"; judge="買い替え推奨";
    txt=`直近1年の修繕・維持費は <b>${yen(recent)}</b>（前年比 約${pct>=0?'+':''}${pct}%）と高水準かつ増加傾向が顕著です。今後も整備コストの上昇が見込まれるため、車両更新（買い替え）の検討を推奨します。`; }
  else if(ratio>=1.18 || recent>=240000){ level="warn"; judge="精密点検";
    txt=`直近1年の修繕・維持費は <b>${yen(recent)}</b>（前年比 約${pct>=0?'+':''}${pct}%）です。部品摩耗の進行が疑われます。早めの精密点検を推奨します。`; }
  else { level="ok"; judge="継続稼働";
    txt=`直近1年の修繕・維持費は <b>${yen(recent)}</b>（前年比 約${pct>=0?'+':''}${pct}%）で安定しています。大きな異常傾向は見られず、このまま継続稼働で問題ありません。`; }
  return {level,judge,txt,recent,pct,totalRecent};
}

const _CAL_TODAY="2026-06-13";
function _pad2(n){return String(n).padStart(2,"0");}
function _ymParts(ym){const [y,m]=ym.split("-").map(Number);return {y,m};}
function _daysIn(y,m){return new Date(y,m,0).getDate();}

function vehCalPickMonth(delta){ const {y,m}=_ymParts(state.vehCalYM); const d=new Date(y,m-1+delta,1); const yy=d.getFullYear(),mm=d.getMonth()+1;
  state.vehDateStart=`${yy}-${_pad2(mm)}-01`; state.vehDateEnd=`${yy}-${_pad2(mm)}-${_pad2(_daysIn(yy,mm))}`; state.vehCalYM=`${yy}-${_pad2(mm)}`; state.vehCalOpen=false; state.vehPage=1; render(); }
function vehCalPickDay(iso){
  const s=state.vehDateStart, e=state.vehDateEnd;
  if(!s || (s&&e)){ state.vehDateStart=iso; state.vehDateEnd=null; }
  else { if(iso<s){ state.vehDateEnd=s; state.vehDateStart=iso; } else { state.vehDateEnd=iso; } state.vehCalOpen=false; }
  state.vehPage=1; render();
}
function clearVehCal(){ state.vehDateStart=null; state.vehDateEnd=null; state.vehPage=1; render(); }
function renderVehCal(){
  if(!state.vehCalOpen) return "";
  const {y,m}=_ymParts(state.vehCalYM);
  const s=state.vehDateStart, e=state.vehDateEnd;
  const hint = (s&&e) ? `<div class="vcal-hint done">${s}〜${e}</div>` : `<div class="vcal-hint">開始日か終了日を選択してください</div>`;
  const startDow=new Date(y,m-1,1).getDay();
  const cells=[];
  for(let i=0;i<42;i++){
    const d=new Date(y,m-1,1-startDow+i);
    const iso=`${d.getFullYear()}-${_pad2(d.getMonth()+1)}-${_pad2(d.getDate())}`;
    const out=d.getMonth()!==(m-1), dow=d.getDay();
    let cls="vcal-d"; if(out)cls+=" out"; else { if(dow===0)cls+=" sun"; if(dow===6)cls+=" sat"; }
    if(iso===_CAL_TODAY)cls+=" today";
    const isStart=s&&iso===s, isEnd=e&&iso===e;
    if(s&&e&&iso>s&&iso<e) cls+=" in-range";
    if(isStart||isEnd||(s&&!e&&iso===s)) cls+=" range-end-pt";
    cells.push(`<button class="${cls}" onclick="vehCalPickDay('${iso}')">${d.getDate()}</button>`);
  }
  const wd=["日","月","火","水","木","金","土"].map((w,i)=>`<div class="vcal-wd ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join("");
  const pm=m===1?12:m-1, nm=m===12?1:m+1;
  return `<div class="vcal-backdrop" onclick="closeVehCal()"></div><div class="vcal-pop" onclick="event.stopPropagation()">

/* 一覧に表示されている車両を、絞り込み・ゴミ箱・並び替えを反映した順序で返す（カルテの前へ／次へ送りにも使用） */
function visibleVehicles(){
  const vehRange=(state.vehDateStart&&state.vehDateEnd)?{start:state.vehDateStart,end:state.vehDateEnd}:null;
  const allVeh=buildVehicles(state.vehCategoryFilter, vehRange);
  const inTrash=state.vehTrashView;
  let veh=allVeh.filter(v=>inTrash?state.vehTrash.has(v.key):!state.vehTrash.has(v.key));
  if(state.vehSort.key){
    const dir=state.vehSort.dir==="asc"?1:-1;
    const sk=state.vehSort.key;
    const mi=(typeof sk==="string"&&sk.indexOf("metric:")===0)?+sk.slice(7):null;
    const val=v=>{
      if(mi!=null){const f=vehicleMetrics(v).flatMap(g=>g.metrics)[mi]; return f?(+f.value||0):0;}
      return ({target:v.target,
        master:plateRegistered(v.target)?1:0,
        total:v.total,last:v.last,count:v.count})[sk];
    };
    const keyed=veh.map(v=>({v,k:val(v)}));
    keyed.sort((a,b)=>{if(a.k<b.k)return -dir; if(a.k>b.k)return dir; return b.v.total-a.v.total;});
    veh=keyed.map(x=>x.v);
  }
  return veh;
}

const SERIES_KLASSES=["小型","中型","大型","トレーラー"];
const OFFICE_COLORS={"名古屋営業所":"#1E55C8","岡崎営業所":"#157F73","一宮営業所":"#B87514","岐阜営業所":"#6B4FA3","四日市営業所":"#C0392B"};
const SERIES_MONTHS=(function(){ const out=[]; let y=2026,m=6-23; while(m<=0){m+=12;y-=1;} for(let i=0;i<24;i++){ out.push(y+"-"+String(m).padStart(2,"0")); m++; if(m>12){m=1;y++;} } return out; })();
const PREV_YEAR_MONTHS=SERIES_MONTHS.slice(0,12);
const THIS_YEAR_MONTHS=SERIES_MONTHS.slice(12);
const _OFFICE_BASE={"名古屋営業所":3200000,"岡崎営業所":1800000,"一宮営業所":1500000,"岐阜営業所":1200000,"四日市営業所":2100000};
const _CAT_SHARE=(function(){ const o={}; MON_KOMOKU.forEach(x=>o[x.km]=x.share); return o; })();
const _KLASS_SHARE={"小型":0.18,"中型":0.34,"大型":0.33,"トレーラー":0.15};
function _hashSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
function _rand(seed){ let a=(seed+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
const MONTHLY_SERIES=(function(){ const cells=[]; SERIES_MONTHS.forEach((ym,i)=>{ const moY=+ym.slice(5,7); const trend=1+0.005*i; SERIES_OFFICES.forEach(office=>{ SERIES_CATS.forEach((cat,ci)=>{ const phase=ci*1.0; const seasonal=1+0.12*Math.sin(2*Math.PI*(moY-1)/12+phase); SERIES_KLASSES.forEach(klass=>{ const noise=0.9+0.2*_rand(_hashSeed(ym+"|"+office+"|"+cat+"|"+klass)); const raw=_OFFICE_BASE[office]*_CAT_SHARE[cat]*_KLASS_SHARE[klass]*seasonal*trend*noise; cells.push({ym,office,cat,klass,amount:Math.round(raw/1000)*1000}); }); }); }); }); return cells; })();
const monthShort=ym=>(+ym.slice(5,7))+"月";
function stackByMonth(office){ return SERIES_MONTHS.map(ym=>{ const byCat={}; let gross=0; for(const c of MONTHLY_SERIES){ if(c.ym!==ym)continue; if(office!=="all"&&c.office!==office)continue; byCat[c.cat]=(byCat[c.cat]||0)+c.amount; gross+=c.amount; } return {ym,byCat,gross}; }); }
function officeLines(cat,klass){ return SERIES_OFFICES.map(office=>({office,color:OFFICE_COLORS[office],points:THIS_YEAR_MONTHS.map(ym=>{ let amount=0; for(const c of MONTHLY_SERIES){ if(c.ym!==ym||c.office!==office||c.cat!==cat)continue; if(klass!=="all"&&c.klass!==klass)continue; amount+=c.amount; } return {ym,amount}; })})); }
const _man=n=>Math.round(n/10000).toLocaleString()+"万";

/* ① 原価（グロス＋分類構成比）推移：月次12ヶ月、昨年同月を並べて比較。営業所で絞り込み可能。 */
function renderCostTrendBar(){
  const W=600,H=230,ML=52,MR=12,MT=12,MB=34,PW=W-ML-MR,PH=H-MT-MB;
  const office=state.chartOffice||"all";
  const stacks=stackByMonth(office); const map={}; stacks.forEach(s=>{map[s.ym]=s;});
  let yMax=Math.max(1,...stacks.map(s=>s.gross)); yMax=Math.ceil(yMax/500000)*500000;
  const groupW=PW/12, barW=Math.min(15,groupW/2.6), gap=4;
  const yOf=v=>MT+PH-(v/yMax)*PH;
  const ticks=[0,.25,.5,.75,1].map(f=>f*yMax);
  const stackBar=(x,byCat,gross,faded)=>{ let acc=0,seg=""; SERIES_CATS.forEach(c=>{ const v=byCat[c]||0; if(v<=0)return; const h=(v/yMax)*PH; const y=yOf(acc+v); acc+=v; const pct=gross>0?((v/gross)*100).toFixed(1):"0"; const col=monColor(c); seg+=`<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${col}"><title>${esc(c)}：${yen(v)}（${pct}%）</title></rect>`; }); return `<g opacity="${faded?0.4:1}">${seg}</g>`; };
  let body="";
  ticks.forEach(t=>{ body+=`<line x1="${ML}" y1="${yOf(t)}" x2="${W-MR}" y2="${yOf(t)}" stroke="var(--lineSoft)" stroke-width="1"/><text x="${ML-6}" y="${yOf(t)+3}" text-anchor="end" font-size="9" fill="var(--inkSoft)">${_man(t)}</text>`; });
  THIS_YEAR_MONTHS.forEach((ym,j)=>{ const cur=map[ym], prev=map[PREV_YEAR_MONTHS[j]]; const gx=ML+j*groupW, cx=gx+groupW/2, xPrev=cx-barW-gap/2, xCur=cx+gap/2;
    body+=stackBar(xPrev,prev.byCat,prev.gross,true)+stackBar(xCur,cur.byCat,cur.gross,false);
    body+=`<text x="${xCur+barW/2}" y="${yOf(cur.gross)-4}" text-anchor="middle" font-size="8" fill="var(--ink)" font-weight="700">${_man(cur.gross)}</text>`;
    body+=`<text x="${cx}" y="${H-MB+14}" text-anchor="middle" font-size="9.5" fill="var(--inkSoft)">${monthShort(ym)}</text>`; });
  body+=`<line x1="${ML}" y1="${MT+PH}" x2="${W-MR}" y2="${MT+PH}" stroke="var(--line)" stroke-width="1"/>`;
  const legend=SERIES_CATS.map(c=>`<span class="cl-item"><span class="cl-sw" style="background:${monColor(c)}"></span>${esc(c)}</span>`).join("");
  const sel=`<div class="filter-sel chart-sel"><span class="fs-l">営業所</span><select onchange="setChartOffice(this.value)"><option value="all" ${office==="all"?"selected":""}>全社</option>${SERIES_OFFICES.map(o=>`<option value="${esc(o)}" ${office===o?"selected":""}>${esc(o)}</option>`).join("")}</select></div>`;
  return `<div class="chart-card"><div class="chart-head"><div><div class="chart-title">車両コスト推移（原価項目構成比）</div><div class="chart-sub">月次・直近12ヶ月／薄い棒＝昨年同月</div></div>${sel}</div>
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="車両維持コスト推移グラフ">${body}</svg>
    <div class="chart-legend">${legend}</div></div>`;
}
/* ② 営業所別のコスト分類推移：月次12ヶ月。コスト分類＆車格で絞り込み。 */
function renderOfficeLineChart(){
  const W=600,H=230,ML=52,MR=12,MT=12,MB=34,PW=W-ML-MR,PH=H-MT-MB;
  const cat=state.chart2Cat||SERIES_CATS[0]; const klass=state.chart2Klass||"all";
  const lines=officeLines(cat,klass);
  let yMax=Math.max(1,...lines.flatMap(l=>l.points.map(p=>p.amount))); yMax=Math.ceil(yMax/100000)*100000;
  const n=THIS_YEAR_MONTHS.length;
  const xOf=i=>ML+(n===1?PW/2:(i/(n-1))*PW);
  const yOf=v=>MT+PH-(v/yMax)*PH;
  const ticks=[0,.25,.5,.75,1].map(f=>f*yMax);
  let body="";
  ticks.forEach(t=>{ body+=`<line x1="${ML}" y1="${yOf(t)}" x2="${W-MR}" y2="${yOf(t)}" stroke="var(--lineSoft)" stroke-width="1"/><text x="${ML-6}" y="${yOf(t)+3}" text-anchor="end" font-size="9" fill="var(--inkSoft)">${_man(t)}</text>`; });
  THIS_YEAR_MONTHS.forEach((ym,i)=>{ body+=`<text x="${xOf(i)}" y="${H-MB+14}" text-anchor="middle" font-size="9.5" fill="var(--inkSoft)">${monthShort(ym)}</text>`; });
  lines.forEach(l=>{ const pts=l.points.map((p,i)=>`${xOf(i)},${yOf(p.amount)}`).join(" "); body+=`<polyline fill="none" stroke="${l.color}" stroke-width="2" stroke-linejoin="round" points="${pts}"/>`; l.points.forEach((p,i)=>{ body+=`<circle cx="${xOf(i)}" cy="${yOf(p.amount)}" r="2.5" fill="${l.color}"><title>${esc(l.office)} ${monthShort(p.ym)}：${yen(p.amount)}</title></circle>`; }); });
  body+=`<line x1="${ML}" y1="${MT+PH}" x2="${W-MR}" y2="${MT+PH}" stroke="var(--line)" stroke-width="1"/>`;
  const legend=lines.map(l=>`<span class="cl-item"><span class="cl-sw" style="background:${l.color}"></span>${esc(l.office)}</span>`).join("");
  const filters=`<div class="chart-filters"><div class="filter-sel chart-sel"><span class="fs-l">原価項目</span><select onchange="setChart2Cat(this.value)">${SERIES_CATS.map(c=>`<option value="${esc(c)}" ${cat===c?"selected":""}>${esc(c)}</option>`).join("")}</select></div><div class="filter-sel chart-sel"><span class="fs-l">車格</span><select onchange="setChart2Klass(this.value)"><option value="all" ${klass==="all"?"selected":""}>全車格</option>${SERIES_KLASSES.map(k=>`<option value="${esc(k)}" ${klass===k?"selected":""}>${esc(k)}</option>`).join("")}</select></div></div>`;
  return `<div class="chart-card"><div class="chart-head"><div><div class="chart-title">営業所別 原価項目推移</div><div class="chart-sub">月次・直近12ヶ月</div></div>${filters}</div>
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="営業所別原価項目推移グラフ">${body}</svg>
    <div class="chart-legend">${legend}</div></div>`;
}
function setChartOffice(v){ state.chartOffice=v; render(); }
function setChart2Cat(v){ state.chart2Cat=v; render(); }
function setChart2Klass(v){ state.chart2Klass=v; render(); }

/* ───── ピックアップ算出（表示・アラート共通） ───── */
function _pkVSum(v,ym){ return ym?v.lines.reduce((a,l)=>a+(((l.date||"").slice(0,7)===ym)?(+l.amount||0):0),0):0; }
function _pkMonths(vehicles){ const mo=[...new Set(vehicles.flatMap(v=>v.lines).map(l=>(l.date||"").slice(0,7)).filter(Boolean))].sort(); return {lastYM:mo[mo.length-1]||"",prevYM:mo[mo.length-2]||""}; }
function computePickup(vehicles){
  const {lastYM,prevYM}=_pkMonths(vehicles); const _pct=(c,p)=>p>0?((c-p)/p*100):0;
  const topCost=vehicles.slice().sort((a,b)=>b.total-a.total).slice(0,3);
  // 直近3ヶ月（最新データ月の直前3ヶ月）の平均月次コストを基準に増加率を算出する
  const _avg3=v=>lastYM?([1,2,3].reduce((a,d)=>a+_pkVSum(v,_shiftYm(lastYM,d)),0))/3:0;
  const incRank=vehicles.map(v=>{const base=_avg3(v); return {v,p:_pct(_pkVSum(v,lastYM),base),base};}).filter(x=>x.base>0&&x.p>0).sort((a,b)=>b.p-a.p);
  const maintRank=vehicles.map(v=>({v,r:v.total>0?(v.byCat["修繕・維持費"]||0)/v.total:0})).filter(x=>x.r>0).sort((a,b)=>b.r-a.r);
  return {topCost,incRank,maintRank,lastYM,prevYM};
}
const PICKUP_LABEL={attention:"要確認車両",topcost:"コスト上位車両",increase:"コスト増加車両"};
function pickupSnapshot(vehicles){
  const {topCost,incRank,maintRank}=computePickup(vehicles);
  return {
    attention:[topCost[0]&&topCost[0].key, incRank[0]&&incRank[0].v.key, maintRank[0]&&maintRank[0].v.key].filter(Boolean),
    topcost:topCost.map(v=>v.key),
    increase:incRank.slice(0,3).map(x=>x.v.key),
  };
}

/* ───── 連携アラート（データ連携ログ［閉じる］時に再計算。実明細の差分から①②を生成） ───── */
const ALERT_CFG={ratioThreshold:0.10,minAbsIncrease:30000,minBaseAmount:30000,momMinMonths:2,avg3MinMonths:4,perVehicleCap:3,totalCap:50};
const ALERTS_LS_KEY="alerts.v1";
function loadAlertState(){ try{ const raw=localStorage.getItem(ALERTS_LS_KEY); if(raw){const o=JSON.parse(raw); return {alerts:o.alerts||[],seenAlertIds:o.seenAlertIds||{},prevCostMap:o.prevCostMap||null,prevPickup:o.prevPickup||null};} }catch(e){} return null; }
function saveAlertState(){ try{ localStorage.setItem(ALERTS_LS_KEY,JSON.stringify({alerts:state.alerts,seenAlertIds:state.seenAlertIds,prevCostMap:state.prevCostMap,prevPickup:state.prevPickup})); }catch(e){} }
function costMapOf(vehicles){ const m={}; vehicles.forEach(v=>v.lines.forEach(l=>{ const ym=(l.date||"").slice(0,7); if(!ym)return; const k=v.key+"|"+l.cat+"|"+ym; m[k]=(m[k]||0)+(+l.amount||0); })); return m; }
function mapsEqual(a,b){ const ka=Object.keys(a); if(ka.length!==Object.keys(b).length)return false; for(const k of ka) if(a[k]!==b[k])return false; return true; }
function _shiftYm(ym,back){ let y=+ym.slice(0,4),m=+ym.slice(5,7)-back; while(m<=0){m+=12;y-=1;} return y+"-"+String(m).padStart(2,"0"); }
function _qualify(amt,base){ if(base<ALERT_CFG.minBaseAmount)return null; const inc=amt-base; if(inc<ALERT_CFG.minAbsIncrease)return null; const rate=inc/base; if(rate<ALERT_CFG.ratioThreshold)return null; return rate; }
function _splitCell(k){ const p=k.split("|"); return {ym:p[p.length-1],cat:p[p.length-2],vehKey:p.slice(0,p.length-2).join("|")}; }
function _increaseAlerts(prev,cur,targetByKey){
  const monthCount=new Map();
  Object.keys(cur).forEach(k=>{ if((cur[k]||0)<=0)return; const i=k.lastIndexOf("|"); const vc=k.slice(0,i); monthCount.set(vc,(monthCount.get(vc)||0)+1); });
  const byCell=new Map();
  Object.keys(cur).forEach(k=>{
    const amt=cur[k]; if((prev[k]||0)===amt)return;
    const {vehKey,cat,ym}=_splitCell(k); if(!cat||!ym)return;
    const mc=monthCount.get(vehKey+"|"+cat)||0; const cands=[];
    if(mc>=ALERT_CFG.momMinMonths){ const base=cur[vehKey+"|"+cat+"|"+_shiftYm(ym,1)]||0; const r=_qualify(amt,base); if(r!=null)cands.push({kind:"inc_mom",base,rate:r}); }
    if(mc>=ALERT_CFG.avg3MinMonths){ const base=([1,2,3].reduce((a,d)=>a+(cur[vehKey+"|"+cat+"|"+_shiftYm(ym,d)]||0),0))/3; const r=_qualify(amt,base); if(r!=null)cands.push({kind:"inc_avg3",base,rate:r}); }
    if(!cands.length)return; cands.sort((a,b)=>b.rate-a.rate); const best=cands[0]; byCell.set(k,{vehKey,cat,ym,amt,kind:best.kind,base:best.base,rate:best.rate});
  });
  const byVeh=new Map(); byCell.forEach(c=>{ const arr=byVeh.get(c.vehKey)||[]; arr.push(c); byVeh.set(c.vehKey,arr); });
  const createdAt=nowStamp(); const out=[];
  byVeh.forEach(arr=>{ arr.sort((a,b)=>b.rate-a.rate); arr.slice(0,ALERT_CFG.perVehicleCap).forEach(c=>{
    const target=targetByKey.get(c.vehKey)||c.vehKey;
    const label=c.kind==="inc_mom"?"前月比":"前3ヶ月平均比", baseLabel=c.kind==="inc_mom"?"前月":"前3ヶ月平均";
    out.push({id:c.kind+"|"+c.vehKey+"|"+c.cat+"|"+c.ym, kind:c.kind, title:`${c.cat}が${label} +${Math.round(c.rate*100)}%`, detail:`車番 ${target}・${c.ym}　${yen(c.amt)}（${baseLabel} ${yen(Math.round(c.base))}）`, vehTarget:target, ym:c.ym, createdAt, target:{type:"veh_karte",vehKey:c.vehKey}});
  }); });
  return out;
}
function _pickupAlerts(prev,cur,targetByKey){
  const out=[]; const createdAt=nowStamp(); ["attention","topcost","increase"].forEach(listId=>{
    const p=prev[listId]||[], c=cur[listId]||[]; const pset=new Set(p),cset=new Set(c);
    const entered=new Set(c.filter(k=>!pset.has(k))); const label=PICKUP_LABEL[listId];
    const mk=(ct,vehKey,title)=>({id:"pickup_change|"+listId+"|"+ct+"|"+vehKey,kind:"pickup_change",title,detail:"コストモニターで確認できます",vehTarget:targetByKey.get(vehKey)||vehKey,createdAt,target:{type:"pickup",listId,vehKey}});
    entered.forEach(k=>out.push(mk("enter",k,`${targetByKey.get(k)||k} が「${label}」に入りました`)));
    p.filter(x=>!cset.has(x)).forEach(k=>out.push(mk("leave",k,`${targetByKey.get(k)||k} が「${label}」から外れました`)));
    if(c[0]&&p[0]&&c[0]!==p[0]&&!entered.has(c[0])) out.push(mk("top",c[0],`「${label}」の1位が ${targetByKey.get(c[0])||c[0]} になりました`));
  });
  return out;
}
function diffAlerts(prevCost,curCost,prevPk,curPk,vehicles){ const t=new Map(vehicles.map(v=>[v.key,v.target])); return [..._increaseAlerts(prevCost,curCost,t),..._pickupAlerts(prevPk,curPk,t)]; }
function recomputeAlerts(){
  const vehicles=buildVehicles("all",null).filter(v=>!state.vehTrash.has(v.key));
  const cur=costMapOf(vehicles), curPk=pickupSnapshot(vehicles);
  if(state.prevCostMap==null){ state.prevCostMap=cur; state.prevPickup=curPk; saveAlertState(); renderBell(); return; } // 初回はベースライン確立のみ
  if(mapsEqual(cur,state.prevCostMap)) return; // データ無変化＝冪等
  const fresh=diffAlerts(state.prevCostMap,cur,state.prevPickup||{attention:[],topcost:[],increase:[]},curPk,vehicles);
  const existing=new Set(state.alerts.map(a=>a.id));
  state.alerts=fresh.filter(a=>!existing.has(a.id)).concat(state.alerts).slice(0,ALERT_CFG.totalCap);
  state.prevCostMap=cur; state.prevPickup=curPk; saveAlertState(); renderBell();
}
function markAlertsSeen(){ const s={}; state.alerts.forEach(a=>s[a.id]=true); state.seenAlertIds=s; saveAlertState(); renderBell(); }
/* ───── ベル（ヘッダー右端） ───── */
function renderBell(){
  const host=document.getElementById("bell-host"); if(!host)return;
  const hasUnseen=state.alerts.some(a=>!state.seenAlertIds[a.id]);
  const dot=hasUnseen?`<span class="bell-dot"></span>`:"";
  let pop="";
  if(state.bellOpen){
    let list;
    if(state.alerts.length){
      const shown=state.alerts.slice(0, state.bellExpanded?10:5); // 初期5件→もっとみるで10件まで（10件超は非表示）
      list=shown.map(a=>`<button class="bp-item" onclick="alertDispatch('${a.id}')"><span class="bp-dot ${a.kind==='pickup_change'?'blue':'red'}"></span><div class="bp-main"><div class="bp-title">${esc(a.title)}</div><div class="bp-detail">${esc(a.detail)}</div></div></button>`).join("");
      if(!state.bellExpanded && state.alerts.length>5) list+=`<button class="bp-more" onclick="bellMore()">もっとみる</button>`;
    } else { list=`<div class="bp-empty">新しいアラートはありません</div>`; }
    pop=`<div class="bell-pop"><div class="bp-head"><span>アラート</span><button class="x" onclick="toggleBell()">${I.x("#5A6472",16)}</button></div><div class="bp-list">${list}</div></div>`;
  }
  host.innerHTML=`<button class="bell" onclick="toggleBell()" aria-label="アラート">${I.bell("#5A6472",18)}${dot}</button>${pop}`;
}
function toggleBell(){ state.bellOpen=!state.bellOpen; state.bellExpanded=false; if(state.bellOpen) markAlertsSeen(); else renderBell(); }
function bellMore(){ state.bellExpanded=true; renderBell(); }
function alertDispatch(id){
  const a=state.alerts.find(x=>x.id===id); if(!a)return; state.bellOpen=false;
  if(a.target.type==="veh_karte"){ const v=buildVehicles("all").find(x=>x.key===a.target.vehKey); if(!v){ renderBell(); toast("対象の車両が見つかりませんでした"); return; } renderBell(); openVehPanel(v.key,v.kind,v.target); }
  else { state.view="vehicles"; state.vehTab="monitor"; state.pickupHighlight=a.target.listId; render(); }
}

function renderVehicles(){
  const tabs=`<div class="upl-tabs" style="margin-bottom:18px">
    <button class="upl-tab ${state.vehTab!=="individual"&&state.vehTab!=="sites"?"active":""}" onclick="setVehTab('monitor')">コストモニター</button>
    <button class="upl-tab ${state.vehTab==="individual"?"active":""}" onclick="setVehTab('individual')">車両コスト</button>
    <button class="upl-tab ${state.vehTab==="sites"?"active":""}" onclick="setVehTab('sites')">拠点コスト</button>
    <button class="upl-tab ${state.vehTab==="inventory"?"active":""}" onclick="setVehTab('inventory')">在庫管理</button>
  </div>`;
  return tabs+(state.vehTab==="individual"?renderVehIndividual():state.vehTab==="sites"?renderVehSites():state.vehTab==="inventory"?renderInventory():renderVehMonitor());
}
/* ───── コストモニタータブ：全車両（ゴミ箱を除く）のコスト動向サマリー。絞り込み・ゴミ箱の影響を受けない。 ───── */
/* ───── 異常検知：各対象を自身の過去で判定（①スパイク ②トレンド ③構成比＋補正） ───── */
const ANOM_CFG={spikeRed:1.5,spikeYellow:1.3,sigRed:2,sigYellow:1.5,minMonths:3,minAmt:10000,minInc:5000,compMult:1.4};
const REPL_CFG={trendStrong:1.4,trendMid:1.2,levelStrong:1.5,levelMid:1.2,
  ageThresh:{"小型":10,"中型":9,"大型":8,"トレーラー":7},ageDefault:9,
  replaceCost:{"小型":4000000,"中型":8000000,"大型":18000000,"トレーラー":22000000},replaceDefault:8000000};
function _median(a){ if(!a.length)return 0; const s=a.slice().sort((x,y)=>x-y); const m=s.length>>1; return s.length%2?s[m]:(s[m-1]+s[m])/2; }
function _mad(a,med){ if(!a.length)return 0; return _median(a.map(x=>Math.abs(x-med))); }
function masterByPlate(p){ return VEHICLE_MASTER.find(v=>v.plate===p)||null; }
function vehKlass(v){ const m=masterByPlate(v.target); return m?m.klass:""; }
function _repairTotal(v){ return v.lines.reduce((a,l)=>a+(l.cat==="修繕・維持費"?(+l.amount||0):0),0); }
function _seasonalKomoku(c){ return c.indexOf("燃料")===0||c.indexOf("尿素")===0||c.indexOf("通行")===0; }
/* 1系列(ym→金額)の最新月をスパイク／トレンド判定。activeYms=対象の稼働月（昇順） */
function _evalSeries(series, activeYms){
  if(activeYms.length<ANOM_CFG.minMonths) return {hold:true};
  const cur=activeYms[activeYms.length-1], amt=series[cur]||0;
  if(amt<ANOM_CFG.minAmt) return null;
  // ① スパイク：直近6〜12ヶ月の中央値＋MAD
  const baseVals=activeYms.slice(0,-1).slice(-12).map(y=>series[y]||0);
  const med=_median(baseVals), sigma=1.4826*_mad(baseVals,med), inc=amt-med;
  // 平常レンジ（中央値>0）がある対象のみスパイク判定（初回計上＝平常レンジ無しは除外）
  if(med>0 && inc>=ANOM_CFG.minInc){
    let lv=null;
    if(amt>med*ANOM_CFG.spikeRed || (sigma>0&&amt>med+ANOM_CFG.sigRed*sigma)) lv="red";
    else if(amt>med*ANOM_CFG.spikeYellow || (sigma>0&&amt>med+ANOM_CFG.sigYellow*sigma)) lv="yellow";
    if(lv) return {level:lv,rule:"spike",amt,base:med,rate:med>0?inc/med:1,ym:cur};
  }
  // ② トレンド：直近3ヶ月連続増 ＆ 6ヶ月移動平均の傾きが正
  const l3=activeYms.slice(-3).map(y=>series[y]||0);
  if(l3.length===3 && l3[0]<l3[1] && l3[1]<l3[2]){
    const v6=activeYms.slice(-6).map(y=>series[y]||0), h=Math.floor(v6.length/2);
    if(h>=1){ const e=v6.slice(0,h).reduce((a,b)=>a+b,0)/h, r=v6.slice(h).reduce((a,b)=>a+b,0)/(v6.length-h);
      if(r>e && amt>=ANOM_CFG.minAmt) return {level:"yellow",rule:"trend",amt,base:e,rate:e>0?(amt-e)/e:1,ym:cur}; }
  }
  return null;
}
function _anomalyHint(a){
  const k=a.cat||"";
  if(a.rule==="composition") return "修繕費の構成比が同車格平均より突出。整備内容の見直しを推奨";
  if(a.rule==="trend") return "継続的な上昇（じわ増）。推移を注視";
  if(k.indexOf("燃料")===0||k.indexOf("尿素")===0) return "燃料費の急増。給油量・抜き取りの確認を推奨";
  if(k.indexOf("車検")===0||k.indexOf("タイヤ")===0||k.indexOf("オイル")===0) return "修繕費スパイク。整備内容・見積の確認を推奨";
  if(a.scope==="拠点") return "拠点コストの急増。請求内容の確認を推奨";
  return "コストの急増。内容の確認を推奨";
}
function detectAnomalies(){

  const adjIdx=new Map(); ADJUSTMENTS.forEach(a=>{ if(a.type==="override") adjIdx.set(adjKey(a.docId,a.lid),a); });
  const addVeh=(key,target,kind,cat,ym,amt)=>{ if(state.vehTrash.has(key))return; const v=vehSeries[key]||(vehSeries[key]={key,target,kind,cats:{}}); const c=v.cats[cat]||(v.cats[cat]={}); c[ym]=(c[ym]||0)+amt; };
  const addSite=(office,km,ym,amt)=>{ const s=siteSeries[office]||(siteSeries[office]={}); const k=s[km]||(s[km]={}); k[ym]=(k[ym]||0)+amt; };
  docs.filter(d=>d.status==="連携済み"&&!d.deleted).forEach(d=>{
    linesOf(d.id).forEach(l=>{
      const eff=effDocLine(l,d.id,adjIdx); const ym=(eff.inspectedAt||"").slice(0,7); if(!ym)return;
      const km=lineKomoku(eff), idx=KOMOKU_INDEX[km];
      if(idx&&idx.scope==="拠点"){ addSite(d.category||"未分類",km,ym,+eff.amount||0); }
      else { const vid=l.vehicleId||resolveVehicleId(l.plate); const mv=vehicleById(vid);
        const target=mv?mv.plate:(l.plate||"未設定"); const key=vid||(normPlate(l.plate)?"U:"+normPlate(l.plate):"未設定");
        addVeh(key,target,"単車",km||"その他",ym,+eff.amount||0); }
    });
  });
  state.manualLines.forEach(m=>{ const ym=(m.date||"").slice(0,7); if(!ym)return; const km=lineKomoku(m), idx=KOMOKU_INDEX[km];
    if(idx&&idx.scope==="拠点") addSite(m.office||"未分類",km,ym,+m.amount||0);
    else addVeh(m.vkey,m.target,m.kind,km||"その他",ym,+m.amount||0); });
  const out=[];
  const evalTarget=(cats,ctx)=>{ const ays=[...new Set([].concat(...Object.values(cats).map(s=>Object.keys(s).filter(y=>s[y]>0))))].sort();
    if(ays.length<ANOM_CFG.minMonths) return; // データ3ヶ月未満は保留
    Object.keys(cats).forEach(cat=>{ const r=_evalSeries(cats[cat],ays); if(r&&!r.hold) out.push(Object.assign({cat,seasonal:_seasonalKomoku(cat)},ctx,r)); });
  };
  Object.values(vehSeries).forEach(v=>evalTarget(v.cats,{scope:"車両",name:v.target,vehKey:v.key,kind:v.kind}));
  Object.keys(siteSeries).forEach(o=>evalTarget(siteSeries[o],{scope:"拠点",name:o}));
  // ③ 構成比異常：修繕費の総コスト比が同車格中央値×1.4超
  const vehicles=buildVehicles("all",null).filter(v=>!state.vehTrash.has(v.key));
  const byKlass={}; vehicles.forEach(v=>{ const k=vehKlass(v)||"?"; (byKlass[k]=byKlass[k]||[]).push(v.total>0?_repairTotal(v)/v.total:0); });
  const medShare={}; Object.keys(byKlass).forEach(k=>medShare[k]=_median(byKlass[k]));
  vehicles.forEach(v=>{ const k=vehKlass(v); if(!k)return; const share=v.total>0?_repairTotal(v)/v.total:0; const med=medShare[k]||0;
    if(med>0 && share>med*ANOM_CFG.compMult && _repairTotal(v)>=30000){
      const level=share>med*1.8?"red":"yellow";
      out.push({scope:"車両",name:v.target,vehKey:v.key,kind:v.kind,cat:"修繕費 構成比",rule:"composition",level,amt:Math.round(share*100),base:Math.round(med*100),rate:med>0?(share-med)/med:0,seasonal:false}); }
  });
  out.forEach(a=>{ a.hint=_anomalyHint(a); a.lvScore=(a.level==="red"?1000:0)+a.rate*Math.log10(Math.max(10,a.amt||1)); });
  out.sort((x,y)=>y.lvScore-x.lvScore);

}

/* 買い替えサイン・TCO：コスト推移＋年式の複合スコアで赤/黄/緑を判定 */
function vehicleReplacement(v, ctx){
  const ser={}; v.lines.forEach(l=>{ if(l.cat!=="修繕・維持費")return; const ym=(l.date||"").slice(0,7); if(ym)ser[ym]=(ser[ym]||0)+(+l.amount||0); });
  const yms=Object.keys(ser).filter(k=>ser[k]>0).sort();
  const repairTotal=yms.reduce((a,k)=>a+ser[k],0);
  const share=v.total>0?repairTotal/v.total:0;
  // 修繕費トレンド（前年同期比が無い環境では 後半÷前半 で代替）
  let trendRatio=0; if(yms.length>=2){ const mid=Math.ceil(yms.length/2); const e=yms.slice(0,mid).reduce((a,k)=>a+ser[k],0); const r=yms.slice(mid).reduce((a,k)=>a+ser[k],0); trendRatio=e>0?r/e:(r>0?2:0); }
  const trendStrong=trendRatio>=REPL_CFG.trendStrong && repairTotal>=120000;
  const trendMid=!trendStrong && trendRatio>=REPL_CFG.trendMid && repairTotal>=60000;
  // 修繕費水準（同車格中央値比）
  const klass=vehKlass(v); const medRepair=ctx.medRepair[klass||"?"]||0;
  const levelRatio=medRepair>0?repairTotal/medRepair:0;
  const levelStrong=levelRatio>=REPL_CFG.levelStrong; const levelMid=!levelStrong&&levelRatio>=REPL_CFG.levelMid;
  // 経過年数（マスタ年式）
  const m=masterByPlate(v.target); const age=m&&m.year?(2026-m.year):null;
  const ath=REPL_CFG.ageThresh[klass]||REPL_CFG.ageDefault;
  const ageStrong=age!=null&&age>=ath+2; const ageMid=!ageStrong&&age!=null&&age>=ath;

  const repCost=REPL_CFG.replaceCost[klass]||REPL_CFG.replaceDefault; const tcoStrong=v.total>repCost;
  const hit=(trendStrong||trendMid)+(levelStrong||levelMid)+(ageStrong||ageMid)+(tcoStrong?1:0);
  const strong=(trendStrong?1:0)+(levelStrong?1:0)+(ageStrong?1:0)+(tcoStrong?1:0);
  const level = (hit>=2)?"red":(hit>=1?"yellow":"green");
  const factors=[]; if(trendStrong||trendMid)factors.push(`修繕費${trendRatio>=2?"+100%超":"+"+Math.round((trendRatio-1)*100)+"%"}`);
  if(levelStrong||levelMid)factors.push(`水準${levelRatio.toFixed(1)}×`); if(ageMid||ageStrong)factors.push(`経過${age}年`); if(tcoStrong)factors.push(`TCO超過`);
  return {repairTotal,share,trendRatio,age,klass,level,factors};
}

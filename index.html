<!--
  ⚠️ レガシー（参照専用・非推奨）
  この単一HTMLプロトタイプは React/TypeScript 版（/app）へ移行済みです。
  本ファイルは設計の出典・対照用として保持していますが、メンテナンス対象ではありません。
  ここに含まれる全消し再描画ハック（render() による innerHTML 差し替え、
  _captureScroll / _restoreScroll / _SCROLL_SELECTORS / refreshDocBody など）は、
  React 版ではセレクタ購読＋差分更新により不要となり撤去されています。
  現行アプリは /app（npm run dev / build）を参照してください。
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>書類一覧｜ロジポケ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#EEF0EC; --panel:#FAFBF9; --card:#fff;
    --ink:#1B2330; --inkSoft:#5A6472; --inkFaint:#9AA3AD;
    --line:#D9DED5; --lineSoft:#E7EAE3;
    --green:#177D58; --greenDark:#0E5A40; --greenSoft:#E3F1EB; --greenLine:#A6D3C0;
    --teal:#157F73; --tealSoft:#DCEFEC;
    --blue:#2563EB; --blueSoft:#E5EDFB;
    --amber:#B87514; --amberSoft:#FBEFD8;
    --alert:#B23A2E; --alertSoft:#F7E2DF;
    --slate:#1F2A37; --slateHi:#2C3A4B;
    --mono:ui-monospace,SFMono-Regular,Menlo,'Roboto Mono',monospace;
    --sans:'Inter','Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',system-ui,sans-serif;
    /* 情報階層の余白スケール：重要ほど広く → 詳細ほど詰める（全画面共通） */
    --space-key:28px;  /* 重要情報の区切り（セクション境界・主要要素） */
    --space-rel:16px;  /* 関連情報の区切り（見出し・カード間） */
    --space-det:8px;   /* 詳細情報の行間（フィールド・明細） */
    --fs-key:22px;     /* 重要：見出し・主要数値 */
    --fs-rel:14px;     /* 関連：セクション見出し */
    --fs-det:12.5px;   /* 詳細：行・補足 */
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);
       -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
       font-feature-settings:"palt" 1;text-rendering:optimizeLegibility;
       letter-spacing:.01em;font-size:14px;overflow:hidden}
  button{font-family:var(--sans)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .9s linear infinite}
  @keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* ───── shell ───── */
  .shell{display:flex;height:100vh}
  .side{width:214px;flex-shrink:0;background:linear-gradient(180deg,#11875A 0%,#0C6A43 100%);color:#E6F4EC;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:50;transition:width .18s ease}
  .side.collapsed{width:66px}
  .brand{display:flex;align-items:center;gap:10px;padding:18px 16px 12px}
  .brand .mark{width:34px;height:34px;border-radius:9px;background:#fff;display:grid;place-items:center;flex-shrink:0}
  .brand-txt{min-width:0}
  .brand .nm{font-size:14px;font-weight:800;color:#fff;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .tag{font-size:10px;color:#9FD9BE;font-family:var(--mono);margin-top:1px;white-space:nowrap}
  .side-toggle{display:flex;align-items:center;justify-content:center;gap:7px;margin:0 12px 4px;padding:7px;background:rgba(255,255,255,.08);border:none;border-radius:8px;color:#CFEAD9;font-size:11px;font-weight:700;cursor:pointer;transition:.12s}
  .side-toggle:hover{background:rgba(255,255,255,.16);color:#fff}
  .side-toggle .chev{display:flex;transition:transform .18s ease;transform:rotate(180deg)}
  .side.collapsed .side-toggle{margin:0 9px 4px}
  .side.collapsed .side-toggle .chev{transform:rotate(0deg)}
  .side.collapsed .side-toggle .stxt{display:none}
  .nav{padding:8px;display:flex;flex-direction:column;gap:3px}
  .nav-h{font-size:10px;font-weight:800;letter-spacing:.8px;color:#8FCDB0;padding:12px 12px 6px}
  .navbtn{display:flex;align-items:center;gap:11px;background:none;border:none;color:#D6EFE1;
          padding:10px 12px;border-radius:9px;font-size:13.5px;font-weight:700;cursor:pointer;text-align:left;width:100%;transition:.12s}
  .navbtn .nic{display:flex;flex-shrink:0}
  .navbtn:hover{background:rgba(255,255,255,.12);color:#fff}
  .navbtn.active{background:#fff;color:var(--greenDark)}
  .navbtn .lbl{white-space:nowrap}
  .navbtn .ct{margin-left:auto;font-size:11px;font-family:var(--mono);background:rgba(255,255,255,.18);padding:1px 7px;border-radius:999px;font-weight:700}
  .navbtn.active .ct{background:var(--greenSoft);color:var(--greenDark)}
  .side-foot{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.14);font-size:11px;color:#A8DBC4;line-height:1.6}
  /* collapsed: アイコンのみ */
  .side.collapsed .brand{justify-content:center;padding:18px 0 12px}
  .side.collapsed .brand-txt{display:none}
  .side.collapsed .nav{padding:8px 9px}
  .side.collapsed .nav-h{display:none}
  .side.collapsed .navbtn{justify-content:center;padding:11px 0}
  .side.collapsed .navbtn .lbl,
  .side.collapsed .navbtn .ct{display:none}
  .side.collapsed .side-foot{display:none}
  /* collapsed: ホバーで名称ツールチップ */
  .navbtn{position:relative}
  .side.collapsed .navbtn::after{content:attr(data-l);position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);background:#fff;color:var(--greenDark);border:1.5px solid var(--green);padding:6px 10px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap;opacity:0;visibility:hidden;pointer-events:none;z-index:9999;box-shadow:0 6px 18px rgba(0,0,0,.28);transition:opacity .12s ease}
  .side.collapsed .navbtn:hover::after{opacity:1;visibility:visible}

  /* ───── main ───── */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;min-height:0}
  .topbar{height:54px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 22px;z-index:10}
  .topbar .crumb{font-size:13px;color:var(--inkSoft)}
  .topbar .crumb b{color:var(--ink);font-weight:800}
  .topbar .who{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--inkSoft)}
  .topbar .avatar{width:26px;height:26px;border-radius:999px;background:var(--greenSoft);display:grid;place-items:center;color:var(--greenDark);font-weight:800;font-size:12px}
  /* 連携アラート（ベル） */
  .bell-wrap{position:relative;display:flex;align-items:center;margin-right:4px}
  .bell{position:relative;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;transition:background .12s}
  .bell:hover{background:rgba(0,0,0,.05)}
  .bell-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:999px;background:#E5484D;border:1.5px solid var(--card)}
  .bell-pop{position:absolute;top:calc(100% + 8px);right:0;width:360px;max-width:86vw;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 44px rgba(20,30,40,.22);z-index:50;overflow:hidden;animation:fade .12s ease}
  .bp-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--lineSoft);font-size:13px;font-weight:800;color:var(--ink)}
  .bp-head .x{background:none;border:none;cursor:pointer;padding:2px;display:flex}
  .bp-list{max-height:60vh;overflow-y:auto}
  .bp-empty{padding:26px 14px;text-align:center;font-size:12.5px;color:var(--inkFaint);font-weight:700}
  .bp-item{display:flex;align-items:flex-start;gap:9px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--lineSoft);cursor:pointer;padding:11px 14px;transition:background .12s;font-family:inherit}
  .bp-item:hover{background:#F5F8F5}
  .bp-dot{flex-shrink:0;width:8px;height:8px;border-radius:999px;margin-top:4px}
  .bp-dot.red{background:#E5484D}
  .bp-dot.blue{background:var(--blue)}
  .bp-main{min-width:0}
  .bp-title{font-size:12.5px;font-weight:800;color:var(--ink);line-height:1.4}
  .bp-detail{font-size:11.5px;color:var(--inkSoft);margin-top:2px;word-break:break-all}
  .bp-more{width:100%;background:none;border:none;cursor:pointer;padding:10px 14px;font-size:12px;font-weight:800;color:var(--greenDark);font-family:inherit}
  .bp-more:hover{background:#F5F8F5}
  .pk-flash{animation:pkflash 1.6s ease}
  @keyframes pkflash{0%,100%{box-shadow:none}20%,60%{box-shadow:0 0 0 3px var(--green) inset}}
  .content{padding:22px;animation:fade .2s ease;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .doc-body{flex:1;min-height:0;display:flex;flex-direction:column}

  .pagehead{display:flex;align-items:flex-end;gap:14px;margin-bottom:var(--space-key);flex-wrap:wrap;flex-shrink:0}
  .pagehead h1{font-size:var(--fs-key);margin:0;font-weight:800;letter-spacing:.3px}
  .pagehead p{margin:4px 0 0;color:var(--inkSoft);font-size:13px}
  .pagehead-veh{margin-bottom:8px;align-items:center}
  .pagehead-veh p{margin:0;font-size:12.5px}
  .pagehead .page-desc{margin:0;color:var(--inkSoft);font-size:12.5px;max-width:560px}
  .ph-spacer{flex:1}

  .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;border:none;
               border-radius:9px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-green{display:inline-flex;align-items:center;gap:7px;background:var(--green);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer}
  .btn-green:hover{filter:brightness(1.05)}
  .btn-green:disabled{background:#C6CEC6;cursor:not-allowed;filter:none}
  .btn-ghost{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:700;cursor:pointer}
  .btn-ghost:hover{border-color:var(--greenLine);color:var(--greenDark)}
  .btn-hist{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);color:var(--inkSoft);border-radius:7px;padding:5px 9px;font-size:11.5px;font-weight:700;cursor:pointer}
  .csv-bar{display:flex;justify-content:flex-end;gap:10px;margin:0 0 10px}
  .btn-hist:hover{background:#F5F6F8;color:var(--ink);border-color:#CFD5DD}
  .btn-hist .bh-ct{font-size:10px;font-family:var(--mono);font-weight:700;color:var(--inkSoft);background:#EEF0F3;border-radius:999px;padding:0 6px;margin-left:1px}

  /* ───── toolbar / filters ───── */
  .toolbar{padding:0;margin-bottom:var(--space-rel);display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{background:#fff;border:none;padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--inkSoft);cursor:pointer;border-right:1px solid var(--line);display:inline-flex;align-items:center;gap:6px}
  .seg button:last-child{border-right:none}
  .seg button.active{background:var(--greenSoft);color:var(--greenDark)}
  .seg button .n{font-size:10.5px;font-family:var(--mono);background:#EEF0EC;color:var(--inkSoft);border-radius:999px;padding:0 6px}
  .seg button.active .n{background:#fff;color:var(--greenDark)}
  /* status filter chips (multi-select) */
  .statusfilter{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap}
  .stchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--inkSoft);border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:700;cursor:pointer;user-select:none;transition:.12s}
  .stchip:hover{border-color:var(--inkFaint)}
  .stchip .dot{opacity:.55}
  .stchip .n{font-size:10.5px;font-family:var(--mono);background:#EEF0EC;color:var(--inkSoft);border-radius:999px;padding:0 6px}
  .stchip .ck{font-size:11px;font-weight:900;line-height:1}
  .stchip.on{border-color:currentColor}
  .stchip.on .dot{opacity:1}
  .stchip.st-todo.on{background:#eaede8;color:#5a6472}
  .stchip.st-done.on{background:var(--tealSoft);color:var(--teal)}
  .stchip.st-reflected.on{background:var(--greenSoft);color:var(--greenDark)}
  .stchip.on .n{background:rgba(255,255,255,.7);color:inherit}
  .filter-summary{margin-left:10px;color:var(--inkSoft)}
  .fs-clear{margin-left:8px;background:none;border:none;color:var(--inkSoft);font-weight:700;cursor:pointer;font-size:inherit;text-decoration:underline;padding:0}
  .fs-clear:hover{color:var(--ink)}
  .srch{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:7px 11px;background:#fff;min-width:210px}
  .srch input{border:none;outline:none;font-size:13px;font-family:var(--sans);flex:1;background:none;color:var(--ink)}
  .tb-spacer{flex:1}
  .trash-toggle{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;font-size:11.5px;font-weight:700;color:var(--inkSoft);cursor:pointer}
  .trash-toggle:hover{border-color:#E0B8B2;color:var(--alert)}
  .trash-toggle.on{background:var(--alertSoft);border-color:#E0B8B2;color:var(--alert)}
  .filter-sel{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:9px;padding:5px 10px;background:#fff}
  .filter-sel .fs-l{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--inkSoft);white-space:nowrap}
  .filter-sel select{border:none;outline:none;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--ink);background:none;cursor:pointer;max-width:150px}
  .office-chip{display:inline-block;font-size:11.5px;font-weight:700;color:var(--greenDark);background:var(--greenSoft);border:1px solid var(--greenLine);border-radius:6px;padding:2px 9px;white-space:nowrap}
  .office-none{font-size:11.5px;color:var(--inkFaint)}
  .count-line{font-size:var(--fs-det);color:var(--inkSoft);margin:0 0 var(--space-det);flex-shrink:0}
  .count-line b{color:var(--ink);font-family:var(--mono)}

  /* ───── table ───── */
  .twrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column}
  .tscroll{flex:1;min-height:0;overflow:auto}
  table.dt{width:100%;border-collapse:collapse;font-size:12.5px;min-width:880px}
  .dt th,.dt td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--lineSoft);vertical-align:middle}
  .dt thead th{position:sticky;top:0;z-index:2;background:#F3F5F2;font-size:11px;font-weight:800;color:var(--inkSoft);letter-spacing:.3px;white-space:nowrap;box-shadow:inset 0 -1px 0 var(--line)}
  .dt tbody tr{cursor:pointer;transition:background .1s}
  .dt tbody tr:hover{background:#F6FBF8}
  .dt tbody tr:last-child td{border-bottom:none}
  .dt .no{font-family:var(--mono);color:var(--inkSoft);font-size:12px}
  .dt .r{text-align:right;font-family:var(--mono);font-weight:700;white-space:nowrap}
  .dt .docname{font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;min-width:0}
  .dt .docname .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px}
  .dt .vendor{color:var(--ink)}
  .dt .date{font-family:var(--mono);color:var(--inkSoft);font-size:12px;white-space:nowrap}
  .dt .lc{font-family:var(--mono);color:var(--inkSoft)}
  .rowact{display:flex;gap:6px;justify-content:flex-end}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer}
  .icon-btn:hover{border-color:#E0B8B2;background:var(--alertSoft)}
  .icon-btn.restore:hover{border-color:var(--greenLine);background:var(--greenSoft)}
  .ftag{display:inline-flex;align-items:center;gap:5px;background:var(--greenSoft);color:var(--greenDark);border-radius:5px;padding:2px 7px;font-size:10.5px;font-weight:800}

  /* status chips */
  .st{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;white-space:nowrap}
  .st-todo{background:#EAEDE8;color:#5A6472}
  .st-done{background:var(--tealSoft);color:var(--teal)}
  .st-reflected{background:var(--greenSoft);color:var(--greenDark)}
  .st-deleted{background:var(--alertSoft);color:var(--alert)}
  .dot{width:6px;height:6px;border-radius:999px;background:currentColor;display:inline-block}

  /* category pill (cost) */
  .catpill{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;white-space:nowrap}

  .empty{text-align:center;padding:48px 20px;color:var(--inkSoft)}
  .empty .et{font-size:15px;font-weight:800;color:var(--ink);margin:14px 0 6px}
  .empty .es{font-size:13px;max-width:420px;margin:0 auto}

  /* ───── upload modal ───── */
  .ovl{position:fixed;inset:0;background:rgba(15,20,28,.5);z-index:60;display:grid;place-items:center;padding:20px}
  .ovl.anim{animation:fade .15s ease}
  .modal{background:#fff;border-radius:14px;width:min(560px,100%);max-height:90vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .m-head{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--lineSoft)}
  .m-head .t{font-size:17px;font-weight:800}
  .m-head .x{margin-left:auto;background:none;border:none;cursor:pointer;padding:4px}
  .m-body{padding:18px 20px}
  .upl-tabs{display:flex;gap:22px;border-bottom:1px solid var(--lineSoft);margin-bottom:16px}
  .upl-tab{font-size:13.5px;font-weight:800;color:var(--inkFaint);padding:0 2px 11px;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;cursor:pointer;font-family:var(--sans)}
  .upl-tab:hover{color:var(--inkSoft)}
  .upl-tab.active{color:var(--green);border-bottom-color:var(--green)}
  .dropzone{border:1.5px dashed #C7CFD8;border-radius:10px;background:#FBFDFC;padding:30px 18px;text-align:center;cursor:pointer;transition:.15s;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .dropzone:hover{border-color:var(--green);background:#F3FBF7}
  .dropzone.filled{display:block;text-align:left;padding:16px}
  .dropzone.drag{border-color:var(--green);background:#EFFAF3;border-style:solid}
  .dz-text{font-size:13.5px;color:var(--inkSoft);margin:10px 0}
  .btn-select{background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:800;cursor:pointer}
  .btn-select:hover{filter:brightness(1.06)}
  .chips{display:flex;flex-direction:column;gap:7px;max-height:202px;overflow-y:auto;padding-right:2px}
  .upl-sample{color:var(--green);font-weight:700;text-decoration:underline;text-underline-offset:2px;margin-left:4px}
  .chip{display:flex;align-items:center;gap:9px;background:var(--greenSoft);border:1px solid var(--greenLine);border-radius:8px;padding:8px 12px;font-size:12.5px}
  .chip .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700;color:var(--ink)}
  .chip .ln{font-family:var(--mono);font-size:11px;color:var(--inkSoft)}
  .chip .x{background:none;border:none;cursor:pointer;color:var(--inkSoft);font-size:15px;line-height:1;padding:0 2px}
  .dz-count{text-align:right;font-size:12px;color:var(--inkSoft);margin-top:10px}
  .upl-help{font-size:11.5px;color:var(--inkFaint);margin:10px 2px 0;line-height:1.6}
  .ocr-row{display:flex;align-items:center;gap:10px;margin:18px 2px 0}
  .ocr-row .txt{font-size:13px;color:var(--ink)}
  .ocr-row .sub{font-size:11px;color:var(--inkFaint);margin-top:2px}
  .switch{position:relative;width:40px;height:22px;border-radius:999px;background:#C7CFD8;cursor:pointer;transition:.18s;flex-shrink:0}
  .switch.on{background:var(--green)}
  .switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:999px;background:#fff;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .switch.on .knob{left:20px}
  .m-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--lineSoft)}
  /* コスト管理 CSV モーダル */
  .csv-warn{background:#FBF6E3;border:1px solid #E8DCA8;border-radius:8px;padding:12px 15px;font-size:12.5px;color:#7A5310;line-height:1.9;font-weight:700}
  .csv-sjis{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink);margin-top:14px;cursor:pointer}
  .dz-pick{margin-top:14px;background:#EEF0F3;color:var(--inkSoft);font-size:13px;font-weight:700;padding:9px 16px;border-radius:7px}
  .costcsv-fname{font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:8px}
  .costcsv-preview{margin-top:16px;max-height:320px;overflow:auto;border:1px solid var(--lineSoft);border-radius:8px}
  .costcsv-preview .vd-tbl{border:none;border-radius:0;font-size:11.5px}
  .costcsv-preview .vd-tbl th{position:sticky;top:0;z-index:1;white-space:nowrap}
  .costcsv-preview .vd-tbl td{white-space:nowrap}
  .costcsv-more{font-size:11.5px;color:var(--inkSoft);padding:8px 12px;border-top:1px solid var(--lineSoft)}
  .btn-cancel{background:#fff;border:1px solid #DCDFE6;color:var(--ink);border-radius:8px;padding:9px 18px;font-size:13.5px;font-weight:700;cursor:pointer}
  .btn-upload{background:var(--green);border:none;color:#fff;border-radius:8px;padding:9px 22px;font-size:14px;font-weight:800;cursor:pointer}
  .btn-upload:hover:not(:disabled){filter:brightness(1.05)}
  .btn-upload:disabled{background:#E5E9EE;color:#B7BEC7;cursor:not-allowed}
  /* 重複アラート */
  .dup-lead{margin:0 0 14px;font-size:13.5px;line-height:1.7;color:var(--ink)}
  .dup-list{display:flex;flex-direction:column;gap:12px}
  .dup-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
  .dup-item input{margin:2px 0 0;width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:var(--blue)}
  .dup-main{min-width:0}
  .dup-name{font-size:13.5px;font-weight:700;color:var(--ink);word-break:break-all}
  .dup-sub{font-size:12px;color:var(--inkSoft);margin-top:3px}
  .dup-no{color:var(--blue);font-weight:700}
  .uprog{padding:4px 2px}
  .up-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .up-label{font-size:12.5px;color:var(--ink);font-weight:700;display:flex;align-items:center;gap:7px}
  .up-pct{font-size:12px;color:var(--inkSoft);font-family:var(--mono)}
  .up-track{height:7px;background:#E7EBEF;border-radius:999px;overflow:hidden}
  .up-fill{height:100%;background:var(--green);border-radius:999px;transition:width .18s linear}
  .up-toast{position:fixed;right:26px;bottom:26px;width:320px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:0 12px 32px rgba(0,0,0,.18);z-index:80;animation:fade .2s ease}

  /* ───── PDF分割アップロード（フォーム） ───── */
  .sp-desc{font-size:12px;color:var(--inkSoft);line-height:1.75;margin-bottom:6px}
  .sp-guide{color:var(--green);font-weight:700;text-decoration:none;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;margin-left:8px}
  .sp-guide:hover{text-decoration:underline}
  .sp-field{margin-top:18px}
  .sp-flabel{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:9px;display:flex;align-items:center;gap:5px}
  .sp-req{color:var(--alert);font-weight:800;font-size:13px}
  .sp-qi{display:inline-grid;place-items:center;width:15px;height:15px;border-radius:999px;background:#9AA3AD;color:#fff;font-size:10px;font-weight:800;cursor:help}
  .sp-radios{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .sp-radio{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink);cursor:pointer}
  .sp-radio input{accent-color:var(--blue);width:16px;height:16px;cursor:pointer;margin:0}
  .sp-prev-btn{background:#fff;color:var(--greenDark);border:1px solid var(--line);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;margin-left:16px;display:inline-flex;align-items:center;gap:6px}
  .sp-prev-btn:hover{background:var(--panel);border-color:#C7CFD8}
  .sp-toggle-row{display:flex;align-items:center;gap:14px}
  .sp-toggle-row .switch.disabled{opacity:.45;pointer-events:none}

  /* ───── PDF分割設定モーダル ───── */
  .spm{width:min(1180px,97vw)}
  .spm-desc{font-size:12.5px;color:var(--inkSoft);line-height:1.8;padding:16px 22px 0}
  .spm-link{color:var(--blue);text-decoration:underline;cursor:pointer}
  .spm-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 8px}
  .spm-count{font-size:16px;font-weight:800;color:var(--ink)}
  .spm-bulk{position:relative}
  .spm-bulk-btn{background:#fff;border:1px solid #DCDFE6;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;color:var(--ink)}
  .spm-bulk-btn:hover{background:var(--panel)}
  .spm-bulk-menu{position:absolute;right:0;top:calc(100% + 5px);background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.16);z-index:6;min-width:200px;overflow:hidden}
  .spm-bulk-menu button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 15px;font-size:13px;cursor:pointer;color:var(--ink);font-family:var(--sans)}
  .spm-bulk-menu button:hover{background:var(--panel)}
  .spm-strip{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:10px 22px 20px;background:#EDEFEA;border-top:1px solid var(--lineSoft)}
  .sp-page{flex-shrink:0;width:158px}
  .sp-card{background:#fff;border:1px solid var(--line);border-radius:5px;height:212px;overflow:hidden;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .sp-card.ex{opacity:.38}
  .sp-pagenum{text-align:center;font-size:12px;color:var(--inkSoft);margin-top:9px}
  .sp-chk{position:absolute;left:8px;bottom:8px;width:20px;height:20px;border-radius:4px;border:1.5px solid #B7BEC7;background:#fff;cursor:pointer;display:grid;place-items:center;padding:0}
  .sp-chk.on{background:var(--blue);border-color:var(--blue)}
  .sp-zoom{position:absolute;right:8px;bottom:8px;width:26px;height:26px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center;padding:0;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .sp-zoom:hover{background:var(--panel)}
  .sp-div{flex-shrink:0;width:46px;height:212px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
  .sp-div.boundary{width:64px}
  .sp-div::before{content:"";position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);border-left:2px dotted #C0C7CF}
  .sp-div.boundary::before{display:none}
  .sp-div-ic{position:relative;z-index:1;width:34px;height:34px;border-radius:999px;background:#EDEFEA;color:#8A929C;display:grid;place-items:center;transition:.12s}
  .sp-div:hover .sp-div-ic,.sp-div-ic.active{background:#8B5CF6;color:#fff}
  .sp-div-tip{position:absolute;top:-30px;left:50%;transform:translateX(-50%);background:#1B2330;color:#fff;font-size:12px;font-weight:700;padding:5px 10px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:.12s;z-index:3}
  .sp-div:hover .sp-div-tip,.sp-div-tip.show{opacity:1}
  /* mock thumbnail */
  .spt{position:absolute;inset:0;padding:11px 12px;font-size:6px;color:#2A323C;line-height:1.5;overflow:hidden}
  .spt-r1{display:flex;justify-content:space-between;align-items:flex-start}
  .spt-h{font-size:10px;font-weight:800}
  .spt-date{font-size:5px;color:#5A6472;text-align:right;line-height:1.4}
  .spt-logo{display:flex;align-items:center;gap:4px;justify-content:flex-end;font-size:9px;font-weight:800;color:#177D58;margin-top:6px}
  .spt-stamp{display:inline-grid;place-items:center;width:18px;height:18px;border:1.5px solid #D9534F;border-radius:3px;color:#D9534F;font-size:5px;font-weight:800;transform:rotate(-8deg)}
  .spt-to{font-size:6px;margin-top:10px;color:#2A323C}
  .spt-meta{font-size:5px;color:#5A6472;margin-top:5px;line-height:1.55}
  .spt-total{display:flex;justify-content:space-between;align-items:center;border:1px solid #2A323C;border-radius:2px;margin-top:14px;padding:5px 7px;font-size:7px}
  .spt-total b{font-size:9px}
  .spt-bars{margin-top:10px}
  .spt-bars i{display:block;height:3px;background:#E7EAE3;border-radius:2px;margin-bottom:5px}
  .spt-dh{font-size:8px;font-weight:800;border-bottom:1px solid #C0C7CF;padding-bottom:4px;margin-bottom:6px}
  .spt-tbl{width:100%;border-collapse:collapse}
  .spt-tbl td{border:1px solid #DDE1DA;padding:2.5px 3px;font-size:5px;color:#3A434E}
  .spt-tbl td:nth-child(2),.spt-tbl td:nth-child(3),.spt-tbl td:nth-child(4){text-align:right;width:22%}

  /* ───── ガイド・コーチマーク ───── */
  .coach{position:fixed;z-index:90;background:#fff;border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.3);padding:18px 22px;width:340px}
  .coach-txt{font-size:13.5px;color:var(--ink);line-height:1.75;white-space:pre-line}
  .coach-txt a{color:#8B5CF6;font-weight:700;text-decoration:underline}
  .coach-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
  .coach-back{background:none;border:none;color:#9AA3AD;font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
  .coach-back:hover{color:var(--inkSoft)}
  .coach-next{background:#8B5CF6;color:#fff;border:none;border-radius:9px;padding:9px 24px;font-size:14px;font-weight:800;cursor:pointer}
  .coach-next:hover{filter:brightness(1.06)}

  /* ───── 拡大プレビュー ───── */
  .sp-zoomovl{position:fixed;inset:0;background:rgba(15,20,28,.62);z-index:95;display:grid;place-items:center;padding:30px}
  .sp-zoomcard{background:#fff;border-radius:8px;width:min(520px,90vw);height:min(700px,86vh);position:relative;box-shadow:0 24px 60px rgba(0,0,0,.45);overflow:hidden}
  .sp-zoomcard .spt{font-size:13px;padding:32px 36px}
  .sp-zoomcard .spt-h{font-size:24px}.sp-zoomcard .spt-logo{font-size:20px}.sp-zoomcard .spt-stamp{width:42px;height:42px;font-size:11px}
  .sp-zoomcard .spt-date{font-size:11px}.sp-zoomcard .spt-to{font-size:14px}.sp-zoomcard .spt-meta{font-size:10px}
  .sp-zoomcard .spt-total{font-size:16px;padding:12px 16px}.sp-zoomcard .spt-total b{font-size:20px}
  .sp-zoomcard .spt-bars i{height:7px;margin-bottom:11px}.sp-zoomcard .spt-dh{font-size:18px}
  .sp-zoomcard .spt-tbl td{font-size:11px;padding:6px 7px}
  .sp-zoomclose{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:999px;border:none;background:rgba(0,0,0,.06);cursor:pointer;display:grid;place-items:center;z-index:2}

  /* ───── side panel ───── */
  .panel-ovl{position:fixed;inset:0;background:rgba(15,20,28,.42);z-index:65;display:flex;justify-content:flex-end}
  .panel-ovl.anim{animation:fade .15s ease}
  .panel{width:min(1040px,96vw);background:#fff;height:100vh;display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.22)}
  .panel.anim{animation:slideIn .22s cubic-bezier(.22,.61,.36,1)}
  .pn-head{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);flex-shrink:0}
  /* stepper */
  .stepper{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--lineSoft);border-radius:10px;padding:11px 12px;margin-bottom:16px}
  .stepper .step{display:flex;align-items:center;gap:7px;white-space:nowrap}
  .stepper .sdot{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;font-size:11px;font-weight:800;flex-shrink:0}
  .stepper .slab{font-size:11.5px;font-weight:700}
  .stepper .step.todo .sdot{background:#E4E8E1;color:#9AA3AD}
  .stepper .step.todo .slab{color:var(--inkFaint)}
  .stepper .step.current .sdot{background:var(--green);color:#fff;box-shadow:0 0 0 3px var(--greenSoft)}
  .stepper .step.current .slab{color:var(--greenDark)}
  .stepper .step.done .sdot{background:var(--green);color:#fff}
  .stepper .step.done .slab{color:var(--ink)}
  .stepper .sline{flex:1;height:2px;background:#E4E8E1;border-radius:2px;min-width:14px}
  .stepper .sline.done{background:var(--greenLine)}
  .reflect-hint{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--amber);background:var(--amberSoft);border:1px solid rgba(184,117,20,.3);border-radius:8px;padding:5px 9px;white-space:nowrap}
  .pn-nav{display:inline-flex;align-items:center;gap:6px;margin-left:4px}
  .pn-navbtn{display:inline-flex;align-items:center;gap:3px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer}
  .pn-navbtn:hover:not(:disabled){border-color:var(--greenLine);color:var(--greenDark);background:var(--greenSoft)}
  .pn-navbtn:disabled{color:#C2C9C0;cursor:not-allowed;background:#F7F8F5}
  .pn-navbtn .ic-l{display:inline-flex;transform:rotate(180deg)}
  .pn-navbtn .ic-r{display:inline-flex}
  .pn-navpos{font-size:11px;font-family:var(--mono);color:var(--inkSoft);min-width:42px;text-align:center}
  .toast-btn{margin-left:6px;background:var(--green);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12.5px;font-weight:800;cursor:pointer}
  .toast-btn:hover{filter:brightness(1.08)}
  .pn-no{font-family:var(--mono);font-size:12px;color:var(--inkSoft)}
  .pn-no b{color:var(--ink);font-size:14px}
  .pn-actions{margin-left:auto;display:flex;align-items:center;gap:9px}
  .pn-body{flex:1;display:flex;min-height:0}
  .pn-left{width:48%;min-width:380px;overflow-y:auto;padding:18px 20px;border-right:1px solid var(--line)}
  .pn-right{flex:1;background:#52525B;overflow:auto;padding:16px;display:flex;flex-direction:column;min-width:0}

  .pn-sec{font-size:11px;font-weight:800;color:var(--inkSoft);letter-spacing:.4px;margin:var(--space-key) 0 var(--space-det);display:flex;align-items:center;gap:8px}
  .pn-sec:first-child{margin-top:0}
  .pn-sec .ct{font-family:var(--mono);font-weight:700;color:var(--green)}
  .fld{margin-bottom:var(--space-det)}
  .fld label{display:block;font-size:11px;color:var(--inkSoft);margin:0 0 4px;font-weight:700}
  .in{width:100%;font-family:var(--sans);font-size:13.5px;padding:8px 10px;border:1px solid #D5DAD3;border-radius:7px;outline:none;background:#fff;color:var(--ink)}
  .in:focus{border-color:var(--green);box-shadow:0 0 0 2px var(--greenSoft)}
  .in.mono{font-family:var(--mono)}
  .in[readonly]{background:#F3F5F2;color:var(--inkSoft)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-det)}
  .total-box{display:flex;align-items:baseline;justify-content:space-between;background:var(--greenSoft);border:1px solid var(--greenLine);border-radius:9px;padding:14px 16px;margin-top:var(--space-rel)}
  .total-box .lab{font-size:12px;font-weight:800;color:var(--greenDark)}
  .total-box .v{font-family:var(--mono);font-weight:800;font-size:var(--fs-key);color:var(--ink)}

  .line-card{border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:var(--space-det);background:var(--panel)}
  .lc-head{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .lc-no{font-size:11px;font-weight:800;color:var(--inkSoft);font-family:var(--mono)}
  .match-badge{margin-left:auto}
  .lc-del{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;flex-shrink:0;padding:0}
  .lc-del:hover{border-color:#E0B8B2;background:var(--alertSoft)}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:800;white-space:nowrap}
  .legend{font-size:11px;color:var(--inkSoft);display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px;align-items:center}
  .lg{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:5px}
  .lg-g{color:#0E5A40;background:rgba(23,125,88,.16);border:1px solid rgba(23,125,88,.5)}
  .lg-r{color:#B23A2E;background:rgba(178,58,46,.14);border:1px solid rgba(178,58,46,.5)}
  .lg-b{color:#1E55C8;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.5)}
  .in.b-g{border-color:#177D58!important;border-width:1.5px}
  .read-hint{display:flex;align-items:flex-start;gap:5px;margin-top:5px;font-size:10.5px;line-height:1.45;color:#0E5A40;background:rgba(23,125,88,.08);border:1px solid rgba(23,125,88,.22);border-radius:6px;padding:4px 7px}
  .read-hint svg{flex-shrink:0;margin-top:1px}
  .read-hint b{font-weight:800}
  .in.b-r{border-color:#B23A2E!important;border-width:1.5px}
  .in.b-b{border-color:#2563EB!important;border-width:1.5px}

  /* preview (右側 書類) */
  .pv-toolbar{display:flex;align-items:center;gap:8px;background:#3F3F46;color:#E5E7EB;padding:6px 10px;border-radius:7px;margin-bottom:12px;font-size:12px}
  .pv-toolbar button{background:#52525B;color:#fff;border:none;width:26px;height:24px;border-radius:5px;cursor:pointer;font-size:15px;line-height:1}
  .pv-toolbar .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pv-page-wrap{flex:1;display:flex;justify-content:center;align-items:flex-start;overflow:auto}
  .pv-foot{flex-shrink:0;padding:12px 4px 2px;display:flex;justify-content:center}
  .pv-download{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid #D9DED5;color:#1B2330;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  .pv-download:hover{background:#F3F5F2}

  /* ───── settings ───── */
  .settings-wrap{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:var(--space-rel);padding-bottom:8px}
  .set-savebar{position:sticky;bottom:0;display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--amber);border-radius:12px;padding:12px 16px;box-shadow:0 -4px 16px rgba(15,20,28,.10);margin-top:2px}
  .ssb-msg{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:var(--amber)}
  .ssb-actions{margin-left:auto;display:flex;gap:10px}
  .btn-danger{background:var(--alert);border:none;color:#fff;border-radius:8px;padding:9px 18px;font-size:13.5px;font-weight:800;cursor:pointer}
  .btn-danger:hover{filter:brightness(1.05)}
  .set-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .set-h{font-size:var(--fs-rel);font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:var(--space-rel);padding-bottom:11px;border-bottom:1px solid var(--lineSoft)}
  .set-count{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--inkSoft);background:#EEF0EC;border-radius:999px;padding:1px 8px;margin-left:2px}
  .set-row{display:flex;align-items:center;gap:18px;padding:var(--space-det) 0;border-bottom:1px solid var(--lineSoft)}
  .set-row:last-child{border-bottom:none;padding-bottom:2px}
  .set-l{flex:1;min-width:0}
  .set-t{font-size:13.5px;font-weight:700;color:var(--ink)}
  .set-d{font-size:12px;color:var(--inkSoft);margin-top:3px;line-height:1.5}
  .set-c{flex-shrink:0;display:flex;align-items:center;gap:10px}
  .set-range{gap:12px}

  /* ?ヘルプ ツールチップ */
  .help{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:999px;background:#C6CDD6;color:#fff;font-size:10px;font-weight:800;margin-left:4px;cursor:help;position:relative;vertical-align:middle}

  .hp-h{display:block;font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:5px}

  .set-add{display:flex;align-items:center;gap:9px}
  .pv-page{background:#fff;color:#1B2330;width:470px;aspect-ratio:210/297;box-sizing:border-box;padding:30px 32px;box-shadow:0 4px 20px rgba(0,0,0,.35);transform-origin:top center;flex-shrink:0;overflow:hidden}

  .mk{border-radius:3px;padding:1px 3px;-webkit-box-decoration-break:clone;box-decoration-break:clone}
  .mk-g{background:rgba(23,125,88,.22)} .mk-r{background:rgba(178,58,46,.18)} .mk-b{background:rgba(37,99,235,.18)}
  .pn-foot-note{font-size:11.5px;color:var(--inkSoft);background:var(--amberSoft);border:1px solid rgba(184,117,20,.25);border-radius:8px;padding:9px 11px;margin-top:12px;line-height:1.5;display:flex;gap:7px}

  /* reflect log overlay */

  /* ───── vehicles ───── */

  /* 個別モニター：項目金額を横一列（表の列）で表示。車番・累計コスト・操作は左固定。 */
  .vt-metrics{min-width:max-content}
  /* 3段ヘッダー：原価分類(vm-bunrui,30px) / 原価項目(vm-cat,30px) / 明細(vm-label)。縦スクロール時の固定オフセットを段で揃える */

  .vt-metrics .sticky-c1{left:0;width:142px;min-width:142px;max-width:142px}

  .vd-tbl{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border:1px solid var(--lineSoft);border-radius:8px;overflow:hidden}
  .vd-tbl th,.vd-tbl td{padding:8px 11px;text-align:left;border-bottom:1px solid var(--lineSoft)}
  .vd-tbl th{background:#F3F5F2;font-size:10.5px;color:var(--inkSoft);font-weight:800}

  .kpis{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;flex-shrink:0}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;flex:1;min-width:150px}
  .kpi .l{font-size:11.5px;color:var(--inkSoft);font-weight:700}
  .kpi .v{font-size:24px;font-weight:800;font-family:var(--mono);margin-top:4px}
  .kpi .v small{font-size:13px;color:var(--inkSoft);font-family:var(--sans);font-weight:700}
  /* コストモニター サマリーカード */
  .mon-kpis{gap:10px;margin-bottom:10px}
  .mon-kpis .mk{position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 14px;flex:1;min-width:178px;display:flex;flex-direction:column;gap:4px}
  .mk .mk-l{font-size:10.5px;color:var(--inkSoft);font-weight:700;line-height:1.3}
  .mk .mk-l .mk-sub{color:var(--inkFaint);font-weight:700;font-size:9.5px}
  .mk .mk-v{font-size:18px;font-weight:800;font-family:var(--mono);line-height:1.1;letter-spacing:-.3px}
  .mk .mk-v small{font-size:11px;color:var(--inkSoft);font-family:var(--sans);font-weight:700;margin-left:2px}
  .mk-tr{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--inkSoft)}
  .mk-tr b{font-weight:800}
  .mk-tr.up{color:var(--alert)}
  .mk-tr.down{color:var(--greenDark)}
  .mk-tr.flat{color:var(--inkFaint)}
  .mk-note{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--inkFaint);font-weight:700}
  .mk-ico{position:absolute;right:12px;bottom:9px;width:26px;height:26px;border-radius:999px;background:var(--greenSoft);display:flex;align-items:center;justify-content:center}
  /* コストモニター ピックアップ */
  .pickup{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap;align-items:stretch}
  .pk-card{flex:1;min-width:248px;background:var(--card);border:1px solid var(--line);border-radius:0;padding:8px 12px;display:flex;flex-direction:column}
  .pk-card-alert{border-color:var(--alert);box-shadow:0 0 0 1px var(--alert) inset}
  .pk-h{font-size:11.5px;font-weight:800;color:var(--ink);margin-bottom:5px;display:flex;align-items:center;gap:5px}
  .pk-h .pk-hsub{font-size:10px;font-weight:700;color:var(--inkFaint);margin-left:1px}
  .pk-list{display:flex;flex-direction:column;gap:6px;flex:1}
  .pk-item{flex:1;display:flex;align-items:center;gap:9px;padding:6px 11px;min-height:38px;border:1px solid var(--lineSoft);border-radius:0;cursor:pointer;transition:background .12s,border-color .12s}
  .pk-item:hover{background:#F5F8F5;border-color:var(--greenLine)}
  .pk-rank{flex-shrink:0;width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:var(--mono);background:var(--greenSoft);color:var(--greenDark)}
  .pk-rank.wide{width:auto;min-width:30px;height:18px;padding:0 6px;border-radius:5px;font-family:var(--sans)}
  .pk-main{flex:1;min-width:0;line-height:1.25}
  .pk-plate{font-size:12px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pk-metric{font-size:10.5px;color:var(--inkSoft);font-weight:700}
  .pk-amt{flex-shrink:0;font-family:var(--mono);font-size:12px;font-weight:800;color:var(--ink)}
  .pk-pct{flex-shrink:0;font-family:var(--mono);font-size:13px;font-weight:800;color:var(--alert);min-width:44px}
  .pk-detail{flex-shrink:0;display:inline-flex;align-items:center;gap:1px;font-size:10.5px;font-weight:700;color:var(--greenDark);white-space:nowrap}
  .pk-empty{font-size:11px;color:var(--inkFaint);font-weight:700;padding:6px 4px}
  /* ───── 異常検知・アラート／TCOパネル（コストモニター最上部） ───── */
  .an-card,.tco-card{display:block;overflow:hidden;margin-bottom:14px}
  .an-head{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--lineSoft);font-size:14.5px}
  .an-head b{font-size:14.5px;color:var(--ink)}
  .an-hsub{font-size:11.5px;color:var(--inkSoft);font-weight:600}
  .an-count{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:800;color:#B23A2E;background:var(--alertSoft);border-radius:999px;padding:2px 10px}
  .an-count.warn{color:#8A5310;background:var(--amberSoft)}
  .an-list{padding:4px 8px 8px;max-height:312px;overflow-y:auto}
  .tco-scroll{max-height:320px;overflow:auto}
  .tco-scroll .tco-tbl thead th{position:sticky;top:0;z-index:2;background:#F3F5F2}
  .an-row{display:flex;align-items:center;gap:11px;padding:10px 10px;border-radius:9px;cursor:pointer;border-left:3px solid transparent}
  .an-row:hover{background:#F6FBF8}
  .an-row .an-dot{width:9px;height:9px;border-radius:50%;flex:none;background:#B23A2E}
  .an-row.lv-yellow .an-dot{background:#D08A1E}
  .an-row.lv-red{border-left-color:#E0B8B2}
  .an-row.lv-yellow{border-left-color:#E8D6A8}
  .an-lv{font-size:10px;font-weight:800;border-radius:5px;padding:1px 6px}
  .an-lv.red{color:#B23A2E;background:var(--alertSoft)}
  .an-lv.yellow{color:#8A5310;background:var(--amberSoft)}
  .crit-pop{width:300px;max-width:80vw;font-size:11px;line-height:1.5;text-align:left;font-weight:600;padding:11px 12px}
  .crit-pop b{font-size:11.5px}
  .crit-pop .ct-h{display:block;font-size:12px;margin-bottom:5px}
  .crit-pop .ct-r{display:block;margin-bottom:3px}
  .crit-pop .ct-n{display:block;margin-top:5px;color:var(--inkSoft);font-weight:500}
  .an-tip{margin-left:2px}
  .an-tip.tip-right .crit-pop{left:auto;right:0}
  .an-main{flex:1;min-width:0}
  .an-l1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .an-scope{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;border-radius:6px;padding:1px 7px}
  .an-scope.veh{color:var(--greenDark);background:var(--greenSoft)}
  .an-scope.site{color:#1E7F73;background:#DCEFEC}
  .an-name{font-family:var(--mono);font-weight:800;font-size:13px;color:var(--ink)}
  .an-cat{font-size:11px;font-weight:700;color:var(--inkSoft);background:#EEF0EC;border-radius:6px;padding:1px 8px}
  .an-l2{font-size:11.5px;color:var(--inkSoft);margin-top:3px}
  .an-fig{text-align:right;white-space:nowrap}
  .an-rate{font-family:var(--mono);font-weight:800;font-size:15px;color:#B23A2E}
  .an-sub{font-size:10.5px;color:var(--inkSoft);font-family:var(--mono);margin-top:2px}
  .tco-tbl tbody tr{cursor:pointer}
  .tco-tbl tbody tr:hover{background:#F6FBF8}
  .tco-barwrap{display:flex;align-items:center;gap:8px;min-width:160px}
  .tco-bar{flex:1;height:8px;border-radius:999px;background:#EEF0EC;overflow:hidden}
  .tco-bar span{display:block;height:100%;background:var(--amber)}
  .tco-share{font-family:var(--mono);font-size:11px;color:var(--inkSoft);font-weight:700}
  .tco-sign{display:inline-flex;align-items:center;font-size:11px;font-weight:800;color:#B23A2E;background:var(--alertSoft);border-radius:999px;padding:2px 10px}
  .tco-rise{font-size:11px;font-weight:800;color:#8A5310;background:var(--amberSoft);border-radius:999px;padding:2px 10px}
  .tco-good{font-size:11px;font-weight:800;color:var(--greenDark);background:var(--greenSoft);border-radius:999px;padding:2px 10px}
  .tco-flat{color:var(--inkFaint);font-size:12px}
  .tco-klass{font-size:10px;font-weight:700;color:var(--inkSoft);background:#EEF0EC;border-radius:5px;padding:1px 6px;margin-left:7px}
  .tco-fac{font-size:10px;color:var(--inkSoft);margin-top:3px;font-family:var(--mono)}

  /* ───── コストモニター グラフ（①原価推移 ②営業所別コスト分類推移） ───── */
  .mon-scroll{flex:1;min-height:0;overflow-y:auto}
  .mon-charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media (max-width:860px){.mon-charts{grid-template-columns:1fr}}
  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:0;padding:14px 16px 12px;display:flex;flex-direction:column;min-width:0;height:300px;overflow:hidden}
  .chart-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .chart-title{font-size:13.5px;font-weight:800;color:var(--ink)}
  .chart-sub{font-size:11px;color:var(--inkSoft);margin-top:2px}
  .chart-filters{display:flex;gap:8px;flex-wrap:wrap}
  .chart-sel{padding:4px 9px}
  .chart-sel select{font-size:12px;max-width:130px}
  .chart-svg{flex:1 1 0;min-height:0;width:100%;height:100%;display:block}
  .chart-legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:8px}
  .chart-legend .cl-item{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--inkSoft);font-weight:600}
  .chart-legend .cl-sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}

  /* ───── bulk select ───── */
  .dt th.c,.dt td.c{text-align:center;white-space:nowrap}
  .dt input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;margin:0;vertical-align:middle}
  .dt tbody tr.sel{background:#EFFAF3}
  .dt tbody tr.sel:hover{background:#E6F6EE}
  @keyframes rowflash{0%{background:#CFF0DE}60%{background:#E3F1EB}100%{background:transparent}}
  .dt tbody tr.row-new{animation:rowflash 3.2s ease forwards}
  .dt tbody tr.row-new td:first-child{box-shadow:inset 3px 0 0 var(--green)}
  .bulkbar{display:flex;align-items:center;gap:13px;background:var(--greenSoft);border:1px solid var(--greenLine);border-radius:11px;padding:9px 9px 9px 16px;margin:0 0 12px;animation:fade .15s ease;flex-shrink:0}
  .bb-count{font-size:13px;font-weight:800;color:var(--greenDark)}
  .bb-clear{background:none;border:none;color:var(--greenDark);font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  .bulk-dd{position:relative;margin-left:auto}
  .bulk-btn{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:800;cursor:pointer}

  .bulk-scrim{position:fixed;inset:0;z-index:30}
  .bulk-menu{position:absolute;right:0;top:calc(100% + 7px);z-index:31;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 42px rgba(0,0,0,.2);overflow:hidden;min-width:262px;animation:fade .12s ease}
  .bulk-menu button{display:flex;align-items:center;justify-content:space-between;gap:14px;width:100%;background:#fff;border:none;border-bottom:1px solid var(--lineSoft);padding:12px 15px;font-size:13.5px;font-weight:700;color:var(--ink);cursor:pointer;text-align:left}
  .bulk-menu button:last-child{border-bottom:none}
  .bulk-menu button:hover{background:var(--greenSoft)}
  .bulk-menu button .lab{display:inline-flex;align-items:center;gap:8px}
  .bulk-menu button:disabled{color:var(--inkFaint);cursor:not-allowed;background:#FBFCFA}
  .bulk-menu button:disabled:hover{background:#FBFCFA}
  .bulk-menu button.danger{color:var(--alert)}
  .bulk-menu button.danger:hover{background:var(--alertSoft)}
  .bulk-menu .mc{font-size:11px;font-family:var(--mono);color:var(--inkSoft);background:#EEF0EC;border-radius:999px;padding:2px 8px;font-weight:700;white-space:nowrap}
  .sel-hint{margin-left:10px;color:var(--inkSoft);font-size:12px}
  .log-doc{color:#FFD79A;font-weight:800;border-top:1px solid rgba(255,255,255,.1);padding-top:9px;margin-top:3px;font-size:12px;display:flex;align-items:center;gap:6px}

  /* ───── pager ───── */
  .pager{display:flex;align-items:center;gap:14px;padding:12px 16px;border-top:1px solid var(--lineSoft);background:#fff;font-size:12.5px;color:var(--inkSoft);flex-wrap:wrap;flex-shrink:0}
  /* sortable headers */
  .dt th.sortable,.vt th.sortable{cursor:pointer;user-select:none}

  .dt th.sorted,.vt th.sorted{color:var(--greenDark)}
  .th-in{display:inline-flex;align-items:center;gap:5px}
  .dt th.r .th-in,.vt th.r .th-in{justify-content:flex-end}
  .ar{font-size:9px;line-height:1}
  .ar-dim{font-size:9px;line-height:1;opacity:.32}
  .pager .pg-range b{color:var(--ink);font-family:var(--mono)}
  .pg-spacer{flex:1}
  .pg-per{display:inline-flex;align-items:center;gap:7px;font-weight:700}
  .pg-per select{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:5px 8px;background:#fff;cursor:pointer;outline:none}
  .pg-per select:focus{border-color:var(--green)}
  .pg-nav{display:inline-flex;align-items:center;gap:10px}
  .pg-btn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer}
  .pg-btn:hover:not(:disabled){border-color:var(--greenLine);color:var(--greenDark);background:var(--greenSoft)}
  .pg-btn:disabled{color:#C2C9C0;cursor:not-allowed;background:#F7F8F5}
  .pg-cur{font-family:var(--mono);font-weight:700;color:var(--ink);min-width:54px;text-align:center}

  /* ───── 車両分析サイドパネル ───── */
  .vp{width:min(880px,96vw);background:var(--card);height:100vh;display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.22)}

  .vp-body{flex:1;overflow-y:auto;padding:20px 22px}
  .vp-hero{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .vp-spec{font-size:11.5px;color:var(--inkSoft);margin-top:4px}
  .vp-total{margin-left:auto;text-align:right}
  .vp-total .l{font-size:11px;color:var(--inkSoft);font-weight:700}
  .vp-total .v{font-family:var(--mono);font-weight:800;font-size:var(--fs-key);color:var(--ink)}
  .vp-sec{font-size:11px;font-weight:800;color:var(--inkSoft);letter-spacing:.4px;margin:var(--space-key) 0 var(--space-det);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .vp-sec .sp{flex:1}
  .vp-ctrl{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--inkSoft);font-weight:700}
  .vp-ctrl select{font-family:var(--sans);font-size:12.5px;font-weight:700;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:#fff;cursor:pointer;outline:none}
  .gran{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .gran button{background:#fff;border:none;padding:6px 12px;font-size:12px;font-weight:700;color:var(--inkSoft);cursor:pointer;border-right:1px solid var(--line)}
  .gran button:last-child{border-right:none}
  .gran button.on{background:var(--greenSoft);color:var(--greenDark)}
  .vp-chartcard{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--panel)}
  .vp-chart-h{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
  .vp-chart-h .ct{font-size:13.5px;font-weight:800;color:var(--ink)}
  .vp-chart-h .rg{font-size:11px;color:var(--inkSoft);margin-left:auto;font-family:var(--mono)}
  .chart svg{display:block;width:100%;height:auto}
  .chart .gl{stroke:var(--lineSoft);stroke-width:1}
  .chart .axt{fill:var(--inkFaint);font-size:9px;font-family:var(--mono)}
  .chart .ar{fill:var(--green);opacity:.10;stroke:none}
  .chart .ln{fill:none;stroke:var(--green);stroke-width:2;stroke-linejoin:round}
  .chart .dot{fill:#fff;stroke:var(--green);stroke-width:2}
  .chart .vlab{fill:var(--greenDark);font-size:9.5px;font-family:var(--mono);font-weight:700;text-anchor:middle}
  .chart .bar{fill:#C8D7CE}
  .chart .bar.cur{fill:var(--green)}
  .chart-empty{text-align:center;color:var(--inkFaint);font-size:12px;padding:34px 0}
  .tl{position:relative;margin-top:2px;padding-left:16px}
  .tl::before{content:"";position:absolute;left:5px;top:5px;bottom:6px;width:2px;background:var(--lineSoft)}
  .tl-item{position:relative;padding:0 0 var(--space-rel) 8px}
  .tl-item:last-child{padding-bottom:0}
  .tl-dot{position:absolute;left:-15px;top:3px;width:10px;height:10px;border-radius:999px;background:#fff;border:2px solid var(--green)}
  .tl-item.manual .tl-dot{border-color:var(--amber)}
  .tl-d{font-size:11px;font-family:var(--mono);color:var(--inkSoft)}
  .tl-row{display:flex;align-items:center;gap:8px;margin-top:2px}
  .tl-row .it{font-size:13px;font-weight:700;color:var(--ink)}
  .tl-amt{margin-left:auto;font-family:var(--mono);font-weight:800;font-size:13px;color:var(--ink)}
  .tl-tag{font-size:10px;font-weight:800;color:var(--greenDark);background:var(--greenSoft);border:1px solid var(--greenLine);border-radius:5px;padding:1px 7px}
  .tl-tag.m{color:var(--amber);background:var(--amberSoft);border-color:rgba(184,117,20,.3)}
  .tl-more{font-size:11.5px;color:var(--inkSoft);padding:6px 0 0 8px}
  .tl-scroll{max-height:430px;overflow-y:auto;padding-right:6px}
  .tl-scroll.expanded{max-height:680px}
  .tl-morebtn{display:block;width:100%;margin-top:10px;background:#fff;border:1px solid var(--line);color:var(--greenDark);border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:800;cursor:pointer}
  .tl-morebtn:hover{border-color:var(--greenLine);background:var(--greenSoft)}
  .vp-htitle{font-size:15px;font-weight:800;color:var(--ink);margin-right:2px}
  .ai{border:1px solid var(--greenLine);border-radius:12px;padding:16px;background:linear-gradient(180deg,#F3FBF7,#fff)}
  .ai.amber{border-color:rgba(184,117,20,.4);background:linear-gradient(180deg,#FDF6E9,#fff)}
  .ai.alert{border-color:rgba(178,58,46,.4);background:linear-gradient(180deg,#FBEEEC,#fff)}
  .ai-h{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .ai-h .ttl{font-size:13px;font-weight:800;color:var(--ink)}

  .ai-badge.ok{color:var(--greenDark);background:var(--greenSoft);border:1px solid var(--greenLine)}
  .ai-badge.warn{color:var(--amber);background:var(--amberSoft);border:1px solid rgba(184,117,20,.3)}
  .ai-badge.bad{color:var(--alert);background:var(--alertSoft);border:1px solid rgba(178,58,46,.3)}
  .ai-txt{font-size:12.5px;color:var(--ink);line-height:1.75}
  .ai-metrics{display:flex;gap:22px;flex-wrap:wrap;margin-top:11px;padding-top:11px;border-top:1px solid var(--lineSoft)}
  .ai-m .l{font-size:10.5px;color:var(--inkSoft);font-weight:700}
  .ai-m .v{font-family:var(--mono);font-weight:800;font-size:14px;color:var(--ink);margin-top:2px}
  /* AIインサイト：オプション未契約時のぼかしゲート */
  .ai-gate{position:relative}
  .ai-gate-blur{filter:blur(5.5px);opacity:.55;user-select:none;pointer-events:none}
  .ai-gate-lock{position:absolute;inset:-6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;text-align:center;padding:10px}
  .ai-gate-ic{width:38px;height:38px;border-radius:999px;background:var(--greenSoft);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(20,30,40,.10)}
  .ai-gate-t{font-size:10.5px;font-weight:700;color:var(--inkSoft);max-width:480px;line-height:1.65}
  .ai-gate-cta{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 17px;font-size:12.5px;font-weight:800;cursor:pointer}
  .ai-gate-cta:hover{background:var(--greenDark)}
  /* ───── 変更履歴パネル ───── */
  .clog{width:min(560px,96vw);background:var(--card);height:100vh;display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.22)}
  .clog.anim{animation:slideIn .22s cubic-bezier(.22,.61,.36,1)}
  .clog .pn-head .set-count{margin-left:2px}
  .clog-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:10px}
  .clog-note{font-size:11.5px;color:var(--inkSoft);line-height:1.6;margin-bottom:2px}
  .clog-item{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer;transition:.12s}
  .clog-item:hover{border-color:var(--greenLine);background:var(--greenSoft)}
  .clog-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .clog-act{font-size:10.5px;font-weight:800;border-radius:5px;padding:2px 8px}
  .clog-act.changed{color:var(--blue);background:var(--blueSoft)}
  .clog-act.added{color:var(--greenDark);background:var(--greenSoft)}
  .clog-act.removed{color:var(--alert);background:var(--alertSoft)}
  .clog-ts{margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--inkSoft)}
  .clog-main{font-size:13px;color:var(--ink);line-height:1.6}
  .clog-plate{font-family:var(--mono);font-weight:800;color:var(--greenDark)}
  .clog-foot{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:11.5px;color:var(--inkSoft)}
  .clog-foot>span:first-child{display:inline-flex;align-items:center;gap:4px;font-weight:700}
  .clog-link{margin-left:auto;color:var(--greenDark);font-weight:800}
  @keyframes hlpulse{0%{background:#FCF3CF}60%{background:#FCF3CF}100%{background:transparent}}
  .vd-hl td{animation:hlpulse 2s ease}
  .vd-hl .vd-in{border-color:var(--amber)}
  /* ───── 期間絞り込みカレンダー ───── */
  .veh-filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .vf-l{font-size:11.5px;font-weight:800;color:var(--inkSoft);letter-spacing:.3px}
  .vcal-wrap{position:relative;display:inline-flex}
  .vcal-field{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer}
  .vcal-field:hover,.vcal-field.open{border-color:var(--green)}
  .vcal-field .ph{color:var(--inkFaint);font-weight:600}
  .vcal-field .vcal-x{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:999px;background:#EEF0F3;color:var(--inkSoft);font-size:12px;margin-left:1px}
  .vcal-field .vcal-x:hover{background:var(--alertSoft);color:var(--alert)}
  .vcal-backdrop{position:fixed;inset:0;z-index:39}
  .vcal-pop{position:absolute;top:calc(100% + 6px);left:0;width:322px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 44px rgba(20,30,40,.22);z-index:40;overflow:hidden}
  .vcal-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px}
  .vcal-nav{background:none;border:none;font-size:13px;font-weight:800;color:var(--ink);cursor:pointer;padding:4px 2px}
  .vcal-nav:hover{color:var(--green)}
  .vcal-title{font-size:14px;font-weight:800;color:var(--ink)}
  .vcal-hint{background:var(--greenSoft);color:var(--greenDark);text-align:center;font-size:12.5px;font-weight:700;padding:9px 8px}
  .vcal-hint.done{background:#EEF1FB;color:#2A3B8F;font-family:var(--mono);font-weight:800}
  .vcal-quick{display:flex;justify-content:center;gap:16px;padding:9px;border-bottom:1px solid var(--lineSoft)}
  .vcal-quick button{background:none;border:none;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;padding:2px 4px}
  .vcal-quick button:hover{color:var(--green)}
  .vcal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px}
  .vcal-wds{padding-top:8px}
  .vcal-wd{text-align:center;font-size:11.5px;font-weight:800;color:var(--inkSoft);padding:5px 0}
  .vcal-wd.sun{color:#D9483B} .vcal-wd.sat{color:#2563EB}
  .vcal-days{padding:2px 8px 8px}
  .vcal-d{position:relative;height:38px;border:none;background:none;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer}
  .vcal-d.out{color:var(--inkFaint);opacity:.55}
  .vcal-d.sun{color:#D9483B} .vcal-d.sat{color:#2563EB}
  .vcal-d:hover{background:var(--greenSoft);border-radius:8px}
  .vcal-d.today{box-shadow:inset 0 0 0 1.5px var(--inkFaint);border-radius:999px}
  .vcal-d.in-range{background:#E6E8EC}
  .vcal-d.range-end-pt{background:#1E2A78!important;color:#fff!important;border-radius:999px;font-weight:800}
  .vcal-foot{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-top:1px solid var(--lineSoft)}
  .vcal-clear{background:none;border:none;font-size:12px;font-weight:700;color:var(--inkSoft);cursor:pointer}
  .vcal-clear:hover{color:var(--alert)}
  .vcal-close{background:none;border:none;font-size:12px;font-weight:800;color:var(--greenDark);cursor:pointer}

  /* ═══════════════════ ロジポケ chrome（画像UIの再現） ═══════════════════ */
  :root{
    --lp-head:#15433a;          /* ヘッダー濃緑 */
    --lp-head-grad:linear-gradient(180deg,#1a4d40 0%,#123a30 100%);
    --lp-side:#ffffff;          /* サイドバー白 */
    --lp-side-line:#e6e9e4;
    --lp-ink:#3a424e;           /* メニュー文字 */
    --lp-ink-soft:#6b7280;
    --lp-green:#177D58;         /* アクセント緑 */
    --lp-green-dark:#0E5A40;
    --lp-active:#E3F1EB;        /* アクティブ項目背景 */
    --lp-hover:#f1f5f1;
    --lp-badge:#e5484d;
    --lp-header-h:60px;
  }
  body{overflow:hidden}
  /* ヘッダー */
  .lp-header{height:var(--lp-header-h);background:var(--lp-head-grad);display:flex;align-items:center;gap:18px;padding:0 20px;color:#fff;flex-shrink:0;position:relative;z-index:60;box-shadow:0 1px 0 rgba(0,0,0,.18)}
  .lp-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
  .lp-logo .mk{width:31px;height:31px;border-radius:8px;background:#fff;display:grid;place-items:center;flex-shrink:0}
  .lp-logo .nm{font-size:18px;font-weight:800;letter-spacing:.6px;color:#fff;white-space:nowrap}
  .lp-company{font-size:14px;font-weight:600;color:#e9f4ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lp-head-right{margin-left:auto;display:flex;align-items:center;gap:13px;flex-shrink:0}
  .lp-user{font-size:13px;color:#eaf4ee;white-space:nowrap;font-weight:600}
  .lp-hicon{width:30px;height:30px;border-radius:999px;border:1.5px solid rgba(255,255,255,.5);display:grid;place-items:center;cursor:pointer;color:#fff;background:transparent}
  .lp-hicon:hover{background:rgba(255,255,255,.14)}
  .lp-head-right .bell-wrap{margin-right:0}
  .lp-head-right .bell svg{stroke:#eaf4ee}
  .lp-head-right .bell{border-radius:999px}
  .lp-head-right .bell:hover{background:rgba(255,255,255,.14)}
  .lp-head-right .bell-dot{border-color:#163f35}

  /* レイアウト */
  .lp-shell{display:flex;height:calc(100vh - var(--lp-header-h));min-height:0}
  .lp-side{width:264px;flex-shrink:0;background:var(--lp-side);border-right:1px solid var(--lp-side-line);overflow-y:auto;padding:6px 0 30px}
  .lp-main{flex:1;min-width:0;display:flex;flex-direction:column;height:100%;min-height:0;background:var(--bg)}

  /* ナビ（2階層） */
  .lp-nav{display:flex;flex-direction:column}
  .lp-item{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;cursor:pointer;text-align:left;
           padding:11px 16px;font-size:14px;font-weight:600;color:var(--lp-ink);font-family:inherit;transition:.12s;border-left:3px solid transparent;line-height:1.25}
  .lp-item .ic{display:flex;flex-shrink:0;width:21px;justify-content:center}
  .lp-item .tx{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lp-item .cv{display:flex;flex-shrink:0;transition:transform .15s ease;opacity:.55;transform:rotate(90deg)}
  .lp-item.open .cv{transform:rotate(-90deg)}
  .lp-item:hover{background:var(--lp-hover)}
  .lp-item.parent-active{color:var(--lp-green-dark);background:#f3faf6}
  .lp-flag{width:17px;height:17px;border-radius:999px;background:var(--lp-badge);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;flex-shrink:0;line-height:1}

  .lp-sub{display:flex;flex-direction:column;background:#fbfdfb;border-top:1px solid #f0f3ee;border-bottom:1px solid #f0f3ee}
  .lp-subitem{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;text-align:left;
              padding:9px 16px 9px 26px;font-size:13.5px;font-weight:600;color:var(--lp-ink);font-family:inherit;transition:.12s;border-left:3px solid transparent}
  .lp-subitem .tree{color:#c2cabf;font-size:13px;flex-shrink:0;font-family:var(--mono)}
  .lp-subitem .ic{display:flex;flex-shrink:0}
  .lp-subitem .tx{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lp-subitem:hover{background:var(--lp-hover)}
  .lp-subitem.active{background:var(--lp-active);color:var(--lp-green-dark);font-weight:800;border-left-color:var(--lp-green)}
  .lp-subitem .ct{margin-left:auto;font-size:10.5px;font-family:var(--mono);background:var(--lp-green);color:#fff;padding:1px 7px;border-radius:999px;font-weight:800}

  /* プレースホルダーページ */
  .lp-ph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--inkSoft);gap:15px;min-height:0;padding:40px 20px}
  .lp-ph .ph-ic{width:66px;height:66px;border-radius:17px;background:var(--greenSoft);display:grid;place-items:center}
  .lp-ph h2{margin:0;font-size:20px;color:var(--ink);font-weight:800;letter-spacing:.3px}
  .lp-ph p{margin:0;font-size:13.5px;max-width:440px;line-height:1.75}
  .lp-ph .ph-tag{font-size:11px;font-weight:800;letter-spacing:.6px;color:var(--lp-green-dark);background:var(--lp-active);padding:4px 12px;border-radius:999px}

  /* ═══════ AIで読み取られた明細を確認（書類詳細パネルの左半分に表示） ═══════ */
  .ai-sechead{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--ink);margin:2px 0 14px}
  .ai-guide{display:flex;gap:10px;align-items:flex-start;font-size:12px;color:var(--inkSoft);margin-bottom:12px}
  .ai-gnum{flex-shrink:0;width:21px;height:21px;border-radius:6px;background:var(--green);color:#fff;font-size:12px;font-weight:800;display:grid;place-items:center;margin-top:1px}
  .ai-gtxt{color:var(--ink);font-weight:700;font-size:13px;margin-bottom:4px}
  .ai-gul{margin:0;padding-left:18px;line-height:1.75}
  .ai-page{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--greenDark);background:var(--greenSoft);border:1px solid var(--greenLine);border-radius:8px;padding:8px 12px;margin:4px 0 12px}
  .ai-page b{font-weight:800}
  .ai-colsel{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12.5px;font-weight:700;color:var(--inkSoft)}
  .ai-colsel select{border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--ink);background:#fff;cursor:pointer}
  .ai-auto{font-size:11px;font-weight:700;color:var(--inkFaint)}
  .ai-tblwrap{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .ai-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .ai-tbl th{background:#F3F5F2;color:var(--inkSoft);font-size:11px;font-weight:800;padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  .ai-tbl td{padding:9px 11px;border-bottom:1px solid var(--lineSoft);color:var(--ink)}
  .ai-tbl tbody tr:last-child td{border-bottom:none}
  .ai-tbl td.r,.ai-tbl th.r{text-align:right}
  .ai-tbl .mono{font-family:var(--mono)}
  .ai-tbl .aic-c{width:42px;text-align:center}
  .ai-tbl .aic-no{color:var(--inkFaint);width:38px}
  .ai-tbl .aic-amt{font-weight:800}
  .ai-tbl tr.on{background:#F4FBF7}
  .ai-tbl input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;margin:0;vertical-align:middle}
  .ai-sum{display:flex;align-items:center;gap:12px;margin-top:16px;padding-top:14px;border-top:1px solid var(--lineSoft);flex-wrap:wrap}
  .ai-sum .lab{font-size:13px;color:var(--inkSoft);font-weight:700}
  .ai-sum .v{font-size:24px;font-weight:800;color:var(--ink)}
  .ai-taxsel{border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--ink);background:#fff;cursor:pointer}
  .ai-foot{display:flex;align-items:center;gap:10px;position:sticky;bottom:0;background:#fff;margin:16px -20px -18px;padding:13px 20px;border-top:1px solid var(--line)}
  .ai-foot .spacer{flex:1}
  .ai-hidelink{background:none;border:none;color:var(--greenDark);font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0}
  /* 複数ページのページ切替セクション */
  .ai-pagebox{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
  .ai-pagebox.active{border-color:var(--green)}
  .ai-pagehd{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#FAFBF9;cursor:pointer;font-size:13px;font-weight:700;color:var(--ink)}
  .ai-pagehd:hover{background:#F1F4F0}
  .ai-pagebox.active .ai-pagehd{background:var(--greenSoft)}
  .ai-pgcv{display:flex;flex-shrink:0;transition:transform .15s ease}
  .ai-pgcv.open{transform:rotate(90deg)}
  .ai-pglab{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ai-pglab b{font-weight:800;color:var(--greenDark)}
  .ai-showpage{flex-shrink:0;background:var(--green);border:none;color:#fff;font-size:11.5px;font-weight:800;cursor:pointer;white-space:nowrap;padding:6px 12px;border-radius:7px;display:inline-flex;align-items:center;gap:4px}
  .ai-showpage:hover{background:var(--greenDark)}
  .ai-pagebox .ai-tblwrap{border:none;border-top:1px solid var(--lineSoft);border-radius:0}
  .iv-pageno{font-size:9px;color:var(--inkSoft);font-weight:700;margin-left:6px}
  .iv-cont{margin-top:16px;text-align:right;font-size:11px;color:var(--inkSoft);font-weight:700}
  /* ───── 在庫管理 ───── */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{border:none;background:none;padding:7px 14px;font-size:12.5px;font-weight:700;color:var(--inkSoft);cursor:pointer;font-family:var(--sans)}
  .seg button+button{border-left:1px solid var(--lineSoft)}
  .seg button:hover{background:var(--panel);color:var(--ink)}
  .seg button.on{background:var(--greenSoft);color:var(--greenDark)}
  .inv-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .inv-bar .sp{flex:1}
  .inv-scroll{flex:1;min-height:0;overflow-y:auto;padding-bottom:8px}
  .inv-scroll>.inv-card:last-child{margin-bottom:0}
  .inv-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 18px;margin-bottom:14px}
  .inv-card>h3{margin:0 0 4px;font-size:13.5px;display:flex;align-items:center;gap:8px}
  .inv-card>.sub{margin:0 0 12px;font-size:12px;color:var(--inkSoft)}
  .inv-badge{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .b-in{background:#E5EDFB;color:#1E55C8}
  .b-out{background:#FBEFD8;color:#9A5A0E}
  .b-open{background:#EAEDF1;color:#5A6472}
  .b-ret{background:#E3F1EB;color:#0E5A40}
  .b-loss{background:#F7E2DF;color:#B23A2E}
  .pill-ok{background:#E3F1EB;color:#0E7A4B}
  .pill-low{background:#F7E2DF;color:#B23A2E}
  .pill-exp{background:#FBEFD8;color:#9A5A0E}
  .inv-link{color:var(--green);cursor:pointer;border:none;background:none;font:inherit;font-weight:700;padding:0;text-decoration:underline dotted;text-underline-offset:2px}
  .inv-link:hover{color:var(--greenDark)}
  .barm{height:7px;border-radius:99px;background:var(--lineSoft);overflow:hidden;min-width:64px;margin-top:3px}
  .barm>span{display:block;height:100%;border-radius:99px}
  .inv-map{display:flex;flex-wrap:wrap;gap:8px}
  .inv-chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:6px 11px;font-size:12px;background:var(--panel)}
  .inv-chip b{font-family:var(--mono);font-weight:800}
  table.invt{width:100%;border-collapse:collapse;font-size:12.5px;min-width:760px}
  table.invt th{text-align:left;font-size:11px;color:var(--inkSoft);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--panel)}
  table.invt td{padding:9px 10px;border-bottom:1px solid var(--lineSoft);vertical-align:middle}
  table.invt td.r,table.invt th.r{text-align:right;font-family:var(--mono)}
  table.invt tr:last-child td{border-bottom:none}
  table.invt tr.lowrow td{background:#FCF1EF}
  .inv-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--inkSoft);margin-bottom:14px;background:var(--greenSoft);border:1px solid var(--greenLine);border-radius:10px;padding:10px 14px}
  .inv-flow b{color:var(--greenDark)}
  .inv-flow .ar{color:var(--green);font-weight:800}
</style>
</head>

</div>

/* 原価項目→属性の索引（車両/拠点 両モデル）。入力画面のセレクトと legacyCat 変換に使用。 */

const KOMOKU_INDEX={}; ALL_COST_MODEL.forEach(g=>{ KOMOKU_INDEX[g.komoku]={bunrui:g.bunrui,legacyCat:g.legacyCat,scope:g.scope}; });

/* ═══════ 対照表（クロスリファレンス）═══════
   スプレッドシート「対照表」タブとの対応：
     C列 入力する金額項目（明細） = items[].label  …… コスト管理 車両一覧/拠点一覧に表示される各項目
     F列 現場がわかる表現（推奨）   = items[].genba  …… 書類一覧の「項目」に表示する選択肢
     G列 元データ書類での記載文言   = items[].kisai  …… 明細OCRの読み取り語（これを参照して項目を自動入力）
   体験：G（書類の記載）を読み取り → F（現場表現）を「項目」へ自動入力 → 裏でC（明細）に紐づき、
        コスト管理の車両一覧/拠点一覧の各項目（C列）へ反映される。 */
const KOMOKU_ITEMS={}; ALL_COST_MODEL.forEach(g=>{ KOMOKU_ITEMS[g.komoku]=g.items; });
const CROSS_REF=[]; ALL_COST_MODEL.forEach(g=>g.items.forEach(it=>CROSS_REF.push({scope:g.scope,komoku:g.komoku,label:it.label,genba:it.genba||it.label,kisai:it.kisai||[]})));
const MEISAI_INDEX={}; CROSS_REF.forEach(e=>{ if(!MEISAI_INDEX[e.label]) MEISAI_INDEX[e.label]=e; });
/* C明細ラベル → 現場表現(F) */
function genbaOf(label){ const e=MEISAI_INDEX[label]; return e?e.genba:(label||""); }
/* 記載文言(G)・読み取りテキストから C明細 を推定（明細OCRの自動入力）。komoku 指定で候補を絞る。 */
function inferMeisai(text,komoku){
  if(!text) return null; const t=String(text);
  const pool=(komoku&&KOMOKU_ITEMS[komoku])?CROSS_REF.filter(e=>e.komoku===komoku):CROSS_REF;
  // 1) C明細ラベル／現場表現と完全一致なら最優先
  const exact=pool.find(e=>e.label===t||e.genba===t); if(exact) return exact;
  // 2) 記載文言キーワードの部分一致（長い語＝具体的なものを優先）
  let best=null,bestLen=0;
  pool.forEach(e=>e.kisai.forEach(k=>{ if(k&&t.indexOf(k)>=0&&k.length>bestLen){ best=e; bestLen=k.length; } }));
  return best;
}
/* 明細の正規化済 C明細ラベル：保存済 meisai 優先 → 無ければ記載(item)から推定 */
function lineMeisai(l){
  if(l&&l.meisai&&MEISAI_INDEX[l.meisai]) return l.meisai;
  const inf=inferMeisai(l&&l.item, lineKomoku(l)); return inf?inf.label:"";
}

/* 車両の連携明細を集計し、各明細(src)の金額を引けるようにする */
function _vehAggregates(v){
  const bySub={}; let jidoshazei=0, juryozei=0;
  (v.lines||[]).forEach(l=>{
    const sub=resolveSubcat(l.cat,l.item);
    if(sub) bySub[sub]=(bySub[sub]||0)+(+l.amount||0);
    if(l.cat==="税金"){ if((l.item||"").includes("重量税")) juryozei+=+l.amount||0; else if((l.item||"").includes("自動車税")) jidoshazei+=+l.amount||0; }
  });
  const byCat=v.byCat||{};
  const fuelDG=(byCat["燃料費"]||0)-(bySub.adblue||0); // 給油（軽油/ガソリン系）＝燃料費 − アドブルー
  const inspectPeriodic=(bySub.inspect_3m||0)+(bySub.inspect_other||0);
  return {bySub,byCat,jidoshazei,juryozei,fuelDG,inspectPeriodic};
}
function _resolveSrc(src,agg){
  if(!src) return null; // 対応データ無し → na
  if(src.indexOf("sub:")===0) return agg.bySub[src.slice(4)]||0;
  if(src.indexOf("cat:")===0) return agg.byCat[src.slice(4)]||0;
  if(src==="fuel_dg") return Math.max(0,agg.fuelDG);
  if(src==="jidoshazei") return agg.jidoshazei;
  if(src==="juryozei") return agg.juryozei;
  if(src==="inspect_periodic") return agg.inspectPeriodic;
  return null;
}
/* 原価項目モデル＋集計から、表示用メトリクス（原価分類・原価項目・明細列＋通算）を生成 */
function _metricsFromModel(model,agg){
  return model.map(g=>{
    const cells=g.items.map(it=>{ const val=agg?_resolveSrc(it.src,agg):null; return {label:it.label,value:val||0,na:(val==null)}; });
    const sum=cells.reduce((a,c)=>a+(c.na?0:c.value),0);
    return {bunrui:g.bunrui,komoku:g.komoku,metrics:[{label:"通算",value:sum,isSum:true},...cells]};
  });
}
/* 車両コスト：1車両の原価項目別メトリクス */
function vehicleMetrics(v){ return _metricsFromModel(VEHICLE_COST_MODEL,_vehAggregates(v)); }
/* 拠点コスト：連携済み書類のうち拠点(scope=拠点)の明細を、営業所×原価項目×明細で集計 */
function buildSites(){
  const byOffice={};
  const adjIdx=new Map(); ADJUSTMENTS.forEach(a=>{ if(a.type==="override") adjIdx.set(adjKey(a.docId,a.lid),a); });
  docs.filter(d=>d.status==="連携済み"&&!d.deleted).forEach(d=>{
    linesOf(d.id).forEach(l=>{
      const eff=effDocLine(l,d.id,adjIdx);
      const km=lineKomoku(eff); const idx=KOMOKU_INDEX[km];
      if(!idx||idx.scope!=="拠点") return; // 拠点コストの明細のみ

function _genChassis(plate){
  const h=_hash(plate); const m=JIKEN_MODELS[h%JIKEN_MODELS.length];
  const serial=500000+(h%480000);

}
/* 車台番号から自検協モデルを判定（登録済みは型式一致、手入力は型式コード部分一致で突合） */
function _modelFromChassis(chassis){
  const up=(chassis||"").replace(/\s/g,"").toUpperCase();
  if(up.length<2) return null;
  for(const m of JIKEN_MODELS){ if(up.includes(m.code)) return m; }
  return null;
}
function lookupJikenkyo(chassis){
  const m=_modelFromChassis(chassis); if(!m) return null;
  const h=_hash((chassis||"").toUpperCase());
  return {klass:m.klass, subClass:m.sub, maxLoad:m.maxLoad + (h%5)*100, gross:m.gross, size:m.size};
}
